        - generic [ref=e441]: 真正的大体量长篇不应该一次性生成。正确方式是先建立世界观、人物、主线和卷级目标，再逐轮扩写、审校和修订。 这个页面已经按这个思路包装了当前系统：你可以把 22000 到 50000 字当作样书或单卷试写，把 100000 到 300000 字当作阶段推进， 再逐卷扩充到百万字项目。千万字项目也不是不能做，但应该拆成多个连续项目阶段来推进，而不是一次运行完成。