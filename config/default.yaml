# =============================================================================
# BestSeller — Default Configuration
# =============================================================================
# Override order:
#   1. config/local.yaml
#   2. Environment variables with prefix BESTSELLER__
#      e.g. BESTSELLER__DATABASE__URL=postgresql+asyncpg://...
# =============================================================================

llm:
  mock: false

  planner:
    model: "anthropic/claude-opus-4-5"
    temperature: 0.82
    max_tokens: 16384
    timeout_seconds: 120
    n_candidates: 1

  writer:
    model: "anthropic/claude-sonnet-4-5"
    model_override: null
    temperature: 0.85
    # Chinese scene drafts of ~1600-2200 words can span 6-9K tokens when
    # format/list overhead is counted; 8192 used to silently truncate the
    # tail.  12288 gives room for a full 2200-word scene plus the system
    # header without eviction.  For English, which trends to ~0.75 token
    # per word, this is still ample (≈16K words worth).
    max_tokens: 12288
    timeout_seconds: 180
    stream: true

  critic:
    model: "anthropic/claude-haiku-4-5"
    temperature: 0.25
    max_tokens: 2048
    timeout_seconds: 60

  summarizer:
    model: "anthropic/claude-haiku-4-5"
    temperature: 0.2
    max_tokens: 1536
    timeout_seconds: 45

  editor:
    model: "anthropic/claude-sonnet-4-5"
    temperature: 0.4
    max_tokens: 8192
    timeout_seconds: 180

  retry:
    max_attempts: 3
    wait_min_seconds: 1
    wait_max_seconds: 10
    retry_on:
      - "RateLimitError"
      - "APITimeoutError"
      - "ServiceUnavailableError"
    # 429 rate-limits are transient — retry patiently instead of
    # pausing the task or swapping in fallback content.
    rate_limit_max_attempts: 60
    rate_limit_wait_min_seconds: 5
    rate_limit_wait_max_seconds: 120

# -----------------------------------------------------------------------------
# Primary Database
# PostgreSQL is the only source of truth for structured data and draft text.
# -----------------------------------------------------------------------------
database:
  url: "postgresql+asyncpg://bestseller:bestseller@localhost:5432/bestseller"
  pool_size: 20
  max_overflow: 20
  pool_timeout_seconds: 30
  pool_recycle_seconds: 1800
  statement_timeout_ms: 60000
  lock_timeout_ms: 30000
  application_name: "bestseller"
  auto_migrate: true
  echo_sql: false

# -----------------------------------------------------------------------------
# Retrieval
# PostgreSQL + pgvector + trigram hybrid retrieval.
# -----------------------------------------------------------------------------
retrieval:
  provider: "pgvector"
  embedding_model: "BAAI/bge-m3"
  embedding_dimensions: 1024
  chunk_size: 800
  chunk_overlap: 120
  candidate_limit: 40
  top_k: 12
  min_score: 0.55
  index_type: "hnsw"

  hybrid_weights:
    vector: 0.60
    lexical: 0.20
    structural: 0.20

# -----------------------------------------------------------------------------
# Generation
# -----------------------------------------------------------------------------
generation:
  target_total_words: 60000
  target_chapters: 30

  words_per_chapter:
    min: 1800
    target: 2200
    max: 3000

  scenes_per_chapter:
    min: 2
    target: 3
    max: 3

  words_per_scene:
    min: 500
    target: 700
    max: 800

  context_budget_tokens: 8000
  active_context_scenes: 12
  genre: "general-fiction"
  language: "zh-CN"
  pov: "third-limited"
  structure_template: "three-act"

# -----------------------------------------------------------------------------
# Quality
# -----------------------------------------------------------------------------
quality:
  enable_scene_critique: true
  enable_chapter_coherence_check: true
  enable_final_consistency_check: true
  enable_llm_scene_commentary: true
  enable_llm_chapter_commentary: true
  enable_plan_judge: true
  enable_plan_judge_llm: true
  min_scene_rewrite_improvement: 0.03

  thresholds:
    scene_min_score: 0.70
    chapter_coherence_min_score: 0.75
    character_consistency_min_score: 0.75
    plot_logic_min_score: 0.70

  max_scene_revisions: 2
  max_chapter_revisions: 2

  repetition:
    window_words: 2000
    similarity_threshold: 0.92

# -----------------------------------------------------------------------------
# Artifact Store
# Exported files and large payload snapshots live here.
# Not a source of truth.
# -----------------------------------------------------------------------------
artifact_store:
  mode: "local"   # local | s3
  local_dir: "./artifacts"
  retain_prompt_payloads: false

  s3:
    bucket: ""
    region: ""
    prefix: "bestseller"

# -----------------------------------------------------------------------------
# Output
# -----------------------------------------------------------------------------
output:
  base_dir: "./output"

  formats:
    markdown: true
    docx: false
    epub: false
    pdf: false

  checkpoint:
    enabled: true
    every_n_scenes: 5

  stream_to_console: true

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
logging:
  level: "INFO"
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
  datefmt: "%Y-%m-%d %H:%M:%S"
  json_logs: false

  file:
    enabled: true
    path: "./logs/bestseller.log"
    max_bytes: 10485760
    backup_count: 5

  suppress:
    - "httpx"
    - "httpcore"
    - "urllib3"
    - "sentence_transformers"
    - "asyncpg"
    - "sqlalchemy.engine"

# -----------------------------------------------------------------------------
# Pipeline
# -----------------------------------------------------------------------------
pipeline:
  enable_truth_version_guard: true
  enable_story_query_brief: false
  story_query_brief_max_rounds: 4
  contradiction_block_on_violation: true
  # Identity violations must fail closed. Earlier canary-only wiring left this
  # off in YAML, overriding the enabled default in settings.py and turning
  # gender/name consistency into warnings.
  identity_block_on_violation: true
  identity_block_severities:
    - critical
    - major
  # Upstream narrative contracts fail closed before model generation.
  require_foundation_identity_lock: true
  require_chapter_plan_contract: true
  # Chapter outlines must carry a flexible reader-visible causality contract:
  # pressure -> choice/action/reaction -> resistance/cost/gain/state change ->
  # next-reader-desire.  The gate checks axes, not a fixed prose formula.
  enable_chapter_causality_gate: true
  chapter_causality_gate_block_on_failure: true
  require_pre_draft_scene_contract: true
  # Critical scene-card richness failures should re-plan before prose drafting;
  # otherwise repeated/thin scene patterns only become prompt warnings.
  scene_richness_block_on_critical: true
  enable_golden_three_health: true
  golden_three_min_hype_chapters: 2
  golden_three_min_ending_hook_chapters: 2
  # Long-form signing projects must pass a chapter/scene-level commercial
  # readiness gate before prose generation starts.
  enable_commercial_planning_readiness_gate: true
  commercial_planning_readiness_block_on_failure: true
  commercial_planning_min_target_chapters: 50
  # Chapter-length stability gate.  Reads min/target/max from
  # ``generation.words_per_chapter`` above and turns large drifts
  # (>±warn_margin beyond the hard window) into blocking findings.
  enable_length_stability_gate: true
  length_stability_block_severities:
    - major
  length_stability_warn_margin: 0.10
  # Auto-repair a blocked chapter by running one extra scene-rewrite
  # cycle.  Only the ``chapter_auto_repair_repairable_codes`` set triggers
  # this path. Length, dialogue, ending-hook, lifecycle, and canon-term
  # leaks are rewrite-fixable; deterministic schema blocks remain excluded.
  enable_chapter_auto_repair: true
  chapter_auto_repair_max_attempts: 3
  chapter_auto_repair_repairable_codes:
    - BLOCK_LOW
    - BLOCK_HIGH
    - DIALOG_UNPAIRED
    - ENDING_SENTENCE_WEAK
    - dead_alive
    - pronoun_mismatch
    - character_resurrection
    - character_missing_appearance
    - character_sealed_appearance
    - character_sleeping_appearance
    - character_comatose_appearance
    - CANON_FORBIDDEN_TERM
    - CANON_STATE_REGRESSION
    - CROSS_CHAPTER_REPETITION
    - INTRA_CHAPTER_REPETITION
  # Records a project-level planning kernel before chapter production entry
  # points. Telemetry-only by default; flip block_on_failure for strict runs.
  enable_prewrite_readiness_gate: true
  prewrite_readiness_block_on_failure: false
  # Story design kernel rollout.  Generates and injects a structured plot
  # contract before downstream chapter planning.  Reverse-outline checks stay
  # warn-only until canary projects prove the false-positive rate is acceptable.
  enable_story_design_kernel: true
  story_design_kernel_candidate_count: 3
  enable_emotion_driven_kernel: true
  enable_emotion_kernel_backfill: true
  enable_entry_system_kernel: true
  enable_entry_system_backfill: true
  enable_story_state_driven_planning: true
  enable_reverse_outline_gate: true
  reverse_outline_gate_block_on_failure: false
  story_design_require_kernel_for_new_projects: false
