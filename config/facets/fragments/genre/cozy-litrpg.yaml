# Genre Fragment: Cozy LitRPG
# 用 LitRPG 系统管理客栈/烘焙/花园/咖啡馆的低冲突 + 生活模拟向进阶流。

scene_writer: |
  This is a Cozy LitRPG story. Key genre elements:
  - The "System" 服务于生活技艺（烹饪、酿造、裁缝、种植、驯兽、招待）而非战斗
  - 低冲突，核心张力来自"能否接住今晚的客人"/"能否升级面包配方"
  - 面板/属性透明但数值不急促，升级带来口味、外观或服务品质的可感提升
  - 客人 = 任务怪物；每个客人有情感需求与小故事（slice-of-life vignette）
  - 偶有外部危机（兽潮、税吏、前雇主）短暂入侵，迅速被化解回日常

planner_book_spec: |
  结构要求：
  - 主角拥有明确的"店/场所"作为主阵地（面包房、驿站、花店、温泉客栈）
  - 每卷一条季节/节日主线（春季播种、冬节宴、丰收祭）
  - 非战斗进阶树：招牌配方、装备（锅具/工具）升阶、常客关系等级
  - "员工/合作 NPC" 档案：每位有背景线，卷终均获得温暖向小收束
  - 必须保证每章至少一次"感官/美食/温暖"细节（气味、火光、热汤）

scene_review: |
  质量检查：
  - 场景里的 System 提示是否用于推进生活进度而非制造战斗？
  - 是否出现了一位有情感需求的客人/NPC 被温柔满足？
  - 美食/场景感官描写是否到位（至少 3 条感官线索：视觉/嗅觉/听觉/触觉）？
  - 冲突强度是否保持克制——避免"真正危及主角与店铺存亡"的桥段过长？

anti_patterns:
  - "用 System 强行加入战斗副本，打破治愈节奏"
  - "客人沦为面板数字，缺乏个人故事"
  - "升级带来剧情飞跃，读者失去'经营小日子'的代入感"
  - "加入过多反派/政治线（应放在副线点缀）"

obligatory_scenes:
  - code: signature_recipe
    label: "招牌配方解锁"
    timing: act_1_midpoint
    description: "第一个标志性配方/产品被系统认可并获得常客。"
  - code: tough_customer
    label: "难缠的客人变成常客"
    timing: act_2_early
    description: "一位初看刻薄或悲伤的客人被主角的手艺+共情征服，成为羁绊 NPC。"
  - code: seasonal_festival
    label: "季节性节庆"
    timing: act_2_end
    description: "全店迎接节日大考，面板任务与社群情感同时收束。"
