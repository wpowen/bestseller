# Genre Fragment: Dungeon Core (地下城核心)
# 主角是地下城本身或地下城主——经营、陷阱设计、怪物养成视角。

scene_writer: |
  This is a Dungeon Core story. Key genre elements:
  - 主角视角 = 地下城 / 地下城主 / 核心水晶——静态主角，扩散式行动
  - 行动通过召唤怪物、布置陷阱、引导冒险者来完成
  - "冒险者来袭 vs 地下城防御" 是天然的 tower-defense 节拍
  - 经营与进化并行：能量/魂力管理 + 房间解锁 + 怪物进化树
  - 怪物/召唤兽是次级 POV 来源，承担"外出探查 + 情感线"

planner_book_spec: |
  结构要求：
  - 第一章：核心觉醒 + 初始房间 + 第一只怪物召唤
  - 每卷一个"生态层级"跃迁（地表→森林→城市→跨界）
  - 怪物/召唤兽个体化：命名、人设、弱点、升阶仪式必须清晰
  - 每卷至少一场"群体冒险者入侵"高潮（tower-defense 式攻防）
  - 资源循环可视化：能量来源 → 转化 → 建造/召唤 → 收益

scene_review: |
  质量检查：
  - 主角（地下城）是否仍然通过"召唤/布置/引导"在行动？避免"临时长出脚出去打架"
  - 怪物/召唤兽是否有独立人设与情感弧？
  - 冒险者对手是否有战术层次（职业配合、策略升级），而非人形怪经验包？
  - 资源/能量系统是否保持紧张（收支表可算得清）？

anti_patterns:
  - "核心突然长出身体走动，破坏地下城视角的独特性"
  - "怪物集体工具人，没有记忆和成长"
  - "冒险者永远以同一战术冲关，缺乏策略升级"
  - "能量系统前松后紧，读者感觉数据失真"

obligatory_scenes:
  - code: core_awakening
    label: "核心觉醒"
    timing: act_1
    description: "地下城核心意识觉醒，获得第一点能量与第一个建造选项。"
  - code: first_raid
    label: "首次冒险者来袭"
    timing: act_1_end
    description: "一小队冒险者入侵，主角必须用有限资源防守，确立核心叙事循环。"
  - code: monster-bond
    label: "首只关键怪物羁绊"
    timing: act_2_midpoint
    description: "召唤一只具名怪物，成为长期伙伴并建立情感联结。"
