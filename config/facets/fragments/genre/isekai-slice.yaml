# Genre Fragment: Isekai Slice-of-Life (异世界日常)
# 穿越异界但走日常/开店/支援职业路线，无大 BOSS，氛围为王。

scene_writer: |
  This is an Isekai Slice-of-Life story. Key genre elements:
  - 主角穿越异世界但拒绝"打倒魔王"路线——开店、种菜、教书、做手艺
  - 情节引擎是"今天有谁来 / 今天做什么菜 / 今天修好什么" 的微任务链
  - 异世界奇观通过"日常切片"展示：战士来买菜、精灵来学烹饪、神祇来吃夜宵
  - 奇幻性 ≠ 危机性——魔法在本作是调味品，不是压力源
  - 与传统 isekai 区别：拒绝主角光环式无双，强调"差异文化的温柔碰撞"

planner_book_spec: |
  结构要求：
  - 第一章：穿越动机模糊化处理，核心落在"主角决定在此生活下去"
  - 每卷围绕一个季节/节庆/新客人展开
  - 主阵地清晰：客栈、面包坊、十字路口驿站、森林小屋
  - 反派 = 误会/客诉/供应链问题，可对话解决
  - 魔物/英雄/神祇作为"特别客人"，每位带一个小故事来

scene_review: |
  质量检查：
  - 本章节核心矛盾是否是日常尺度（食材、天气、小摩擦），而非救世？
  - 异世界设定是否通过"日常场景"展现（菜单、客人种族、度量衡差异）？
  - 主角是否拒绝了"英雄式"选择，选择继续经营本地生活？
  - 氛围写作是否到位——季节、食物、灯光、气味？

anti_patterns:
  - "随便蹦出来个 BOSS 把日常 isekai 拐回传统救世 isekai"
  - "穿越金手指过强，所有难题无成本解决"
  - "异世界种族沦为设定标签，没有文化差异的细节"
  - "爱情线过重，抢走 slice-of-life 基调"

obligatory_scenes:
  - code: settle_down
    label: "决定留下"
    timing: act_1
    description: "主角明确拒绝主角光环路线，选择在此地开店/落户。"
  - code: signature_service
    label: "招牌服务/商品诞生"
    timing: act_1_end
    description: "一个被异世界客人喜爱的招牌诞生（一道菜、一件手艺、一个服务）。"
  - code: legend_visits
    label: "传奇人物登门"
    timing: act_2_midpoint
    description: "一位异世界的传奇/神祇/反派以普通客人身份到访，留下故事但不改变主角路线。"
