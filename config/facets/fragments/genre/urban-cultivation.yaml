# Genre Fragment: Urban Cultivation (都市修仙 / 修仙 2.0)
# 把传统仙侠嫁接到现代都市——系统修仙、职场悟道、地铁渡劫。

scene_writer: |
  This is an Urban Cultivation (都市修仙 / 修仙 2.0) story. Key genre elements:
  - 主角在现代都市中修仙，日常、通勤、加班与灵气复苏/系统任务交织
  - 修炼资源来自现代场景：地铁灵脉、写字楼风水、外卖送餐功德
  - 宗门"分配"现代化：公司/事业单位/直播工会即宗门；KPI 即任务
  - "老祖装外挂"或"系统绑身"是典型开局；主角多为社畜、学生、职员
  - 旧修真世界的术语（渡劫、闭关、筑基）与当代生活用语混搭制造喜感

planner_book_spec: |
  结构要求：
  - 前 5 章必须同时点题：现代职业身份 + 修仙系统/传承
  - 每卷一个"现代场景灵脉/副本"（地铁、机场、烂尾楼、互联网大厂）
  - 阶段性升级锚点：初入职场级 → 筑基主管级 → 金丹总监级 → 元婴合伙人级
  - 反派层级：同事 → 部门总 → 行业龙头 → 跨界隐世宗门
  - 融合"灵气复苏"世界观时，必须写清稀缺性（并非人人觉醒）

scene_review: |
  质量检查：
  - 本场景是否做到"修仙化现代场景 or 现代化解构修仙" 两者之一？
  - 修行推进是否与现代社会身份线（升职/搞钱/恋爱）同步？
  - 爽点节奏：有没有一次清晰的"用修仙能力解决现实痛点"（挤地铁/KPI/催婚）？
  - 规则自洽：灵气复苏 / 系统修仙的外挂是否有成本，避免"无痛无敌"？

anti_patterns:
  - "只换名词——把古代宗门直接搬到现代而没有'都市感'"
  - "系统万能，任务全自动完成，无情感参与"
  - "职场线与修行线脱节，读者不知道主角在忙什么"
  - "灵气复苏设定之后，全球格局前后矛盾（时有时无）"

obligatory_scenes:
  - code: awakening_modern
    label: "都市觉醒时刻"
    timing: act_1
    description: "在最现代的场景（地铁、加班夜、直播间）触发修仙觉醒或系统绑定。"
  - code: first_urban_clash
    label: "首次用修仙碾压现代痛点"
    timing: act_1_end
    description: "通勤堵车/难缠甲方/恶邻被修仙能力四两拨千斤，建立爽点锚。"
  - code: modern_tribulation
    label: "都市化渡劫"
    timing: act_2_midpoint
    description: "天劫借由现代事件伪装（雷暴、电网故障、直播间爆款）降临。"
