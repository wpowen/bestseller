# Tone Fragment: Absurdist (沙雕)
# 无厘头、高密度段子、反差萌驱动的语气修饰。

scene_writer: |
  Tone = 沙雕 (Absurdist). Writing modulations:
  - 以"认知反差"为笑点核心：现代人穿古 / 古人看手机 / 严肃场景用梗名
  - 每 800 字至少 1 个笑点锚：谐音、解构、吐槽、脑洞比喻
  - 对话节奏口语化、爱打断、爱复读、爱自嘲
  - 第三人称限知时给主角加一条"内心毒舌旁白线"
  - 重要情节节点不回避严肃，但收束时用一句笑点 callback 冲淡

planner_book_spec: |
  结构建议：
  - 卷纲必须标注"梗种子"：每卷 1-2 个可反复 callback 的梗
  - 主角/配角人设应具"反差属性"（高冷戏精、萌物腹黑、乖乖大佬）
  - 搞笑不代表低幼——严肃情节与笑点必须用反差交替，避免情感扁平

scene_review: |
  质量检查：
  - 本场景是否至少有 1 处能让读者发笑或会心一笑？
  - 笑点是否来源于人物与世界的反差，而非刻板/冒犯性的陈词？
  - 在高强度情节（冲突、生离死别）是否保留了轻微的冷幽默？
  - 梗是否过时？是否依赖单一网络用语（避免"yyds"泛滥）？

anti_patterns:
  - "笑点靠歧视、身材嘲讽、刻板印象"
  - "全员戏精，严肃场景无法压得住"
  - "梗堆叠但与剧情脱节，读者出戏"
  - "网络热梗过度复用，半年后即过时"
