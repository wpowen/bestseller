key: apocalypse-supply-chain
name: 末日囤货升级流
version: "2.0"
description: 适合番茄系末日、囤货、重生、规则生存、势力扩张写法，强调开篇强钩子、资源差优势、危机升级和持续追读。融入情绪工程与核心循环方法论。
genres:
  - 末日
  - 科幻
  - 生存
tags:
  - 末日
  - 囤货
  - 重生
  - 规则生存
  - 资源碾压
source_notes:
  - 借鉴 Long-Novel-GPT 的阶段式长篇规划思路
  - 借鉴 NovelGenerator 的 genrePrompts + promptRegistry 设计
  - 结合番茄作者专区对开篇、节奏、追读的要求
  - 融入猫神写作方法论（情绪工程/核心循环/钩子轮换）
anti_patterns:
  - 开篇先讲大段世界观设定
  - 主角只是知道末日要来却没有立即获利动作
  - 囤货没有稀缺感、竞争感和窗口关闭压力
  - 连续几章都只在解释规则而不兑现回报
  - 爽点没有前置危机压缩（无痛囤货=无感囤货）
  - 反转靠天降物资而非提前布局和规则利用
  - 配角只做工具人搬运工，没有自己的生存逻辑
  - 钩子断裂——上章的资源危机下章完全不管
writing_profile_overrides:
  market:
    prompt_pack_key: apocalypse-supply-chain
    platform_target: 番茄小说
    reader_promise: 开篇三千字内必须让读者看到末日倒计时、主角抢先囤货和第一轮资源优势兑现。
    selling_points:
      - 重生时间差
      - 外挂商城
      - 稀缺资源
      - 规则生存
      - 势力扩张
    trope_keywords:
      - 末日
      - 囤货
      - 系统
      - 重生
      - 打脸反杀
    hook_keywords:
      - 倒计时
      - 资源窗口
      - 规则异变
      - 更大灾变
      - 背叛
    opening_strategy: 第一章前半必须亮出倒计时、主角为什么知道未来、以及第一轮抢资源动作。
    chapter_hook_strategy: 每章末抛出更稀缺的资源机会、更危险的规则异变、或更高层级的人为操控痕迹。
    pacing_profile: fast
    payoff_rhythm: 短回报高频兑现，长回报逐步通向灾变真相。
  character:
    protagonist_archetype: 先知型求生者
    protagonist_core_drive: 抢在所有人之前建立生存和统治优势
    golden_finger: 重生记忆、未来商城、资源价格差或规则漏洞
    growth_curve: 个人求生优势 -> 小队统治力 -> 区域秩序重建 -> 末日真相破局
    antagonist_mode: 民间竞争者、组织化掠夺者和灾变操盘者逐级上升
  methodology:
    emotion_spring_min_chapters: 1
    emotion_spring_max_chapters: 3
    core_loop_cycle_length: 2
    hook_min_active: 3
    hook_max_active: 6
    hook_max_age_chapters: 8
    visual_writing_mode: resource_detail
    dialogue_subtext_ratio: 0.4
    safety_net_mode: golden_finger_on_demand
    reaction_amplification: true
  world:
    mystery_density: high
    worldbuilding_density: medium
  style:
    prose_style: commercial-web-serial
    sentence_style: short-punchy
    info_density: lean
fragments:
  global_rules: |
    免费章节必须密集给出可见利益、危机升级和新信息，不允许长时间停留在准备阶段。
  planner_book_spec: |
    明确设计第一轮“抢时间窗口 -> 拿到别人拿不到的资源 -> 立刻形成优势”的成瘾链。主线不是单纯生存，而是资源、权力和末日真相三线并进。
  planner_world_spec: |
    世界规则必须直接作用于资源获取、秩序崩坏和能力成长。至少设计一个能被主角利用的规则漏洞，以及一个越往后越致命的代价机制。
  planner_cast_spec: |
    配角要服务于生存协作、资源背叛、势力竞争。反派不只是恶人，而是代表另一种更有效率但更残酷的生存逻辑。
  planner_volume_plan: |
    每卷都要有一个阶段性资源目标、一次秩序升级和一次更大真相揭露。卷尾必须明确抛出更大范围的灾变或更高层对手。
  planner_outline: |
    前三章必须完成：倒计时亮相、主角抢资源、第一次压过普通人、第一次确认末日规则与前世不同。每章都要有明确收益或损失。
  scene_writer: |
    正文优先写抢资源、抢时间、抢规则漏洞的具体动作。不要空喊末日残酷，要让读者看到资源价格、抢购手段、敌对竞争和即时收益。
  scene_review: |
    重点检查：是否足够快，是否真的让主角占到便宜，是否有资源差和规则差，章节尾是否让读者想立刻看主角下一步怎么抢。
  scene_rewrite: |
    如果场景不够抓人，优先补“即时利益、可见竞争、意外反压、下一轮更大资源窗口”，不是补抒情。
  chapter_review: |
    重点检查章节是否完成一次囤货/生存/扩张回报，并是否抛出新的升级压力。
  chapter_rewrite: |
    章节改写时优先增强危机节奏、物资细节、对手压迫和卷尾钩子，不要把节奏改慢。

  # --- 方法论扩展片段 ---
  emotion_engineering: |
    末日类情绪工程核心：
    - 压缩期：资源告急、窗口关闭、更强对手出现、队友受伤
    - 释放期：囤到稀缺物资、用信息差碾压对手、建成安全据点
    - 弹簧法：危机压1-2章再给收获，番茄系节奏快速高频
    - 爽感公式：资源稀缺度 × 竞争激烈度 × 主角信息差优势 = 爽感
    - 随机奖励：偶尔在废墟中发现意料之外的珍稀物资（超出任务预期）
    - 生存对照：每次建设成功后对比外面的混乱，强化安全感收益

  conflict_stakes: |
    末日冲突筹码设计：
    - 每次冲突必须有明确的生存筹码（食物/水/药品/燃料/据点）
    - 筹码升级路径：个人口粮 → 团队补给 → 据点控制权 → 区域资源垄断 → 末日真相
    - 极限施压BUFF：资源耗尽倒计时/更大灾变预警/叛徒泄露据点位置/多方势力围攻
    - 不允许无损获取资源——每次囤货都必须有窗口期限制和竞争对手

  hook_design: |
    末日类钩子设计：
    - information_gap型：末日真正原因、系统商城的终极目的、更大灾变的时间表
    - deadline型：食物储备天数倒计时、异变窗口期、对手的进攻时限
    - mystery型：异常的规则变化、消失的小队、夜间来自据点外的敲门声
    - desire型：传说中的地下仓库、未开发的安全区、终极生存方案
    - threat型：掠夺者盯上据点、内部叛变苗头、新型异变体出现
    每章结尾钩子示例：
    "他刚把最后一箱物资锁进仓库，系统面板突然弹出红色警告：'第二波灾变将于72小时后降临。本次等级：S。'"

  core_loop: |
    末日囤货核心循环（每1.5-2章完成一轮）：
    1. 触发(trigger)：新的资源需求/威胁/信息出现
    2. 行动(action)：囤货/探索/战斗/交易（具体过程，60%篇幅）
    3. 奖励(reward)：资源到手/据点升级/新信息解锁
    4. 投入(invest)：清点收获、规划使用、享受短暂安全感

    变体循环（防止疲劳）：
    - 每3个囤货循环后插入1个"据点日常"章节（分配物资/人际互动/休整）
    - 奖励必须有数据感：具体写出获得了多少、能维持多久、比别人多多少

  dialogue_rules: |
    末日对话规则：
    - 掠夺者说话要有粗暴感：话少力重，每句话都是最后通牒
    - 幸存者说话要有焦虑感：客气中带着算计，合作中藏着保留
    - 主角说话要信息差外露：不解释为什么知道，只说结论让人震惊
    - 打破问答：面对威胁不讨价还价，直接展示实力/资源（比如当面打开仓库门）
    - 潜台词示例：同伴说"外面的人要是知道我们有这些..."
      （潜台词：有人会来抢的。我们安全吗？）

  visual_writing: |
    末日画面感规则：
    - 资源数据化：不说"很多物资"，写"32箱军用压缩饼干、180升净水、足够12人活45天"
    - 对比镜头法：据点内的井然有序 vs 外面的废墟和饥饿的眼睛
    - 末日环境描写：灰色天空/空旷街道上的弃车/超市空荡荡的货架/远处的火光
    - 五感调动：罐头打开时的气味/净水入喉的满足感/外面异变体的嚎叫声
    - 身份烙印：主角有个习惯——每次获得新物资都会在本子上记录清单

  pacing_guidance: |
    节奏控制规则（番茄系快节奏）：
    - 资源侦察(build)：发现机会、评估风险、制定计划，1章
    - 行动执行(accelerate)：抢资源/对抗对手/利用规则，1章
    - 收获展示(climax)：物资清点、优势对比、地位变化，0.5章
    - 据点日常(breathe)：分配/休整/人际互动/新信息，0.5章
    循环节奏：build→accelerate→climax→breathe→(新循环更大规模)

  climax_design: |
    末日高潮设计模板：
    1. 多线交汇：资源争夺+势力对抗+末日真相在同一事件中碰撞
    2. 极限匮乏：物资即将耗尽/据点被围/系统商城关闭
    3. BUFF叠加：时间限制 + 多方围攻 + 内部叛变 + 新灾变降临
    4. 信息差反转：主角提前布局的暗仓/后手/规则漏洞在此刻引爆
    5. Reaction放大：掠夺者"他怎么会有这个" → 队友"你什么时候准备的" → 对手势力崩溃
    6. 收运：据点升级 + 资源碾压展示 + 新的势力来投奔

  reaction_amplification: |
    反应放大法（末日囤货核心放大器）：
    - 每次展示资源优势后写≥3个旁观者的分层反应
    - 层次：普通幸存者震惊 → 竞争者不甘 → 势力首领重新评估 → 追随者涌入
    - 数据碾压法：当别人在抢一瓶水时，主角打开仓库门——180升净水整齐排列
    - 态度转变要具体：从"你凭什么当头"到"按您的安排来"
obligatory_scenes:
  - code: apocalypse_trigger
    label: 末日降临/灾变触发
    timing: act_1
    check_keywords: ["末日", "灾变", "崩塌", "异变", "丧尸"]
  - code: first_supply_crisis
    label: 首次物资危机
    timing: act_1
    check_keywords: ["断粮", "缺水", "物资", "抢夺", "囤货"]
  - code: base_siege
    label: 据点攻防战
    timing: act_2_midpoint
    check_keywords: ["围攻", "防线", "据点", "守住", "突围"]
  - code: new_order
    label: 新秩序建立/定居
    timing: final_chapter
    check_keywords: ["秩序", "重建", "安全区", "定居", "希望"]
