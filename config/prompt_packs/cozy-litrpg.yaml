key: cozy-litrpg
name: Cozy LitRPG
version: '1.0'
description: Low-stakes LitRPG where the System serves daily crafts — baking, inn-keeping, gardening, brewing. Character-driven
  slice-of-life with transparent RPG stats, targeting Legends-and-Lattes + Royal Road cozy crowd.
genres:
- Cozy Fantasy
- LitRPG
- Slice of Life
tags:
- cozy litrpg
- slice of life
- crafting
- magical inn
- merchant mc
- found family
- system
source_notes:
- Built for the 2026 "cozy-LitRPG" wave — Systems used to bake bread, run an inn, or manage a bookshop instead of combat
- Transparent stats and progression, but paced slowly and tied to emotional beats
- Conflicts resolved by empathy, craft mastery, and community — never by combat-grinding
anti_patterns:
- Forcing a boss fight or combat dungeon to "add stakes" that break the cozy promise
- Treating System notifications as a numeric wall — they should delight, not dominate prose
- Reducing customers and townspeople to quest-givers with no inner life
- Grinding progression that makes the protagonist overpowered too fast
- Introducing betrayal, violence, or dark trauma beats inconsistent with the cozy tone
writing_profile_overrides:
  market:
    prompt_pack_key: cozy-litrpg
    platform_target: Royal Road + Kindle Unlimited
    reader_promise: Wrap the reader in warmth while giving them the satisfying click of level-ups and unlocks. Every chapter
      should feel like returning to a favorite café where the menu grows a little bit each visit.
    selling_points:
    - transparent RPG progression applied to slice-of-life
    - warm sensory atmosphere (food, seasons, hearth)
    - diverse customer cast with emotional stories
    - low-stakes progression grounded in craft mastery
    - found-family relationships that deepen across chapters
    trope_keywords:
    - cozy litrpg
    - magical inn
    - crafting
    - slice of life
    - system
    hook_keywords:
    - new recipe
    - level up
    - customer story
    - seasonal festival
    opening_strategy: Open on the protagonist arriving at or inheriting the space — the inn, the bakery, the apothecary. By
      the end of chapter 1 the System has bonded with the space and unlocked the first craft skill.
    chapter_hook_strategy: Chapter hooks are anticipation-based — a mysterious traveler at the door, a seasonal festival approaching,
      a new recipe unlock pending, a friendship deepening. Never use threat-based cliffhangers.
    pacing_profile: slow
    payoff_rhythm: Small payoff every chapter (a successful bake, a happy customer, a tiny level-up). Medium payoff every
      3-4 chapters (a relationship milestone, a recipe breakthrough, a community event). Big payoff at volume end (seasonal
      festival, place-of-belonging realization).
  character:
    protagonist_archetype: Retired/burnt-out adventurer, wanderer seeking home, or displaced modern soul — now running a gentle
      establishment
    protagonist_core_drive: Build and protect a small sanctuary where the right people are fed, housed, and heard
    antagonist_mode: Misunderstandings, rival businesses, bureaucratic pressure, a difficult customer, or a past wound — all
      resolvable through empathy or craft
  world:
    mystery_density: low
    worldbuilding_density: medium
  style:
    prose_style: literary-commercial
    sentence_style: balanced
    info_density: lean
fragments:
  global_rules: 'This is Cozy LitRPG. The System exists to celebrate daily mastery — every notification should feel like a
    small warm bell, never an alarm. All combat is off-page or avoided. Every scene must deliver at least one of: sensory
    warmth (food, weather, hearth), a relationship beat, a small craft breakthrough, or a gentle System unlock. Progression
    is real but slow — the reader should feel the protagonist''s skills deepening over time, not leaping overnight.

    '
  scene_writer: 'Lead with sensory detail. Show System notifications sparingly and as warm rewards, not data walls. Dialogue
    should feel unhurried and kind. Include at least one food/drink/sensory beat per scene. When the System levels, tie the
    number to a concrete emotional moment (someone''s face lighting up at the first bite). Use soft humor. Let silences and
    shared looks carry weight.

    '
  scene_review: 'Check: Is there sensory warmth (food/weather/hearth)? Does a relationship advance? Does the System feel celebratory
    rather than grindy? Is the conflict (if any) small-stakes and solvable through craft/empathy? Does the scene leave the
    reader warmer than they started?

    '
  scene_rewrite: 'If the scene feels flat — add a dish being prepared in sensory detail, a small System notification tied
    to mastery, a quiet customer confession, or a weather/light shift. If the scene feels too tense — soften the conflict,
    add a shared meal, or shift to a supporting cast beat.

    '
  chapter_review: 'Verify the chapter delivers warmth through at least two of: a relationship deepening, a craft milestone
    (with System reward), a sensory atmosphere set-piece, a customer''s small story, a community moment. Ensure no combat
    drift. Pacing should feel unhurried but always forward.

    '
  chapter_rewrite: 'Prioritize adding sensory richness, deepening one relationship through small dialogue, and ensuring the
    chapter''s craft/System progression is tied to an emotional beat. Cut anything that drifts toward combat or threat.

    '
  dialogue_rules: 'Dialogue should feel unhurried. Characters listen to each other. Use half-finished sentences, shared jokes,
    quiet kindness. Customers reveal their stories through small details, not monologues.

    '
