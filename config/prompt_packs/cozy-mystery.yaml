key: cozy-mystery
name: Cozy Mystery
version: '1.0'
description: Amateur sleuth, small town, quirky cast, and puzzle-driven plots — murder without the gore, optimized for KU
  series readers who binge cozy mystery series like comfort food.
genres:
- Mystery
- Cozy Mystery
tags:
- cozy mystery
- amateur sleuth
- small town
- whodunit
- series
- pets
- themed mystery
source_notes:
- Designed for the KU cozy mystery market — one of the most series-loyal audiences
- Follows fair-play mystery conventions with cozy genre warmth
- Themed cozies (bakery, bookshop, cat cafe) drive discoverability on Amazon
anti_patterns:
- Graphic violence, gore, or on-page murder — the body is discovered, not witnessed
- Protagonist who is reckless or TSTL (Too Stupid To Live) in their investigating
- Red herrings that feel unfair — the reader should be able to solve it with the clues provided
- Dark, gritty tone that breaks the cozy atmosphere
- Romance subplot that overshadows the mystery
- Pet or animal sidekick that exists only as a prop without personality
- Mystery solution that requires information not available to the reader
writing_profile_overrides:
  market:
    prompt_pack_key: cozy-mystery
    platform_target: Kindle Unlimited
    reader_promise: Deliver a fair-play whodunit wrapped in small-town charm. The reader should be engaged by the puzzle,
      charmed by the cast, and comforted by the setting. The murder is the excuse — the community is the reason they keep
      reading.
    selling_points:
    - amateur sleuth charm
    - small-town setting
    - quirky cast
    - puzzle-driven plot
    - series potential
    trope_keywords:
    - cozy mystery
    - amateur sleuth
    - small town
    - whodunit
    hook_keywords:
    - dead body
    - prime suspect
    - hidden clue
    - town secret
    opening_strategy: Open with the protagonist in their element (running the shop, attending a town event) to establish the
      cozy world. Introduce the murder by the end of chapter 1 or early in chapter 2. The protagonist must have a personal
      reason to investigate (friend is a suspect, business is threatened, they discovered the body).
    chapter_hook_strategy: End chapters with clue discoveries, suspect revelations, red herring twists, or moments of personal
      danger (mild — a warning, not a genuine threat to life). Alternate mystery hooks with community and character moments.
    pacing_profile: medium
    payoff_rhythm: A new clue or suspect every 2-3 chapters, red herring reveals at 33% and 66%, the real solution at 85-90%,
      with community warmth woven throughout.
  character:
    protagonist_archetype: Clever amateur sleuth with a day job and a knack for trouble
    protagonist_core_drive: Solve the puzzle, protect the community, and run the business
    antagonist_mode: The killer hides in plain sight among the charming townsfolk
  world:
    mystery_density: high
    worldbuilding_density: medium
  style:
    prose_style: commercial-genre
    sentence_style: balanced
    info_density: medium
fragments:
  global_rules: 'This is a cozy mystery — the murder happens off-page, the investigation drives the plot, and the small-town
    charm keeps the reader warm. The mystery must be fair-play: every clue the sleuth uses to solve the case must be available
    to the reader. Include at least three viable suspects, two genuine red herrings, and one clue hidden in plain sight. The
    tone should balance intrigue with humor and warmth. The protagonist''s day job or hobby should intersect with the investigation
    in clever ways. Series potential is essential — plant seeds for the next book''s mystery.

    '
  scene_writer: 'Write with warmth and wit. Investigation scenes should feel like conversations — the protagonist is nosy,
    not interrogating. Weave the themed element (baking, books, crafts) into every chapter. Clue scenes should be crafted
    so the reader can catch the clue on a reread but may miss it the first time — bury it in character interaction or setting
    detail. Community scenes should be charming and reveal character. The pet sidekick should have genuine personality moments.
    Use humor to leaven the mystery tension. Keep violence off-page and tone light.

    '
  scene_review: 'Check: Does the scene advance the mystery (new clue, new suspect, red herring) or deepen the community (character
    development, relationship building, themed-element moment)? Is the clue placement fair but subtle? Does the protagonist
    demonstrate cleverness without being superhuman? Is the tone warm and humorous rather than dark? Does the scene include
    the themed element (food, books, crafts, pets)? Does it end with a hook — a mystery development or a character moment
    that pulls the reader forward?

    '
  scene_rewrite: 'If a scene feels dull, add: a clue disguised as a throwaway detail, a humorous community moment, a suspect
    behaving suspiciously in a way that could be innocent, a moment with the pet sidekick, or a themed-element scene (cooking,
    crafting, organizing) that also advances the investigation. If the scene is too dark, lighten the tone with humor or warmth.
    If the mystery stalls, introduce a new piece of information from an unexpected source.

    '
  chapter_review: 'Verify the chapter advances the mystery through at least one clue, suspect interview, or revelation, while
    also containing at least one community warmth moment. The chapter should maintain the cozy tone — no graphic violence,
    no prolonged darkness. Check that the themed element appears. Ensure the chapter ending hooks the reader on either the
    mystery or the personal thread. Verify fair-play rules: no clue is used in the solution that was not available to the
    reader.

    '
  chapter_rewrite: 'Strengthen by: adding a cleverly hidden clue in dialogue or setting description, injecting a humor beat
    through the supporting cast, including a themed-element scene, tightening the chapter ending to a mystery hook or character-arc
    moment, and ensuring the protagonist is proactive in the investigation rather than stumbling onto information. Maintain
    the cozy-warm tone throughout.

    '
