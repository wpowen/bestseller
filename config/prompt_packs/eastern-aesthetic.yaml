key: eastern-aesthetic
name: 东方美学幻想录
version: '1.0'
description: 适合东方美学幻想类写法，强调诗意意象、哲学思辨、文化底蕴与水墨氛围的营造，在美学中推进叙事与角色成长。
genres:
- 东方美学幻想
tags:
- 诗意
- 水墨
- 哲思
- 意境
- 文化
- 留白
source_notes:
- 借鉴古典文学（山海经、聊斋、庄子）的意象与叙事美学
- 借鉴国风游戏与动画的视觉美学转化为文字表达的方法论
anti_patterns:
- 堆砌华丽辞藻但缺乏实质内容和情节推进
- 哲学思辨脱离角色和情节，变成作者的自我表达
- 美学风格不服务于叙事，审美与冲突完全割裂
- 只有意境没有人物弧线，角色沦为风景画中的点缀
writing_profile_overrides:
  market:
    prompt_pack_key: eastern-aesthetic
    platform_target: 晋江文学城
    reader_promise: 前三章用一个具象的意象（如一把断琴、一幅残画、一枝枯梅）锚定全书的美学基调，同时建立核心冲突和角色的情感内核。
    selling_points:
    - 诗意叙事
    - 哲学深度
    - 文化沉浸
    - 意境营造
    - 东方美学
    trope_keywords:
    - 山海经
    - 志怪
    - 琴棋书画
    - 仙侠
    - 妖灵
    - 古典
    hook_keywords:
    - 残缺之美
    - 天道轮回
    - 禁忌之境
    - 失落的技艺
  character:
    protagonist_archetype: 求道者/艺术家/隐世者（以技艺或感悟为成长路径）
  world:
    power_system_style: 意境感悟制与天道法则制并行
fragments:
  global_rules: '美学描写必须服务于叙事——每一段意境营造都要对应角色的内心状态或情节的推进。

    哲学思辨要通过角色的选择和困境来呈现，而非直接灌输给读者。

    文化元素（诗词、典故、器物、仪式）要自然融入情节，不能变成知识展示。

    留白是核心技法——不说满、不写尽，给读者想象和回味的空间。

    '
  scene_writer: '用五感写意境，但每次聚焦一到两感，不要五感齐上。优先视觉（色彩、光影）和听觉（声音、沉默）。

    善用自然意象做隐喻：季节对应心境、天气对应局势、植物对应角色性格。

    对话要有古典韵味但不晦涩——可以用四字短语、对偶句式，但要确保读者理解无障碍。

    动作描写要有"舞蹈感"——战斗也是美学表达，招式中蕴含理念和情感。

    克制形容词的使用，一个精准的动词胜过三个华丽的形容词。

    '
  chapter_review: '检查本章的美学描写是否与情节/角色情感有机关联，还是纯粹的"美文"堆砌。

    检查哲学/文化元素是否自然融入，读者是否需要额外知识才能理解。

    检查叙事节奏是否有留白——是否每段都塞满了内容，还是有呼吸的空间。

    检查角色弧线是否在美学表达中推进——本章结束时角色的认知/心境是否发生了变化。

    '
