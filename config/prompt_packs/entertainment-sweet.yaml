key: entertainment-sweet
name: 娱乐圈甜宠
version: '1.0'
description: 当代娱乐圈剧组/选秀/直播赛道的甜宠逆袭流。高糖互宠、双洁 CP、马甲身份、团宠副线。2026 番茄女频/晋江 TOP 赛道。
genres:
- 娱乐圈
- 言情
- 都市
tags:
- 娱乐圈
- 甜宠
- 双洁
- 马甲
- 团宠
- 马甲大佬
- 互宠
source_notes:
- 对标 2026 番茄女频"甜宠"/"穿越"/"双洁"三件套头部赛道
- 娱乐圈场景提供天然的"身份差 + 镜头感 + 公众议论"结构
- 避免老式虐恋/撕逼套路，主打高糖无误会互宠
anti_patterns:
- 女主靠卖惨/受虐博同情，缺乏实打实的专业能力
- 误会延长超过 2 章还不化解，读者流失
- CP 之外的配角全员恶毒，世界观扁平
- 马甲揭穿一次即用完，后续缺乏新身份层级
- 甜宠滑向低幼化，失去职业专业感
writing_profile_overrides:
  market:
    prompt_pack_key: entertainment-sweet
    platform_target: 番茄 + 晋江
    reader_promise: 每章至少一次高糖名场面 + 一次女主专业能力被见证 + 一次马甲/团宠副线的爽点爆发。全程互宠无内耗。
    selling_points:
    - 高糖互宠无误会
    - 女主多马甲大佬设定
    - 娱乐圈场景富镜头感
    - 团宠副线提供额外爽点
    - 双洁 CP 情感线干净
    trope_keywords:
    - 甜宠
    - 双洁
    - 马甲
    - 娱乐圈
    - 团宠
    - 互宠
    hook_keywords:
    - 热搜
    - 剧组
    - 直播
    - 马甲
    - 名场面
    opening_strategy: 第一章：女主在剧组/选秀现场展现专业实力 + 男主（导演/总裁/影帝）被惊艳；同时暗线铺一个她的隐藏身份/马甲。第 2-3 章一次"公众质疑→专业打脸→男主护妻"完整节拍。
    chapter_hook_strategy: 章末钩子高密度使用：马甲即将揭穿、新热搜炸开、男主撩妹进阶、团宠成员又来秀宠。避免虐心式钩子。
    pacing_profile: fast
    payoff_rhythm: 每章一次高糖互动 + 每 2-3 章一次马甲/身份爆点 + 每 5 章一次"行业/公众认可女主实力"的大爽点。
  character:
    protagonist_archetype: 看似小透明的娱乐圈新人，实为多重身份大佬（世家千金/科研天才/金融大鳄/顶级设计师）
    protagonist_core_drive: 既要在娱乐圈靠作品立足，也要保护和巩固各个身份背后的事业；一边谈甜甜的恋爱
    antagonist_mode: 心机女配/对家艺人/无良资本/家族敌人 —— 必须与女主真实能力对抗，不能凭运气
  world:
    mystery_density: low
    worldbuilding_density: low
  style:
    prose_style: commercial-genre
    sentence_style: short-punchy
    info_density: lean
fragments:
  global_rules: '这是"娱乐圈甜宠"。核心读者预期：高糖 + 专业感 + 爽点。严禁误会拖延、严禁虐女主。每场景必须同时服务两条线：(1) 女主专业/马甲展现，(2) CP 情感推进或团宠互动。公开场合要有镜头感——群众议论、弹幕、热搜作为即时反馈。

    '
  scene_writer: '句子短、节奏快、对话密度高（40%+）。公开场合必带"群众弹幕/热搜截图/工作人员旁观"等镜头感元素。甜宠场景写到位——眼神、动作、肢体接触、内心独白交织。马甲曝光场景要有清晰的"公众表情包式反应"（震惊、打脸、起哄）。

    '
  scene_review: '检查：(1) 本场景是否有甜点 or 专业能力展示？(2) 男主女主是否都有独立高光？(3) 群众/同行的即时反应是否到位？(4) 有没有出现延误型误会？(5) 团宠/马甲副线是否持续推进？

    '
  scene_rewrite: '场景平淡时：加一段弹幕/热搜、一次男主吃醋/撩妹、一次团宠替女主出头、一次专业能力被见证。

    '
  chapter_review: '章节必须同时交付：一次糖 + 一次能力 + 一次钩子。误会当章化解。禁止章末设"两人闹分手"式钩子。

    '
  chapter_rewrite: '不够甜时：加一次男主为女主破例、一次团宠秀宠、一次马甲被对家误踩雷。

    '
  dialogue_rules: '对话口语化、短、带情绪。CP 互动多用"表面怼嘴，心里甜炸"的反差。群众/粉圈发言直接以弹幕/热搜体呈现。

    '
  pacing_guidance: '单章 3000 字，前 1/4 情境设定，中 1/2 甜点+能力+钩子，末 1/4 情感/马甲推进 + 下章钩子。

    '
