key: female-palace
name: 宫斗权谋大女主
version: "1.0"
description: 适合宫斗权谋、无CP大女主、心理暗战类写法，强调权力阶梯的攀登、情感暗流的涌动、女性视角的深度与精密算计的交锋。
genres:
  - 宫斗权谋
  - 无CP大女主
  - 心理暗战
tags:
  - 宫斗
  - 权谋
  - 大女主
  - 后宫
  - 暗战
  - 人心博弈
source_notes:
  - 借鉴经典宫斗剧的权力阶梯与人际博弈结构
  - 借鉴女性向权谋小说的情感与理智交织叙事
anti_patterns:
  - 爱情解决一切问题，男性角色替女主扫除障碍
  - 女主完全被动，只靠运气或他人帮助上位
  - 反派女性角色简单化为"嫉妒的恶毒女人"
  - 权谋只停留在"下毒/陷害"的表层手段
writing_profile_overrides:
  market:
    prompt_pack_key: female-palace
    platform_target: 晋江文学城
    reader_promise: 前三章展示女主的困境与清醒认知、后宫/权力场的残酷规则和第一次以智取胜的精彩博弈。
    selling_points:
      - 权力攀升
      - 心理博弈
      - 人心算计
      - 女性成长
      - 暗流涌动
    trope_keywords:
      - 宫斗
      - 嫡庶
      - 后位
      - 夺嫡
      - 世家
      - 女官
    hook_keywords:
      - 晋封
      - 失宠
      - 结盟
      - 反杀
  character:
    protagonist_archetype: 清醒理智型大女主（重生/穿越/天生聪慧）
    golden_finger: 前世记忆、现代思维方式或极强的人心洞察力
    growth_curve: 低位求存 -> 结盟布局 -> 中宫博弈 -> 权力巅峰 -> 规则重塑
  world:
    power_system_style: 等级礼制与人际关系网并行
fragments:
  global_rules: |
    女主的每一步晋升必须付出对应的代价——资源、人情、信任或情感。不允许无代价上位。
    反派角色必须有合理的动机和自洽的逻辑，不能只是"为了坏而坏"。每个对手都要有自己的困境和诉求。
    权谋博弈要多层次：表面的礼仪交锋、中层的资源争夺、深层的人心收买与信息操控。
    感情线服务于权力线，不能反客为主。即使有感情戏，也要展现其中的利益算计和权力关系。
  planner_book_spec: |
    主线围绕"权力阶梯攀升"展开——每一级都有守门人、规则和代价。
    每卷对应一个权力层级的突破（如：低阶嫔妃 -> 中宫之争 -> 摄政/掌权）。
    人物关系网要提前规划：盟友、敌人、摇摆者各自的利益诉求和可被撬动的支点。
    暗线要埋设：女主每一次"善意"行为背后的长远布局。
  planner_outline: |
    前三章完成：女主处境建立（低位/危机）、后宫权力格局展示、第一次"表面示弱实则布局"的操作。
    每章推进至少一条线：人际关系变化/资源获取/信息收集/地位变动。
    大博弈前要有3-4章的暗线铺垫——多方势力的各自准备、错误判断和信息差。
    高潮章节要有"多方同时出手，结果出乎所有人预料"的交叉反转。
  scene_writer: |
    对话是核心武器——每句话要有表面意思和深层意思，用语气、停顿、眼神来传递潜台词。
    场景描写要注重服饰、礼仪、座次等细节，这些都是权力关系的可视化表达。
    心理描写要克制而精准——女主的内心独白展现她的分析过程，而非情绪宣泄。
    群戏要写出"场中每个人都在算计"的张力，不能只有女主和对手两个人在博弈。
  chapter_review: |
    检查女主的行动是否有合理动机和预谋，而非即兴发挥或编剧开挂。
    检查权力格局是否发生了变化——哪怕是微妙的（一个眼神、一次座次调整、一句传言）。
    检查配角是否有独立的行动逻辑，而非只在女主需要时出现。
    检查感情戏是否与权力线交织，而非独立存在的糖水戏份。
