key: game-esport
name: 游戏电竞无限流
version: "1.0"
description: 适合游戏电竞、无限流、怪物猎人类写法，强调游戏系统的规则感、数值成长的节奏感、竞技对抗的紧张感与团队配合的默契感。
genres:
  - 游戏电竞
  - 无限流
  - 怪物猎人
tags:
  - 系统
  - 数值
  - 副本
  - 竞技
  - 团队
  - 排位
source_notes:
  - 借鉴MMORPG和MOBA游戏的系统设计逻辑
  - 借鉴电竞小说的赛事节奏与团队叙事结构
anti_patterns:
  - 数值增长没有意义，战斗不受数值影响
  - 游戏规则只在对主角有利时才生效
  - 刷怪升级流水账，缺乏策略和挑战
  - 队友沦为工具人，只有主角有高光
writing_profile_overrides:
  market:
    prompt_pack_key: game-esport
    platform_target: 起点中文网
    reader_promise: 前三章展示游戏/副本的核心规则体系、主角的独特玩法思路和第一次用策略而非蛮力通关的精彩操作。
    selling_points:
      - 系统规则
      - 策略通关
      - 数值成长
      - 竞技对抗
      - 团队热血
    trope_keywords:
      - 副本
      - 排位赛
      - 隐藏职业
      - BUG利用
      - 世界BOSS
      - 公会战
    hook_keywords:
      - 隐藏成就
      - 首杀
      - 版本更新
      - 决赛圈
  character:
    protagonist_archetype: 策略型玩家/天赋操作手/老玩家回归
    golden_finger: 隐藏职业、前世记忆、独特天赋或BUG级技能组合
    growth_curve: 新手试炼 -> 排位崛起 -> 公会/战队成型 -> 顶级赛事 -> 世界级挑战
  world:
    power_system_style: 等级数值制与技能搭配制并行
fragments:
  global_rules: |
    游戏/副本规则一旦确立，必须严格遵守——主角的优势来自对规则的深度理解和创造性利用，而非规则为他开后门。
    数值成长要有可感知的阶段感：每个阶段有明确的能力上限和突破条件。
    竞技对抗要展现双方的策略博弈，而非单方面碾压。失误和翻盘要有合理的技术/策略基础。
    团队成员要有各自的定位、性格和成长弧线，不能只是主角的附属。
  planner_book_spec: |
    主线围绕"挑战-成长-更大挑战"的螺旋上升展开。
    每卷对应一个赛季/副本/赛事，有明确的目标和对手。
    系统规则手册要提前设计：职业体系、技能树、装备体系、副本机制，确保全文一致。
    对手梯队要提前规划，每个强敌要有独特的战术风格和威胁方式。
  planner_outline: |
    前三章完成：游戏世界/规则介绍、主角的独特优势展示、第一次"聪明打法"的小高光。
    每章推进至少一条线：技能/装备成长、团队磨合、对手情报、赛事进展。
    大赛/大副本前要有准备章节（分析对手、制定战术、装备调整），赛中要有多个回合和局势转换。
  scene_writer: |
    战斗/比赛场景要有"解说感"——用技能名、数值变化、冷却时间等游戏元素增强代入感。
    策略描写要让读者看懂"为什么这样做是聪明的"——对比常规打法，突出主角思路的巧妙。
    团队配合场景要写出多人视角的协同，突出默契和分工。
    紧张感来自时间压力、资源限制、对手的反制，而非单纯的实力差距。
  chapter_review: |
    检查本章的游戏规则是否与设定一致，有无前后矛盾的数值或技能效果。
    检查战斗/比赛是否有策略深度，而非"主角一顿操作就赢了"。
    检查队友/对手是否有存在感，是否推进了他们的角色弧线。
