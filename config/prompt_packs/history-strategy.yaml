key: history-strategy
name: 历史争霸权谋志
version: "1.0"
description: 适合历史争霸、重生经商、考据穿越类写法，强调历史质感、政治博弈、权力运作与时代语言风格的还原。
genres:
  - 历史争霸
  - 重生经商
  - 考据穿越
tags:
  - 权谋
  - 朝堂
  - 商战
  - 考据
  - 势力割据
  - 时代还原
source_notes:
  - 借鉴明清政治小说的权力博弈结构
  - 借鉴历史类网文的"种田-扩张-争霸"节奏模型
anti_patterns:
  - 用现代价值观和思维方式强行改造古代社会
  - 出现严重的时代错位科技或物品
  - 政治斗争简化为"好人vs坏人"的二元对立
  - 主角开挂无阻力，所有古人都是NPC
writing_profile_overrides:
  market:
    prompt_pack_key: history-strategy
    platform_target: 起点中文网
    reader_promise: 前三章交代时代背景、主角的处境与第一个可操作的破局点，展现权力格局的复杂性。
    selling_points:
      - 权谋博弈
      - 历史考据
      - 势力经营
      - 商业布局
      - 时代沉浸感
    trope_keywords:
      - 穿越
      - 重生
      - 种田
      - 争霸
      - 朝堂
      - 经商
    hook_keywords:
      - 朝局变动
      - 新政推行
      - 商路开拓
      - 势力吞并
  character:
    protagonist_archetype: 谋略型穿越者/重生者（携带历史知识或商业头脑）
    golden_finger: 历史先知、现代知识体系或重生记忆
    growth_curve: 立足求存 -> 积蓄势力 -> 区域争霸 -> 逐鹿天下
  world:
    power_system_style: 政治势力体系与经济资源体系并行
fragments:
  global_rules: |
    所有制度、器物、称谓、礼仪必须符合所设定朝代的历史背景，不可出现明显穿帮。
    主角利用"先知优势"时，必须受到信息不完整、执行困难、人心不可控等限制。
    政治博弈要呈现多方势力的利益纠葛，不能简化为主角一方独大。
    经济描写要有成本、供需、运输、人力等基本逻辑支撑。
  planner_book_spec: |
    主线围绕"主角在特定历史节点如何改变命运/格局"展开。
    每个大卷对应一个历史阶段或一场关键博弈（科举/战役/商战/政变）。
    势力关系图要提前规划，标注各方的利益诉求、可合作点和必然冲突点。
  planner_outline: |
    前三章完成：时代确认、主角身份与困境建立、第一个"历史知识可以用得上"的小事件。
    每章推进至少一条线：势力积累/人才招揽/资源获取/政治站位。
    重大历史事件前要有至少2-3章的铺垫，展现各方势力的准备和算计。
  scene_writer: |
    对话语言要有时代感，避免现代网络用语。可以半文半白，但要流畅可读。
    朝堂和商场的博弈要写出"话里有话"的层次——表面说的和真实意图不同。
    战争场面要有战术逻辑（地形、兵力、后勤、士气），不能只写个人武勇。
    描写古代生活细节（饮食、交通、住宅、衣着）来增强沉浸感。
  chapter_review: |
    检查本章是否有历史常识性错误（官职、制度、器物、称谓）。
    检查政治/商业博弈是否有多方视角，而非主角单方面碾压。
    检查主角的"先知优势"是否受到了合理限制，成功是否付出了对应代价。
