key: scifi-starwar
name: 星际科幻硬核战
version: "1.0"
description: 适合星海大战、黑科技、硬科幻类写法，强调科技体系的自洽性、太空战术、文明层级与技术代价的平衡。
genres:
  - 星海大战
  - 黑科技
tags:
  - 星际
  - 舰队
  - 科技树
  - 异星文明
  - 太空歌剧
  - 硬科幻
source_notes:
  - 借鉴硬科幻三体式的技术推演逻辑
  - 借鉴太空歌剧的文明冲突与舰队对抗模型
anti_patterns:
  - 把魔法换个科技名词就当科幻写
  - 完全无视基本物理定律（光速、热力学、能量守恒）
  - 科技没有研发成本、资源消耗和副作用
  - 外星文明只是"换了皮的人类"
writing_profile_overrides:
  market:
    prompt_pack_key: scifi-starwar
    platform_target: 起点中文网
    reader_promise: 前三章展示宏大的星际背景设定、核心科技体系的独特性和第一场展现技术差碾压的冲突。
    selling_points:
      - 舰队对决
      - 科技碾压
      - 文明碰撞
      - 星图扩张
      - 技术升级
    trope_keywords:
      - 星际战争
      - 曲速航行
      - 机甲
      - 人工智能
      - 虫族
      - 星门
    hook_keywords:
      - 新型武器
      - 未知信号
      - 文明遗迹
      - 技术突破
  character:
    protagonist_archetype: 舰长/科学家/军事天才/流浪者
    golden_finger: 超前科技蓝图、异星遗产或特殊AI辅助
    growth_curve: 边缘求存 -> 技术积累 -> 舰队成型 -> 星域争霸 -> 文明级对抗
  world:
    power_system_style: 科技等级制与资源能源制并行
fragments:
  global_rules: |
    科技体系必须内部自洽——确定基础设定（超光速方式、能源来源、通讯手段）后，所有技术发展要在此框架内推演。
    每项关键技术必须有研发成本、能源消耗、使用限制或副作用，不允许"万能科技"。
    太空战斗要考虑距离、速度、能量、散热等基本物理约束。
    异星文明要有独立的生理特征、社会结构和价值观，不能只是"长得不一样的人类"。
  planner_book_spec: |
    主线围绕"技术差距与文明冲突"展开——主角方如何在技术劣势下生存、追赶、超越。
    每卷对应一个技术代际或一场星域级战役。科技树要提前规划，标注关键技术的前置条件和解锁节点。
    文明关系图要呈现多极格局（至少三个以上势力），避免简单的二元对立。
  planner_outline: |
    前三章完成：星际背景建立（文明分布、技术水平、核心矛盾）、主角定位、第一次技术差碾压体验。
    每章推进至少一条线：技术研发/资源获取/舰队建设/外交博弈。
    大战役前要有3-5章的战略准备（情报、后勤、兵力部署、技术准备），战役本身要有多个阶段和转折。
  scene_writer: |
    太空战斗描写要有空间感和尺度感——用距离单位、能量数据、时间窗口来增强真实感。
    科技描写要"可视化"——不是堆参数，而是通过角色的操作和感受来呈现技术的效果。
    不同文明的场景要有截然不同的美学风格和生活逻辑。
    紧张感来自资源耗尽、时间窗口关闭、技术失灵，而非单纯的武力对比。
  chapter_review: |
    检查本章的科技描写是否与已建立的体系自洽，有无前后矛盾。
    检查战斗场景是否有战术逻辑，而非"主角舰队永远更强"。
    检查是否推进了技术线、势力线或文明冲突线中的至少一条。
