key: shezhu-bailan-comedy
name: 社畜摆烂沙雕
version: "1.0"
description: 社畜/打工人猝逃异世界/小山头/古代/农场，摆烂种田放飞自我，以沙雕搞笑为主调。2026 番茄/晋江新兴赛道。
genres:
  - 社畜摆烂
  - 穿越
  - 种田
  - 沙雕
tags:
  - 社畜
  - 摆烂
  - 沙雕
  - 种田
  - 躺平
  - 职场逃离
source_notes:
  - 匹配"逃离 996 / 躺平主义"社会情绪的题材
  - 沙雕喜剧 + 治愈日常双引擎驱动，避免纯搞笑的情感空心化
  - 与传统种田文区别：带强烈的"反内卷"价值观宣言
anti_patterns:
  - 笑点依赖歧视、身材嘲讽、刻板印象
  - 摆烂两章就开始打脸收割、变回爽文套路
  - 穿越后所有难题立刻被外挂解决，失去"过小日子"的细节感
  - 网络热梗堆砌但剧情空心
  - 进入后期突然转向拯救世界，破坏整本治愈基调
writing_profile_overrides:
  market:
    prompt_pack_key: shezhu-bailan-comedy
    platform_target: 番茄小说
    reader_promise: 每章让读者笑出猪叫 + 感受到"如果我也能这样摆烂该多好"的治愈。主角不是英雄，是"终于辞职"的你我他。
    selling_points:
      - 反内卷宣言
      - 沙雕段子密集
      - 日常治愈温度
      - 社畜共鸣强
    trope_keywords:
      - 社畜
      - 摆烂
      - 沙雕
      - 种田
      - 穿越
    hook_keywords:
      - 老板
      - 离职
      - 工位
      - 躺平
      - 院子
    opening_strategy: 开篇一定是"现代社畜场景"——加班到猝死/被甲方气到穿越/在地铁被挤成二维码。第一章后半部分主角已经在异世界/山头/农场里，决定"这辈子再不上班"。
    chapter_hook_strategy: 章末钩子多是"明天要不要种点别的""村口来了个怪人""系统又发了个幺蛾子任务"——低压力、高期待。
    pacing_profile: slow
    payoff_rhythm: 每章至少 3 个笑点 + 1 个微小治愈时刻（一顿饭、一次成功种瓜、一只小动物亲近）。每 5 章一次"又躲过了一波内卷诱惑"的主题性满足。
  character:
    protagonist_archetype: 典型打工人——设计师/程序员/运营/外卖员/财会，被工作耗干后获得第二次人生
    protagonist_core_drive: 绝不再卷；把"过好小日子"当作终极事业
    growth_curve: 惊慌失措 → 放飞自我 → 建立自己的"躺平同盟" → 用摆烂反向影响周围世界
    antagonist_mode: 前老板/KPI 鬼魂/新世界里的"卷王们" —— 反派代表的是"继续卷你"的诱惑
  world:
    mystery_density: low
    worldbuilding_density: medium
  style:
    prose_style: commercial-genre
    sentence_style: short-punchy
    info_density: lean
fragments:
  global_rules: |
    本作是"沙雕搞笑 + 治愈日常"。严禁在 2/3 之前进入高强度冲突。所有挑战应能被"多睡一觉 / 多喝一口汤 / 多跟邻居聊五分钟"消解。笑点必须来自人物与世界的认知反差、现代人思维与异世界/古代环境的错位，而非低俗/歧视梗。每章必须出现一次"温度瞬间"（食物香气、晨光、小动物、邻居关心）与笑点交替。
  planner_book_spec: |
    结构：Act 1 社畜 -> 穿越/辞职 -> 决定摆烂；Act 2A 建立基地（院子/铺子/山头）+ 第一批邻居/盟友；Act 2B 外部"卷文化"诱惑来袭（旧同事/家人/新世界的卷王）；Act 3 主角用摆烂哲学"击败"卷文化，保住生活方式。整本不需要救世结局，主角只需要"继续过小日子"。
  planner_world_spec: |
    世界观可以多样：古代农村、异世界村庄、末世荒山、未来殖民星。但必须保留"现代便利已失去 → 必须亲手过日子"的反差质感。设计清晰的"卷文化入侵点"（来收税的官员、招兵的军队、邀请加入的公司）作为主要外部矛盾。
  planner_cast_spec: |
    主角 + 三类配角：(1) 摆烂盟友（同样反内卷的古人/异族）；(2) 被主角治愈的卷人（前上司、勤奋邻居）；(3) 动物/系统/幼崽作为喜剧催化剂。女主/男主可选，情感线慢热。
  planner_volume_plan: |
    卷一：到达 + 初期摆烂 + 第一个被主角拐来躺平的邻居；卷二：卷文化第一次入侵（收税/征兵/招工），主角成功保住生活；卷三：主角小据点成为"反内卷圣地"，附近都来投奔；卷四（可选）：远方大世界的大 BOSS 级卷王登门，主角用终极摆烂哲学劝退。
  planner_outline: |
    章 1：现代社畜日常 + 猝死/辞职/穿越。
    章 2-3：新环境初探 + "再也不上班"的宣言。
    章 4-10：建设基地（房子、菜园、第一顿饭）+ 结识邻居。
    章 11-20：小型卷文化诱惑（赚钱机会/升级任务）出现，主角用沙雕方式拒绝。
    章末钩子：新客人/新食材/新段子。
  scene_writer: |
    对话密度高（40-50%），句子短（平均 15-25 字），吐槽即时。沙雕笑点需要反差（古人 vs 现代梗、主角期望 vs 现实结果）。务必写满五感细节（饭香、泥土味、鸡叫、阳光）——笑完后要有温度。严禁为了段子密度牺牲人物真实感。
  scene_review: |
    检查：(1) 笑点是否来自反差而非冒犯？(2) 是否至少出现一次"温度瞬间"？(3) 冲突强度是否克制？(4) 主角是否仍在坚持摆烂哲学，没有被卷文化悄悄同化？
  scene_rewrite: |
    如场景平淡：加一次"现代记忆对比"（回忆被老板骂）、一次意外收获（野菜/小动物/邻居礼物）、一个反差段子。
  chapter_review: |
    章末读者应该是"想继续看主角明天做什么" 而非"紧张下一章打谁"。检查是否仍在"过日子"轨道上，避免被误写成传统爽文。
  chapter_rewrite: |
    如果章节不小心变紧张了，用 1-2 段沙雕日常或治愈细节冲淡。
  dialogue_rules: |
    多用口语、吐槽、梗。主角内心戏带"毒舌旁白"。古人/异世界人说话保留一点"陌生感"制造认知错位。
  pacing_guidance: |
    单章 3000 字，前 1/3 日常与冲突铺陈，中 1/3 笑点密集，末 1/3 一个小收束 + 钩子。
obligatory_scenes:
  - code: resignation_moment
    label: 告别社畜（猝死/穿越/辞职）
    timing: act_1
  - code: base_established
    label: 基地建成第一顿饭
    timing: act_1
  - code: anti-grind-manifesto
    label: 明确喊出"绝不内卷"
    timing: act_1_end
  - code: temptation_rejected
    label: 拒绝第一次卷文化诱惑
    timing: act_2_midpoint
