key: suspense-mystery
name: 悬疑探案诡事录
version: "2.0"
description: 适合推理探案、规则怪谈、民俗诡事类写法，强调线索管理、红鲱鱼布局、层层递进的恐惧感与逻辑自洽的谜底揭示。融入情绪工程与核心循环方法论。
genres:
  - 推理探案
  - 规则怪谈
  - 民俗诡事
tags:
  - 线索链
  - 红鲱鱼
  - 反转
  - 禁忌
  - 诡异氛围
  - 逻辑闭环
source_notes:
  - 借鉴经典本格推理的线索公平原则
  - 借鉴克苏鲁与日式怪谈的恐惧递进结构
  - 融入猫神写作方法论（情绪工程/核心循环/钩子轮换）
anti_patterns:
  - 线索随机出现，没有前期铺垫和伏笔回收
  - 谜底揭晓靠巧合或超自然力量强行解释
  - 恐怖气氛只靠jump scare，缺乏心理层面的压迫
  - 规则怪谈的规则没有内在逻辑，纯粹为吓人而设
  - 悬念没有层层递进，一直在同一恐惧等级打转
  - 对话全是信息交换，缺乏角色间的信任博弈和潜台词
  - 钩子断裂——线索提出后长时间不推进也不排除
  - 恐惧释放没有前置安全感铺垫（无对比=无冲击）
writing_profile_overrides:
  market:
    prompt_pack_key: suspense-mystery
    platform_target: 起点中文网
    reader_promise: 前三章建立诡异事件、核心禁忌规则和主角的调查动机，每章结尾留一个让人睡不着的悬念。
    selling_points:
      - 线索拼图
      - 规则禁忌
      - 反转揭秘
      - 氛围恐惧
      - 逻辑推理
    trope_keywords:
      - 密室
      - 诅咒
      - 禁忌
      - 怪谈
      - 都市传说
      - 古村
    hook_keywords:
      - 不可能犯罪
      - 第N条规则
      - 消失的人
      - 不能回头
  character:
    protagonist_archetype: 理性调查者（刑警/记者/民俗学者/规则破解者）
    golden_finger: 异常直觉、特殊感知能力或系统性推理方法论
    growth_curve: 遭遇异常 -> 收集线索 -> 陷入死局 -> 反转破局 -> 揭示更深层真相
  world:
    power_system_style: 规则禁忌体系或超自然法则体系
  methodology:
    emotion_spring_min_chapters: 2
    emotion_spring_max_chapters: 5
    core_loop_cycle_length: 3
    hook_min_active: 4
    hook_max_active: 7
    hook_max_age_chapters: 15
    visual_writing_mode: atmosphere_immersion
    dialogue_subtext_ratio: 0.6
    safety_net_mode: logic_anchor
    reaction_amplification: true
fragments:
  global_rules: |
    所有关键线索必须在揭秘前至少出现过一次（公平推理原则）。
    红鲱鱼必须有合理存在的理由，不能是纯粹的误导废笔。
    恐惧感要从环境描写、心理暗示、认知失调三个层面递进构建。
    每条"规则"或"禁忌"必须有内在逻辑，违反后的后果要一致。
  planner_book_spec: |
    主线围绕"核心谜团"展开，谜团要分层：表层谜团（事件本身）-> 中层谜团（背后动机）-> 深层谜团（世界观真相）。
    每个卷解决一层谜团的同时，暴露下一层的入口。线索表要提前规划，标注每条线索的出现章节和回收章节。
  planner_outline: |
    前三章完成：诡异事件发生、主角被卷入、第一条核心规则/禁忌建立。
    每章必须推进至少一条线索的发现或排除。章末悬念要指向下一步调查方向，而非单纯的恐吓。
    中盘安排一次"认知颠覆"——主角以为理解了规则，实际规则比想象中更复杂。
  scene_writer: |
    氛围描写要调动五感，尤其是听觉和触觉的异常感。
    推理段落要展示主角的思维过程，让读者能跟着一起推理。
    恐惧场景要克制，用"差一点看到"比"直接展示"更有效。
    对话中要埋线索，但不能让角色说出不符合身份的信息。
  chapter_review: |
    检查本章是否推进了线索链（发现新线索/排除错误方向/深化已有线索）。
    检查氛围是否有节奏变化（不能全程高压，需要有喘息再收紧）。
    检查是否有逻辑漏洞——读者能否根据已有信息质疑主角的判断？这种质疑是否在计划之内？
    检查情绪压缩释放：恐惧高潮前是否有足够的安全感铺垫形成反差？
    检查钩子生命周期：章末是否有新悬念？是否推进了旧线索？

  # --- 方法论扩展片段 ---
  emotion_engineering: |
    悬疑类情绪工程核心：
    - 压缩期：安全感建立、日常理性、"应该没事"的自我安慰
    - 释放期：认知崩塌、规则被打破、安全感瓦解
    - 弹簧法：恐惧前必须铺安全感，至少2章"看似正常"后再打破
    - 恐惧公式：安全感越强 × 打破越突然 × 后果越不可逆 = 恐惧越深
    - 认知失调法：让读者和角色"以为理解了规则"，然后揭示规则的真正含义
    - 阶梯递进：不适→疑惑→不安→恐惧→绝望→(喘息)→更深的恐惧

  conflict_stakes: |
    悬疑冲突筹码设计：
    - 每次探索必须有明确筹码（不只是好奇心，是有人会因此丧命/消失）
    - 筹码升级路径：好奇心 → 自身安全 → 同伴安全 → 认知根基 → 存在本身
    - 极限施压BUFF：封闭空间/倒计时/同伴异变/规则变更/信任崩溃
    - 每条规则的代价要具体且一致——违反规则3的人都以同种方式消失

  hook_design: |
    悬疑类钩子设计：
    - information_gap型：被隐瞒的真相、日记中被撕掉的页码、上一批调查者的结局
    - deadline型：诅咒生效倒计时、食物耗尽、第N个夜晚即将到来
    - mystery型：不合常理的细节、重复出现的符号、角色行为的前后矛盾
    - desire型：真相的诱惑、逃脱的希望、拯救同伴的渴望
    - threat型：追踪者逼近、规则即将触发、安全区域正在缩小
    每章结尾钩子示例：
    "他终于看懂了墙上那幅画。画中人的脸——是他自己。日期是明天。"

  core_loop: |
    悬疑类核心循环（每2-3章完成一轮）：
    1. 触发(trigger)：新异常/新线索/新规则暴露
    2. 行动(action)：调查/推理/试探规则边界（70%篇幅）
    3. 奖励(reward)：理解加深（但同时暴露更深层的未知）
    4. 投入(invest)：新认知重构了之前所有线索的含义

    变体循环（防止疲劳）：
    - 每3个恐惧循环后插入1个"安全岛"章节（白天/理性分析/人际温暖）
    - 奖励形式变化：不总是发现真相，偶尔是排除假设/建立同盟/找到安全规则

  dialogue_rules: |
    悬疑对话规则：
    - 嫌疑人说话要有伪装：越自然的回答越可疑
    - 受害者说话要有恐惧层次：从"应该没事"到"求求你相信我"
    - 主角说话要有推理节奏：提问→沉默→追问（从不同角度重复关键问题）
    - 打破问答：关键时刻用沉默代替回答，用行动代替解释
    - 信息控制：角色不会无缘无故透露关键信息，每条重要信息都有其交换价格
    - 潜台词示例：证人说"那天晚上我什么都没听到"
      （潜台词：我听到了，但有人让我闭嘴。）

  visual_writing: |
    悬疑画面感规则：
    - 五感异常法：正常环境中一个感官出了问题（明明没有花，却闻到花香）
    - 限制视野法：只写手电筒照到的范围/只写雾中能看到的部分
    - 差一点法：不展示恐怖本体，写"差一点看到"比"完整展示"有效10倍
    - 环境人格化：走廊在呼吸/墙壁在渗水/房间在缩小
    - 对比冲击：极度安静后的突然声响/极度黑暗后的突然光亮

  pacing_guidance: |
    节奏控制规则：
    - 安全铺设(build)：建立正常认知、收集线索、理性分析，2-3章
    - 不安升级(accelerate)：异常增多、解释失效、安全感动摇，1-2章
    - 恐惧高潮(climax)：认知崩塌、规则失控、直面真相，1章
    - 安全岛(breathe)：白天喘息、整理线索、重建安全感（为下一轮打破做准备），1章
    循环节奏：build→build→accelerate→climax→breathe→(新循环更深层)

  climax_design: |
    悬疑高潮设计模板：
    1. 多线交汇：主线谜题+角色秘密+世界观真相在同一刻碰撞
    2. 极限封闭：逃生通道关闭/最后一条规则被触发/最信任的人是敌人
    3. BUFF叠加：封闭空间 + 倒计时 + 同伴可能是内鬼 + 规则变异
    4. 信息差反转：读者和主角一直忽略的细节（第1章就出现过）是真正的答案
    5. 认知重构：真相揭示后，前面所有"不对劲"的细节瞬间串联
    6. 余韵：真相大白后的沉默比欢呼更有力——一个"原来如此"的长叹

  reaction_amplification: |
    反应放大法（悬疑核心放大器）：
    - 恐惧时刻写≥2个角色的分层反应
    - 层次：理性者"这有合理解释" → 敏感者"我不想再待下去了" → 沉默者突然开口"你们有没有注意到..."
    - 真相揭示后：震惊→回忆所有异常细节→"原来那时候就已经..."
    - 读者视角放大：利用信息差让读者比角色先意识到危险，制造焦虑感
obligatory_scenes:
  - code: inciting_mystery
    label: 核心谜题/事件发生
    timing: act_1
    check_keywords: ["发现", "尸体", "异常", "消失", "不对劲"]
  - code: red_herring_reveal
    label: 红鲱鱼揭露
    timing: act_2_midpoint
    check_keywords: ["排除", "不是", "另有", "误导", "假象"]
  - code: detective_in_peril
    label: 调查者陷入危险
    timing: act_3
    check_keywords: ["被困", "追杀", "威胁", "陷阱", "来不及"]
  - code: truth_revelation
    label: 真相大白
    timing: final_chapter
    check_keywords: ["真相", "凶手", "原来", "一切", "揭开"]
