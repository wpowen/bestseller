key: urban-cultivation-2.0
name: 都市修仙 2.0
version: "1.0"
description: 灵气复苏后的现代都市修仙流——系统绑身、职场悟道、地铁渡劫、直播修仙。面向番茄/起点男频神话级赛道。
genres:
  - 都市修仙
  - 修仙
  - 都市
tags:
  - 修仙2.0
  - 系统修仙
  - 灵气复苏
  - 社畜逆袭
  - 打脸爽
  - 宗门分配
source_notes:
  - 为 2026 番茄 Top2 搜索词"修仙"所匹配的现代化子赛道专门设计
  - 传统仙侠术语 + 当代生活场景反差制造笑点与爽点
  - 与纯古风仙侠的区别：不走宗门坐满山、走都市通勤+职场
anti_patterns:
  - 只把古代宗门名换成公司名却保留古风生活逻辑
  - 灵气复苏忽有忽无，前后设定不自洽
  - 修仙能力只用于打斗，与主角现代身份（职业、家庭、社交）脱节
  - 系统万能无成本，每次升级都像白嫖
  - 老祖/前世记忆外挂开到满格，主角只需躺赢
writing_profile_overrides:
  market:
    prompt_pack_key: urban-cultivation-2.0
    platform_target: 番茄小说
    reader_promise: 把修仙外挂装进现代人的身体里，把渡劫过成上班、把宗门过成打工人日常。每章一次"用修仙能力爽解现实痛点"的节拍。
    selling_points:
      - 修仙 × 都市场景的高反差
      - 系统绑身金手指清晰可见
      - 每章打脸+资源结算闭环
      - 社畜/学生/小职员逆袭代入感强
    trope_keywords:
      - 修仙2.0
      - 系统
      - 都市灵气
      - 打脸
      - 马甲
    hook_keywords:
      - 觉醒
      - 灵气
      - 系统提示
      - 大佬马甲
    opening_strategy: 开篇 3 章必须同时点题——现代职业身份 + 修仙系统/老祖传承 + 第一次用修仙能力解决现实痛点（挤地铁、难缠甲方、恶邻居），建立爽点锚。
    chapter_hook_strategy: 每章结尾设下一个"不知道主角是修仙大佬的普通人即将被打脸"的钩子，或一个"新的修仙资源在现代场景中暴露"的钩子。
    pacing_profile: fast
    payoff_rhythm: 每章一次爽点（打脸/装逼/资源结算），每 3-5 章一次阶段跃迁（筑基 → 金丹 → 元婴 对应 主管 → 总监 → 合伙人）。
  character:
    protagonist_archetype: 被生活压榨的现代人——社畜、大学生、基层职员、外卖骑手，意外获得修仙传承/系统
    protagonist_core_drive: 用修仙能力重新夺回对自己生活的主导权，同时不被旧修真世界的残余吞噬
    growth_curve: 被动苟住 → 主动调用外挂 → 在现代规则里建立修仙势力 → 反向影响修真世界
    antagonist_mode: 同事/部门总/行业巨头/隐世宗门 —— 从微观职场压迫逐级升至跨界对抗
  world:
    mystery_density: medium
    worldbuilding_density: medium
  style:
    prose_style: commercial-genre
    sentence_style: short-punchy
    info_density: lean
fragments:
  global_rules: |
    这是"都市修仙 2.0"。每场景必须同时承担两条信息流：(1) 修仙体系推进（功法/灵气/境界），(2) 现代生活推进（职场/家庭/情感）。两者应互相嵌套——修仙解决现实痛点、现实事件反过来孕育修仙契机。术语混搭是乐趣所在："闭关等于年假"，"渡劫等于季度汇报"。避免纯古风写法，句子要短、对话要口语、吐槽要即时。
  planner_book_spec: |
    三幕式 + 都市场景轮换：Act 1 建立现代身份 + 系统觉醒 + 首次爽点；Act 2 主角在都市中积累修仙势力（公司/工作室/宗门），同时应对同维度对手（同事、部门、家族）；Act 3 跨界冲突——修真世界残余或灵气复苏大规模爆发，主角作为"现代修仙第一人"被迫站上前台。
  planner_world_spec: |
    世界观双层：表层是与现实 99% 一致的当代都市；里层是"灵气复苏后默默重建的隐秘修仙社会"——公司即宗门，写字楼即洞府，创投圈即丹道会。必须设计清晰的灵气分布（地铁网、老城区龙脉、景区灵穴）和系统/传承的稀缺性规则。
  planner_cast_spec: |
    核心配角至少包含：职场同事（爽点被打脸对象）、隐世前辈（传承/系统提供者）、后辈/同期觉醒者（友情+竞争）、家人（现实线牵挂）、女主/男主（CP 可选）。每人有一条都市身份线 + 一条修真身份线。
    可加"老祖/系统"作为贴身搭档，承担吐槽与喜剧功能。
  planner_volume_plan: |
    每卷一个修仙境界跃迁 + 一个都市场景主题：卷一"地铁觉醒"（主角筑基），卷二"公司攻防"（金丹），卷三"行业大洗牌"（元婴），卷四"灵气复苏全球化"（跨界）。
  planner_outline: |
    章 1-3：现代身份、生活压力、系统/传承觉醒、首次用修仙能力解决现实痛点。
    章 4-10：小范围积累（周围同事/邻居被打脸，发现第一批同类觉醒者）。
    章 11-20：进入隐秘修真圈子/公司宗门，遇到第一个真正威胁。
    章 21-30：境界跃迁 + 第一次跨圈对抗。
    章末钩子必备：打脸预告、系统任务提示、大佬视角切入。
  scene_writer: |
    句子短、信息高密度、吐槽密集。修仙术语必须与现代场景名词交替使用制造笑感。每 800-1200 字必须有一个"爽点"或"系统提示"节拍。打脸节奏要清晰：setup（反派挑衅）→ escalation（反派加码）→ reveal（主角身份/实力暴露）→ aftermath（围观反应+资源结算）。严禁出现"我当然打得过但就是不动手"的拖延。
  scene_review: |
    检查：(1) 场景是否同时推进修仙与现代身份？(2) 爽点是否闭环（装逼→打脸→结算）？(3) 术语混搭是否自然？(4) 系统/外挂是否付出了代价？(5) 吐槽密度是否达到每章 3 个以上？
  scene_rewrite: |
    如果场景平淡：加一条系统提示、一次反派挑衅、一处现代场景与修仙术语的反差笑点，或一次"路人视角的震惊反应"。
  chapter_review: |
    章末钩子必须明确（预告打脸/资源/身份暴露其一）。境界推进必须与现代事件同步。检查爽点与情感的平衡——避免整章只有打脸没有温度。
  chapter_rewrite: |
    补一个让主角"看见现代社会温情"的细节（家人、老同事、街边摊），避免主角变冷血外挂。
  opening_rules: |
    前 500 字：现代场景 + 现实痛点；500-1500 字：觉醒/传承/系统；1500-3000 字：首次用修仙能力解决现实痛点（第一次爽点）。
  pacing_guidance: |
    番茄节奏：3000 字/章，对话占 35-45%，段落短。每章末一个钩子。
obligatory_scenes:
  - code: modern_awakening
    label: 都市觉醒
    timing: act_1
  - code: first_urban_facelap
    label: 首次用修仙爽解现实痛点
    timing: act_1
  - code: sect_equivalent_reveal
    label: 现代宗门/公司面貌揭晓
    timing: act_2_midpoint
  - code: modern_tribulation
    label: 都市化渡劫
    timing: act_3
