key: urban-cultivation-2.0
name: 都市修仙 2.0
version: '1.0'
description: 灵气复苏后的现代都市修仙流——系统绑身、职场悟道、地铁渡劫、直播修仙。面向番茄/起点男频神话级赛道。
genres:
- 都市修仙
- 修仙
- 都市
tags:
- 修仙2.0
- 系统修仙
- 灵气复苏
- 社畜逆袭
- 打脸爽
- 宗门分配
source_notes:
- 为 2026 番茄 Top2 搜索词"修仙"所匹配的现代化子赛道专门设计
- 传统仙侠术语 + 当代生活场景反差制造笑点与爽点
- 与纯古风仙侠的区别：不走宗门坐满山、走都市通勤+职场
anti_patterns:
- 只把古代宗门名换成公司名却保留古风生活逻辑
- 灵气复苏忽有忽无，前后设定不自洽
- 修仙能力只用于打斗，与主角现代身份（职业、家庭、社交）脱节
- 系统万能无成本，每次升级都像白嫖
- 老祖/前世记忆外挂开到满格，主角只需躺赢
writing_profile_overrides:
  market:
    prompt_pack_key: urban-cultivation-2.0
    platform_target: 番茄小说
    reader_promise: 把修仙外挂装进现代人的身体里，把渡劫过成上班、把宗门过成打工人日常。每章一次"用修仙能力爽解现实痛点"的节拍。
    selling_points:
    - 修仙 × 都市场景的高反差
    - 系统绑身金手指清晰可见
    - 每章打脸+资源结算闭环
    - 社畜/学生/小职员逆袭代入感强
    trope_keywords:
    - 修仙2.0
    - 系统
    - 都市灵气
    - 打脸
    - 马甲
    hook_keywords:
    - 觉醒
    - 灵气
    - 系统提示
    - 大佬马甲
    opening_strategy: 开篇 3 章必须同时点题——现代职业身份 + 修仙系统/老祖传承 + 第一次用修仙能力解决现实痛点（挤地铁、难缠甲方、恶邻居），建立爽点锚。
    chapter_hook_strategy: 每章结尾设下一个"不知道主角是修仙大佬的普通人即将被打脸"的钩子，或一个"新的修仙资源在现代场景中暴露"的钩子。
    pacing_profile: fast
    payoff_rhythm: 每章一次爽点（打脸/装逼/资源结算），每 3-5 章一次阶段跃迁（筑基 → 金丹 → 元婴 对应 主管 → 总监 → 合伙人）。
  character:
    protagonist_archetype: 被生活压榨的现代人——社畜、大学生、基层职员、外卖骑手，意外获得修仙传承/系统
    protagonist_core_drive: 用修仙能力重新夺回对自己生活的主导权，同时不被旧修真世界的残余吞噬
    antagonist_mode: 同事/部门总/行业巨头/隐世宗门 —— 从微观职场压迫逐级升至跨界对抗
  world:
    mystery_density: medium
    worldbuilding_density: medium
  style:
    prose_style: commercial-genre
    sentence_style: short-punchy
    info_density: lean
fragments:
  global_rules: '这是"都市修仙 2.0"。每场景必须同时承担两条信息流：(1) 修仙体系推进（功法/灵气/境界），(2) 现代生活推进（职场/家庭/情感）。两者应互相嵌套——修仙解决现实痛点、现实事件反过来孕育修仙契机。术语混搭是乐趣所在："闭关等于年假"，"渡劫等于季度汇报"。避免纯古风写法，句子要短、对话要口语、吐槽要即时。

    '
  scene_writer: '句子短、信息高密度、吐槽密集。修仙术语必须与现代场景名词交替使用制造笑感。每 800-1200 字必须有一个"爽点"或"系统提示"节拍。打脸节奏要清晰：setup（反派挑衅）→ escalation（反派加码）→
    reveal（主角身份/实力暴露）→ aftermath（围观反应+资源结算）。严禁出现"我当然打得过但就是不动手"的拖延。

    '
  scene_review: '检查：(1) 场景是否同时推进修仙与现代身份？(2) 爽点是否闭环（装逼→打脸→结算）？(3) 术语混搭是否自然？(4) 系统/外挂是否付出了代价？(5) 吐槽密度是否达到每章 3 个以上？

    '
  scene_rewrite: '如果场景平淡：加一条系统提示、一次反派挑衅、一处现代场景与修仙术语的反差笑点，或一次"路人视角的震惊反应"。

    '
  chapter_review: '章末钩子必须明确（预告打脸/资源/身份暴露其一）。境界推进必须与现代事件同步。检查爽点与情感的平衡——避免整章只有打脸没有温度。

    '
  chapter_rewrite: '补一个让主角"看见现代社会温情"的细节（家人、老同事、街边摊），避免主角变冷血外挂。

    '
  opening_rules: '前 500 字：现代场景 + 现实痛点；500-1500 字：觉醒/传承/系统；1500-3000 字：首次用修仙能力解决现实痛点（第一次爽点）。

    '
  pacing_guidance: '番茄节奏：3000 字/章，对话占 35-45%，段落短。每章末一个钩子。

    '
