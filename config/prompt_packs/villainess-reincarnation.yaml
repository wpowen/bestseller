key: villainess-reincarnation
name: Villainess / Novel-Extra Reincarnation
version: '1.0'
description: MC reincarnates into a novel/otome game as the doomed villainess or side character and must rewrite their fate
  using foreknowledge. Political maneuvering, academy politics, and enemies-to-lovers undercurrents. Webnovel/RR 2026 breakout
  lane.
genres:
- Romantasy
- Fantasy
- Villainess
tags:
- villainess
- novel extra
- reincarnation
- regression
- academy
- enemies to lovers
- political intrigue
source_notes:
- Built for the 2026 otome-isekai / novel-extra wave
- Foreknowledge is the MC's defining asset — stories live or die by how that information gets used
- Strong romance subplot but romance is NOT the escape from doom — action is
- Blends political/academy structure with character-driven fate-rewrite arcs
anti_patterns:
- MC's reincarnation is announced then ignored — foreknowledge turns into a vague background detail
- Original protagonists (heroine, male lead) become cardboard props who defer to the MC
- Doom is avoided through "being loved" rather than through concrete strategic action
- MC cheats through every obstacle with perfect memory — kill the suspense by making them omniscient
- Romance overtakes fate-rewrite mid-book and the central premise dissolves
writing_profile_overrides:
  market:
    prompt_pack_key: villainess-reincarnation
    platform_target: Kindle Unlimited + Webnovel + Royal Road
    reader_promise: Deliver the delicious tension of knowing what's supposed to happen and racing to prevent it. Every chapter
      is either a canon checkpoint the MC must deflect or an unintended ripple from their last deflection.
    selling_points:
    - foreknowledge-as-weapon storytelling
    - canon-vs-deviation tension
    - academy/court political stage
    - enemies-to-lovers romantic undercurrents
    - found family with original-novel side characters
    trope_keywords:
    - villainess
    - novel extra
    - reincarnation
    - academy
    - fate rewrite
    hook_keywords:
    - doomed ending
    - canon event
    - deviation
    - rival glance
    opening_strategy: Chapter 1 must deliver three beats — (1) the MC's canonical execution/ruin scene (in flashback or premonition),
      (2) the awakening of past-life memory, (3) the first concrete deviation from the original script. End chapter 1 on "canon
      just changed."
    chapter_hook_strategy: Chapter hooks alternate between (a) the next canon checkpoint approaching, (b) a new ripple from
      a past deviation surfacing, (c) a character acting in ways the original novel didn't account for. Never let canon feel
      abstract.
    pacing_profile: medium
    payoff_rhythm: Every chapter, one canon deflection or unintended consequence. Every 3-4 chapters, a confrontation that
      previously ended in tragedy now resolved differently. Mid-volume — the male lead/rival notices the MC has changed. End-volume
      — a canon doom event is survived via action, not luck.
  character:
    protagonist_archetype: A reader/player of the original story reborn as its villainess, side character, or extra — intelligent,
      strategic, self-aware
    protagonist_core_drive: Survive the canon death/ruin while protecting the people the original plot was cruel to
    antagonist_mode: Canon itself. Secondary — the original heroine/male lead whose "perfect plot" gets rewritten; court factions;
      family members whose cruelty set up the original ending.
  world:
    mystery_density: medium
    worldbuilding_density: medium
  style:
    prose_style: literary-commercial
    sentence_style: balanced
    info_density: medium
fragments:
  global_rules: 'This is Villainess / Novel-Extra Reincarnation. The MC has foreknowledge of a tragic original ending and
    is actively trying to rewrite it. Every scene must explicitly or implicitly engage with canon-vs-deviation tension. When
    MC uses foreknowledge, it must cost her something (a relationship strained, a resource spent, a secret exposed). Canon
    is a character — it pushes back when deflected. Other characters (heroine, male lead, rival) retain their agency and should
    sometimes surprise the MC.

    '
  scene_writer: 'MC''s internal voice is strategic, self-aware, often amused by recognizing canon beats. Dialogue from other
    characters should feel independent — they aren''t reading her script. When the MC deploys foreknowledge, show the mental
    calculation (probability of change, cost, side effects). Avoid making her omniscient — she should sometimes be wrong because
    canon has already drifted.

    '
  scene_review: 'Check: Does this scene engage the canon-vs-deviation premise? Does the MC''s foreknowledge cost something?
    Do non-MC characters retain agency? Is the pacing keeping canon feeling alive as a looming structure? Is the romance (if
    present) a ripple from deviations, not a rescue?

    '
  scene_rewrite: 'If the scene feels floaty — anchor it to a specific canon checkpoint (event the MC remembers) and show the
    deflection. If the MC feels omniscient — add a detail she remembered wrong or a character acting off-script.

    '
  chapter_review: 'Verify: one canon-deflection beat, one unintended consequence from prior deflection, one relationship beat
    with an original-cast character, one chapter-ending hook to a looming canon event.

    '
  chapter_rewrite: 'Add either a "memory-vs-reality" mismatch, a deviation ripple surfacing, or a canon-character acting in
    unexpected ways.

    '
  reversal_design: 'Best reversals come from canon drift — an event the MC expected to remember turns out altered because
    of her earlier choices. Use these as both tension and character growth.

    '
