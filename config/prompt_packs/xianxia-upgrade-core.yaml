key: xianxia-upgrade-core
name: 仙侠升级夺机缘
version: "2.0"
description: 适合起点系修仙、玄幻、升级流写法，强调境界压制、机缘争夺、打脸与世界扩张。融入情绪工程与核心循环方法论。
genres:
  - 修仙
  - 玄幻
  - 升级
tags:
  - 境界
  - 宗门
  - 机缘
  - 打脸
  - 越阶反杀
source_notes:
  - 借鉴 Long-Novel-GPT 的分层规划
  - 借鉴 NovelGenerator 的 genre guidance 结构
  - 融入猫神写作方法论（情绪工程/核心循环/钩子轮换）
anti_patterns:
  - 境界体系只有名字，没有代价和资源条件
  - 主角一路顺推，没有同阶压制和越阶风险
  - 宗门、家族、秘境只是背景板
  - 爽点没有前置压缩（无痛升级=无感升级）
  - 反转靠天降神兵而非伏笔回收
  - 对话全是直来直去的信息交换
  - 配角只会震惊和说"不可能"
writing_profile_overrides:
  market:
    prompt_pack_key: xianxia-upgrade-core
    platform_target: 起点中文网
    reader_promise: 前几章给出主角受压环境、机缘入口和第一次打破阶层压制的机会。
    selling_points:
      - 升级突破
      - 机缘夺取
      - 势力压制
      - 越阶反杀
      - 世界地图扩张
    trope_keywords:
      - 废柴逆袭
      - 秘境
      - 宗门
      - 气运
      - 打脸
    hook_keywords:
      - 新境界
      - 秘宝
      - 宗门考核
      - 上位势力
  character:
    protagonist_archetype: 逆袭型成长主角
    golden_finger: 特殊血脉、至宝、推演能力或外挂面板
    growth_curve: 底层逆袭 -> 宗门争锋 -> 位面扩张 -> 大道争夺
  world:
    power_system_style: 境界制与资源制并行
  methodology:
    emotion_spring_min_chapters: 2
    emotion_spring_max_chapters: 4
    core_loop_cycle_length: 3
    hook_min_active: 3
    hook_max_active: 6
    hook_max_age_chapters: 12
    visual_writing_mode: action_over_description
    dialogue_subtext_ratio: 0.5
    safety_net_mode: golden_finger_intermittent
    reaction_amplification: true
fragments:
  global_rules: |
    境界提升必须伴随资源、代价、师承、风险或仇恨，不允许空升级。
  planner_book_spec: |
    主线要围绕"被压制 -> 抢机缘 -> 立威 -> 被更高层盯上"构建，不能只是被动成长。
  planner_outline: |
    前三章要快速完成受压环境、主角差异化机缘、第一次突破或立威。每章至少推进一次"实力/资源/地位"中的一个。
  scene_writer: |
    正文要突出境界差、资源差和威压感。打斗场面服务于地位变化和机缘争夺，不要只写光效。
  chapter_review: |
    检查本章是否真的推进了境界、地位、机缘或仇恨链，而不是原地踏步。
    检查情绪压缩释放节奏：有没有无痛爽点？有没有压缩不够就释放？
    检查钩子生命周期：章末是否有新钩子？是否消解了旧钩子？

  # --- 方法论扩展片段 ---
  emotion_engineering: |
    本类型的情绪工程核心：
    - 压缩期：被压制、被嘲笑、被轻视、被夺走机缘
    - 释放期：越阶反杀、打脸、获得更强机缘
    - 弹簧法：压至少2章再释放，打脸前必须有≥2次被轻视
    - 爽感公式：境界差越大 × 被轻视越深 × 反杀越干脆 = 爽感越强
    - 随机奖励：突破后偶尔获得意料之外的额外收获（超出任务预期）

  conflict_stakes: |
    冲突筹码设计规则：
    - 每次战斗/争夺必须有明确筹码（不只是胜负，是失去什么）
    - 筹码升级路径：面子 → 资源 → 亲人安危 → 师门存亡 → 大道机缘
    - 极限施压BUFF选择：境界压制（同阶碾压）/时间限制（雷劫将至）/
      群体围攻/内伤封印/必须保护的弱者
    - 不允许无筹码的切磋——切磋必须有赌注

  hook_design: |
    仙侠类钩子设计：
    - information_gap型：隐藏血脉真相、师父真实身份、宝物完整功能
    - deadline型：雷劫时限、宗门大考倒计时、丹药失效期限
    - mystery型：异象预兆、古迹谜题、诡异事件
    - desire型：更高境界的诱惑、传说中的机缘、复仇的渴望
    - threat型：上位者盯上主角、暗中追杀、势力覆灭危机
    每章结尾钩子示例：
    "正当他以为一切尘埃落定时，一道比他高三个境界的神识，突然锁定了他的位置。"

  core_loop: |
    升级流核心循环（每2-3章完成一轮）：
    1. 触发(trigger)：新的机缘出现 / 更强的对手挡路 / 新地图开启
    2. 行动(action)：修炼/闯关/争夺（过程详细，70%篇幅）
    3. 奖励(reward)：突破/获宝/地位提升（随机性！超出预期）
    4. 投入(invest)：新境界带来的财富感/安全感/实力增长

    变体循环（防止疲劳）：
    - 每3-4个升级循环后插入1个"支线呼吸口"（感情线/日常/探索）
    - 奖励必须有随机性：不总是升一级，偶尔是意外宝物/传承/领悟

  dialogue_rules: |
    仙侠对话规则：
    - 高手说话要有城府：不直说意图，用隐喻和暗示
    - 弱者说话要有特色：畏缩中带着小心机/忠诚中带着担忧
    - 反派说话要有威压：不怒自威，话少但每句话都是判决
    - 打破问答：面对挑衅不正面回应，用行动（一剑斩之）代替言语
    - 潜台词示例：师兄说"你今日的修为倒是让人刮目相看"
      （潜台词：你怎么突然变强了？你有什么秘密？）

  visual_writing: |
    仙侠画面感规则：
    - 镜头推拉法：先写大环境（万丈深渊/云海翻涌），再推进到角色动作细节
    - 结果聚焦法：不写剑有多快，写剑过之后对手才发现自己已身首异处
    - 环境交互：修炼时身体与天地灵气的具体反应（毛孔张开/骨骼碎裂重组）
    - 五感通道：修炼突破时的痛觉/灵气的气味/丹田中的轰鸣声
    - 人设烙印：给主角一个标志性习惯动作（如：战前总是转动手中的一枚玉佩）

  pacing_guidance: |
    节奏控制规则：
    - 日常修炼(build)：信息密度高，铺设关系+伏笔+世界观，2-3章
    - 冲突升级(accelerate)：节奏加快，对话短促有力，BUFF开始叠加，1-2章
    - 高潮战斗(climax)：慢镜头特写，每一招都有后果描写，1章
    - 战后喘息(breathe)：日常温馨+整理收获+新信息揭示，1章
    循环节奏：build→build→accelerate→climax→breathe→(新循环)

  climax_design: |
    升级流高潮设计模板：
    1. 多线交汇：主角在主战场 + 盟友在暗处准备 + 反派的另一重阴谋即将曝光
    2. 极限压抑：主角被封印/重伤/众叛亲离，所有人认为他必败
    3. BUFF叠加：境界碾压 + 时间限制 + 必须保护的人
    4. 信息差反转：前面埋的隐藏血脉/暗中准备的底牌在此刻引爆
    5. Reaction放大：对手震惊→长老不可置信→群众"这不可能"→旁白确认
    6. 收运：突破新境界 + 地位跃升 + 所有人态度反转 + 一句标志性台词

  character_design: |
    角色设计规则：
    - 主角三支柱：核心动机（为何修仙）+ 外在目标（当前阶段性目标）+ 致命弱点（性格/心魔）
    - 反差设计：表面平庸不显山露水 + 实际拥有逆天机缘
    - 反派四维：有理想的动机 + 具体的压迫手段 + 偶尔流露人性 + 体面的落幕
    - 配角标签：师兄(永远在喝酒) / 师妹(总是迟到) / 对手(强迫症般的整洁)
    - 群像灵魂：同门弟子共享"护山"信念，但结局各异

  reversal_design: |
    反转设计规则：
    - 身份反转：废物血脉实为上古神族后裔（前面必须有≥3处暗示）
    - 敌友反转：可信赖的人其实是卧底（前面必须有≥2处"不对劲"的细节）
    - 实力反转：被碾压的对手实为藏拙试探（前面要有观察力强的配角提出疑问）
    - 禁止：无伏笔的突然强化、从未提过的秘密武器、完全无逻辑的性格突变

  reaction_amplification: |
    反应放大法（本类型核心爽点放大器）：
    - 打脸后必须写≥3个旁观者的分层反应
    - 层次：小喽啰震惊 → 同辈不可置信 → 长老/高手重新审视 → 被打脸者崩溃
    - 每次越阶反杀后写一段"地位反转"：之前看不起的人变成恭恭敬敬
    - 金句时刻：在旁观者反应积累到顶点时，给主角一句简短有力的台词
obligatory_scenes:
  - code: first_breakthrough
    label: 首次境界突破
    timing: act_1
    check_keywords: ["突破", "晋级", "境界", "灵力", "蜕变"]
  - code: face_slap
    label: 打脸/越阶反杀
    timing: act_2_midpoint
    check_keywords: ["打脸", "反杀", "越阶", "震惊", "不可能"]
  - code: treasure_contest
    label: 机缘争夺/秘境探险
    timing: any
    check_keywords: ["秘境", "机缘", "宝物", "抢夺", "传承"]
  - code: final_tribulation
    label: 终极劫难/飞升
    timing: final_chapter
    check_keywords: ["天劫", "飞升", "大道", "证道", "登仙"]
