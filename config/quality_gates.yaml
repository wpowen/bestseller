l1_invariants:
  enabled: true

l2_bible_gate:
  enabled: true
  regen_budget: 3
  # When set, per-chapter stance/resurrection checks are treated as audit_only
  # for chapters finalized before the first run — prevents historical projects
  # from becoming un-shippable the moment L2 enforcement turns on.
  only_enforce_from_chapter: null
  checks:
    quirk_slot_requirement:
      min_quirks: 3
    tag_memory_requirement:
      enabled: true
    independent_life_requirement:
      enabled: true
    contrast_design_requirement:
      enabled: true
    antagonist_motive_ledger:
      jaccard_threshold: 0.4
    world_taxonomy_uniqueness:
      enabled: true
    naming_pool_size:
      multiplier: 2.0
    stance_flip_justification:
      enabled: true

l3_prompt_constructor:
  enabled: true
  prior_chapter_tail_chars: 800
  hot_vocab_window_chapters: 5
  hot_vocab_top_n: 20

l4_output_validator:
  enabled: true
  checks:
    language_signature:
      cjk_in_en_ratio_max: 0.02
      latin_in_zh_ratio_max: 0.10
    length_envelope:
      enabled: true
    naming_consistency:
      enabled: true
      # Rogue names must appear >= frequency_floor times before flagging; the
      # floor suppresses false positives from rare regex hits on place/title
      # words that happen to start with a surname character.
      frequency_floor: 2
    entity_density:
      enabled: true
      # Chapter 1 only — head_lines of text scanned for distinct named
      # entities; above max_entities the opening is flagged as overloading
      # reader memory.
      head_lines: 150
      max_entities: 5

l4_5_regen_loop:
  enabled: true
  budget_per_chapter: 3
  global_regen_total_budget: 12

l5_chapter_validator:
  enabled: true
  checks:
    dialog_integrity:
      enabled: true
    pov_lock:
      enabled: true
      # Sampled sentences — first half from chapter head, second half from
      # chapter tail. Higher sample_size = slower but catches drift that
      # only appears mid-chapter.
      sample_size: 40
      min_drift_sentences: 3
    repeated_beat:
      enabled: true
    canon_guardrails:
      enabled: true
    # CliffhangerRotationCheck is deferred until DiversityBudget lands
    # (Phase 3).  Leaving the block here for forward compatibility.
    cliffhanger_rotation:
      enabled: true
      no_repeat_within: 3

l6_write_gate:
  enabled: true
  default: audit_only
  mode_by_violation:
    LANG_LEAK_CJK_IN_EN: block
    LANG_LEAK_LATIN_IN_ZH: block
    LENGTH_UNDER: block
    LENGTH_OVER: block
    DIALOG_UNPAIRED: block
    REPEATED_EVENT_BEAT: block
    CANON_FORBIDDEN_TERM: block
    CANON_STATE_REGRESSION: block
    CHAPTER_GAP: block
    QUIRK_SLOT_MISSING: block
    TAG_MEMORY_MISSING: block
    CHARACTER_CONTRAST_MISSING: block
    CORE_WOUND_MISSING: block
    CHARACTER_PERSONHOOD_INCOMPLETE: block
    ANTAGONIST_MOTIVE_OVERLAP: block
    WORLD_TAXONOMY_BOILERPLATE: block
    NAMING_POOL_UNDERSIZED: block
    NAMING_OUT_OF_POOL: audit_only
    OPENING_ENTITY_OVERLOAD: audit_only
    POV_DRIFT: audit_only
    CLIFFHANGER_REPEAT: audit_only
    # Hype Engine — Phase 2. All audit_only at the gate layer; the
    # EndingSentenceImpactCheck itself emits severity="block" for the
    # first 3 chapters, which the write_gate respects via
    # violation_is_blocking (per-violation severity override).
    HYPE_MISSING: audit_only
    HYPE_REPEAT: audit_only
    ENDING_SENTENCE_WEAK: audit_only
    GOLDEN_THREE_WEAK: audit_only
    PLEASURE_HYPE_GAP: audit_only
    PLEASURE_COMEDIC_BEAT_STARVED: audit_only
    PLEASURE_SETUP_PAYOFF_DEBT: audit_only
    # Character lifecycle — Phase A. Deceased speakers and stance flips
    # without a turning-point beat must block; power-tier drift is advisory.
    CHARACTER_RESURRECTION: block
    STANCE_FLIP_UNJUSTIFIED: block
    POWER_TIER_REGRESSION: audit_only
    STANCE_FLIP_NO_ARC_BEAT: block
    CHARACTER_NAME_MISMATCH: block
    NUMERICAL_CONTRADICTION: block
    STATE_TRANSITION_UNEXPLAINED: block

story_principle_gate:
  enabled: true
  default: audit_only
  block_on_failure: false
  # Event six-step is evaluated across an event unit or outline batch, not
  # required in every chapter. These thresholds catch homogeneous chapter
  # roles while keeping the gate advisory.
  min_event_cycle_roles_per_batch: 3
  max_same_role_streak: 3

l7_continuous_audit:
  enabled: true
  auto_repair: false
  schedule_cron: "0 */6 * * *"

l8_scorecard:
  enabled: true

# ---------------------------------------------------------------------------
# Phase flags for the 2026-Q2 webnovel-writer adoption (plan:
# shimmying-soaring-gadget). Each phase is shippable independently and
# defaults OFF so historical projects are unaffected until explicitly
# enabled per-project. Toggle a flag to ``true`` to opt that project into
# the new validators / ledgers.
# ---------------------------------------------------------------------------
phase_b_line_tracker:
  enabled: false
  # Chapters before this number stay in audit_only regardless of gap
  # threshold — a project needs history before the gap check is meaningful.
  warmup_until_chapter: 10

phase_c_overrides:
  enabled: false
  # Default compound interest applied to active ChaseDebtModel balances
  # on every chapter accrual tick.
  default_interest_rate: 0.10
  # Default payback window (chapters) for a new override contract when
  # the caller doesn't specify one.
  payback_window_default: 10

phase_d_time:
  enabled: true
  # When true, TimeRegressionCheck emits soft CheckerIssue with can_override=True;
  # when false, the check is skipped entirely.
  regression_check_enabled: true
  # CountdownArithmeticCheck is hard by design — flipping this to false
  # disables the validator; it never downgrades severity.
  countdown_arithmetic_enabled: true

# ---------------------------------------------------------------------------
# AI-flavor gate — span-level "AI 味" detection + localized fixes.
# Runs after bible_gate, before signing_gate. Only patches the spans it
# flags; never rewrites unrelated prose. See
# src/bestseller/services/ai_flavor_gate.py for the full contract.
# ---------------------------------------------------------------------------
ai_flavor_gate:
  enabled: true
  # Below the warn score the gate is silent; between warn and block it
  # records soft findings; at-or-above block it auto-patches, then if the
  # post-patch score still >= block, routes the chapter to human review.
  block_score:
    cn: 50
    en: 55
  warn_score:
    cn: 25
    en: 30
  # ≥ threshold occurrences of any single cluster (e.g. weak-adverb family)
  # trigger excess-removal; first hit per phrase always survives.
  cluster_threshold: 3
  llm_rewrite:
    # When enabled, severity=block spans without a static suggestion are
    # handed to a single-sentence LLM rewrite (max max_spans_per_chapter
    # calls). If the rewrite fails or is disabled, the gate falls back to
    # deleting the whole sentence — the local prose stays intact either way.
    enabled: true
    max_spans_per_chapter: 8
  audit:
    enabled: true
    # Audit md written to <project-output>/<dir_relative>/ai-flavor-ch{N}.md
    dir_relative: "audits"
  # Pattern + replacement JSON. Edit these files (not the gate code) to
  # tune which phrases are flagged.
  data_dir: "data/ai_flavor"
  # When true (recommended), a chapter that can't be patched below the
  # block threshold is routed to human review. Flip to false only when
  # you want the gate to be advisory-only.
  block_on_residual: true
