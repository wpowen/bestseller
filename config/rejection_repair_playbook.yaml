# =============================================================================
# Rejection Repair Playbook · 拒稿原因 → 整改路径表
# =============================================================================
# 目的：
#   把"拒稿原因 → 整改策略"从作者人工连线，固化为可执行表。
#   editor 收到拒稿反馈时，直接按 cause_id 查表，得到具体的
#   diagnosis_checklist / repair_actions / replacement_strategy /
#   validation_check，不再 LLM 现编。
#
# 使用方式：
#   1. 用户输入平台拒稿原文 → 用 platform_profiles[X].rejection_signals_to_cause_map
#      解析为 cause_id。
#   2. critic 把 cause_id 写入 RewriteTask.repair_playbook_ref。
#   3. editor 读 repair_playbook[cause_id] 按 repair_actions 改写。
#   4. critic 重新跑 validation_check 验证。
# =============================================================================

version: 2026.05.14

# =============================================================================
# 拒稿原因（cause_id 与 platform_profiles 的 rejection_signals 对应）
# =============================================================================
causes:

  # ---------------------------------------------------------------------------
  # ordinary_entry · 开篇切入点比较普通
  # ---------------------------------------------------------------------------
  ordinary_entry:
    display: 开篇切入点比较普通
    typical_root_causes:
      - 第一句话只有动作 / 环境，无异常 + 紧迫感
      - 开篇用日常事件（行路 / 醒来 / 用饭 / 内心独白）切入
      - hook 类型选了最常见的（梦境 / 回忆 / 旁白介绍）
      - 第一章前 200 字无可感冲突
    diagnosis_checklist:
      - q: 第一句话同时含"动作 + 异常 + 紧迫感"吗？
        pass_if: 同时含 3 项
      - q: 前 200 字是否出现 platform_profiles.qimao.opening_signing_gate 列出的冲突类型之一？
        pass_if: 是
      - q: 当前开场属于 opening_hook_bank 哪个 hook_type？强度评分是多少？
        pass_if: strength ≥ 8
    repair_actions:
      - id: regenerate_opening_event
        priority: 1
        action: |
          从 opening_hook_bank 中重新 sample 2-3 个 hook_type（优先 strength ≥ 8）。
          按每个 hook_type 写一个候选开场（前 500 字）。
          选最强者落笔。
      - id: rewrite_first_line
        priority: 2
        action: |
          首句强制满足"动作 + 异常 + 紧迫感"。
          模板示例：
            - "X 时，[主角] 正在做 Y。" + 立刻后置一个外力打断
            - "[主角] 还没来得及 Y，[异常] 已经发生。"
            - "在 [反派/外力] 走进 X 之前，[主角] 必须做完 Y。"
      - id: front_load_conflict
        priority: 2
        action: |
          把原本在后段的冲突点（争夺 / 威胁 / 倒计时）前移到前 200 字。
          原本前段的环境 / 背景描写后移或删除。
    replacement_strategy:
      - 删除：开篇任何超过 100 字的环境 / 背景描写
      - 删除：开篇任何未推动冲突的对白（寒暄 / 问安 / 自我介绍）
      - 添加：开篇前 200 字必须出现一次反派 / 外力 / 异常的直接动作（不是"想起"）
      - 添加：主角在前 200 字必须有一次明确的"心率"——咬牙 / 手紧 / 呼吸停 等具象外显
    validation_check:
      - 前 100 字主角在场且为聚光灯 (yes/no)
      - 前 200 字出现可感冲突 (yes/no)
      - 第一句话强度评分 ≥ 0.75 (评分 0-1)

  # ---------------------------------------------------------------------------
  # weak_attraction · 缺乏足够吸引力
  # ---------------------------------------------------------------------------
  weak_attraction:
    display: 缺乏足够吸引力
    typical_root_causes:
      - 整章 hook 强度低（无未答之问 / 无倒计时 / 无威胁）
      - 主角是冷面工具人，读者无情感锚点
      - 信息密度过低（一段话只推进半步）
      - 章末勾子被前面内容稀释
    diagnosis_checklist:
      - q: 主角在前 500 字内出现 pulse_words 词表的词 ≥ 3 次？
        pass_if: 是
      - q: 每 500 字内是否有信息 / 冲突 / 情绪变化点？
        pass_if: 是
      - q: 章末 150 字内是否有明确钩子？
        pass_if: 是
    repair_actions:
      - id: inject_pulse_words
        priority: 1
        action: |
          在主角任何关键决策段前，插入一次可感心率词（platform_profiles.pulse_words）。
          频率：每 300-500 字至少一次。
          严禁用"他感到 X / 他心想 X"的总结式表达。
      - id: tighten_information_density
        priority: 2
        action: |
          检查每个 500 字段是否同时含：1 个新信息 + 1 个新冲突 / 决策 / 反应。
          只满足 0-1 项的段落必须改写或删除。
      - id: amplify_end_hook
        priority: 2
        action: |
          章末勾子前 150 字内不允许任何"总结句 / 心理沉淀句"。
          勾子要"贴脸"——直接在章末最后一句话或最后一段炸开。
    replacement_strategy:
      - 删除：心理独白 > 150 字的段落
      - 删除：章末"沈青崖看着 X，沉默不语" 类松弛尾
      - 添加：主角心率词点缀（每 300-500 字一次）
      - 添加：章末"立刻新威胁 / 新变量进场"
    validation_check:
      - 章末 150 字内有具象钩子 (yes/no)
      - pulse_words 频率 ≥ 1 / 300 字 (count)
      - 信息密度评分 ≥ 0.75 (0-1)

  # ---------------------------------------------------------------------------
  # weak_immersion · 代入感较弱
  # ---------------------------------------------------------------------------
  weak_immersion:
    display: 代入感较弱
    typical_root_causes:
      - 上帝视角 / POV 漂移
      - 主角内心戏全是"分析结论"，无"反应过程"
      - 开篇人物过多（> 5 人首章登场）
      - 主角被配角戏抢戏
    diagnosis_checklist:
      - q: POV 是否稳定限知第三人称？
        pass_if: 是
      - q: 主角内心戏是否表现为"动作-停顿-动作"而非"结论-结论-结论"？
        pass_if: 是
      - q: 首章登场角色 ≤ 5 人？
        pass_if: 是
    repair_actions:
      - id: enforce_pov_anchor
        priority: 1
        action: |
          所有内心戏 / 感官 / 判断必须明确从主角视角发出。
          删除任何"无人知 / 这一刻 / 而事实是" 类全知短句（除非显式 pov_switch_ok）。
      - id: convert_conclusion_to_process
        priority: 1
        action: |
          找出所有"主角心想 X / 主角明白 Y / 主角意识到 Z" 的句子。
          每一句改成：动作（具象） → 停顿（一个外部细节） → 反应（动作 / 短句）。
          示例：
            - 原："沈青崖明白对方是想烧掉证据。"
            - 改："沈青崖的指尖在验尸格上顿了一下。门外的脚步又近了半步。
                  他把那张纸塞进了袖子。"
      - id: cut_secondary_characters
        priority: 2
        action: |
          首章登场配角控制在 3 人内。多余配角推到第 2-3 章登场。
    replacement_strategy:
      - 删除：所有"X 心想" "X 明白" "X 意识到" 类结论句（替换为动作链）
      - 删除：首章 > 5 人登场
      - 添加：主角感官描写（看见 / 闻到 / 听见 / 触感）至少 3 次

  # ---------------------------------------------------------------------------
  # weak_satisfaction · 爽点弱 / 缺正反馈
  # ---------------------------------------------------------------------------
  weak_satisfaction:
    display: 爽点弱 / 缺正反馈
    typical_root_causes:
      - 第 1 章主角全程被压制，无任何可感胜利
      - 爽点只在主角内心存在（如他暗自冷笑），读者看不见
      - 没有反派 / 旁观者反应放大爽感
    diagnosis_checklist:
      - q: 章内主角是否完成至少一次可感正反馈（打脸 / 救成功 / 拿证据 / 揭穿伪装 / 反将一军）？
        pass_if: 是
      - q: 正反馈是否有反派或旁观者的可感反应（脸色变 / 后退 / 沉默 / 议论）？
        pass_if: 是
    repair_actions:
      - id: install_small_payoff
        priority: 1
        action: |
          在章节 60-80% 位置插入一次"可感小爽点"。可选类型：
            - 反派话被主角一句话顶回去且反派语塞 / 脸色变
            - 主角在限定时间内完成不可能的事
            - 主角揭穿一个伪装并展示证据
            - 主角救下一个人或保住一份关键证据
          注意：爽点必须可感（外显），不允许"主角心里冷笑"。
      - id: amplify_with_reaction
        priority: 1
        action: |
          爽点之后立刻切到一个旁观者（反派 / 配角 / 围观）的反应：
            脸色变化 / 动作停顿 / 沉默 / 后退半步 / 低声议论。
          层次："震惊 → 不可置信 → 后悔 / 恐惧 / 敬畏"
      - id: strip_internal_only_payoff
        priority: 2
        action: 删除任何只存在于主角内心的"胜利感"——读者看不见的爽点 = 不存在。
    replacement_strategy:
      - 添加：章内 60-80% 位置一次可感小爽点
      - 添加：爽点后至少 1 个旁观者反应
      - 删除：主角心理独白型胜利感

  # ---------------------------------------------------------------------------
  # flat_narration · 故事叙述较为平淡
  # ---------------------------------------------------------------------------
  flat_narration:
    display: 故事叙述较为平淡
    typical_root_causes:
      - 节奏匀速（无加速 / 减速 / 急停 / 反转）
      - 大段同节奏同句式
      - 缺少"动作—停顿—动作"的呼吸感
    diagnosis_checklist:
      - q: 章内是否有至少一次节奏急停（如一句话单独成段 / 一个动作戛然而止）？
        pass_if: 是
      - q: 是否有至少一次节奏加速（短句堆叠 / 紧凑动作链）？
        pass_if: 是
    repair_actions:
      - id: install_rhythm_anchors
        priority: 1
        action: |
          每 1500 字内必须有：
            - 至少 1 次节奏急停（一句话独段）
            - 至少 1 次节奏加速（≥ 3 句短句堆叠的动作链）
            - 至少 1 次外部打断（声音 / 异象 / 第三方闯入）
      - id: break_paragraph_monotony
        priority: 2
        action: |
          连续 3 段以上同长度段落 → 必须打断（中间插入一个 < 15 字的独段）。
    replacement_strategy:
      - 添加：节奏锚点（急停 + 加速 + 打断）
      - 添加：段落长度多样化

  # ---------------------------------------------------------------------------
  # mainline_unclear · 主线不清
  # ---------------------------------------------------------------------------
  mainline_unclear:
    display: 主线不清
    typical_root_causes:
      - 前 6000 字没有显性主线目标
      - 副线 / 旁支抢戏
      - 多线并行没有主次
    repair_actions:
      - id: declare_mainline_within_6000w
        priority: 1
        action: |
          前 6000 字内（通常 ch1-2）必须由主角口中或动作明确表达：
            - 我要做 X（短期目标）
            - 我必须避免 Y（损失）
            - 我下一步 Z（行动方向）
      - id: suppress_subplots
        priority: 2
        action: 前 3 章副线场景 ≤ 1 个，副线字数 ≤ 1500。

  # ---------------------------------------------------------------------------
  # weak_character_hook · 人设没亮点
  # ---------------------------------------------------------------------------
  weak_character_hook:
    display: 人设没亮点
    typical_root_causes:
      - 主角行为符合通用"冷峻 / 高手" 模板，无个人特征
      - 缺少记忆标签（口头禅 / 标志性动作 / 价值观）
      - 主角对外界刺激的反应可被任何其他角色替换
    repair_actions:
      - id: install_signature_action
        priority: 1
        action: |
          为主角设定 ≥ 1 个标志性动作 / 习惯（如：摸银针 / 数屋里东西 / 撕证物），
          在首章内出现 ≥ 2 次。
      - id: install_value_anchor
        priority: 1
        action: |
          为主角设定一句"核心价值观对白"在首章亮出（如：
          "证据不能只剩在嘴上"——这句话必须是主角对外说出，不是内心想）。
      - id: install_distinctive_response
        priority: 2
        action: |
          为主角设定一种"独特反应模式"：
            - 被威胁时，主角的反应不是"瞪回去"也不是"装怂"，
              而是某种第三种动作（如：先数一遍屋里东西 / 先撕一道证物记号）。

  # ---------------------------------------------------------------------------
  # weak_prose · 文笔还有待提升
  # ---------------------------------------------------------------------------
  weak_prose:
    display: 文笔还有待提升
    typical_root_causes:
      - 形容词堆叠 / 抽象描写多
      - 通感缺失
      - 对白功能化，无个人口吻
    repair_actions:
      - id: replace_adjectives_with_specifics
        priority: 1
        action: |
          找出所有抽象形容词（"冷峻 / 阴森 / 紧张 / 平静"），
          替换为具体名物 + 动作。
          示例：
            - 原："验尸房气氛阴森。"
            - 改："油灯矮了一寸。墙上的影子往尸台边靠。"
      - id: install_synesthesia
        priority: 2
        action: 每 1500 字至少 1 次通感（看见的味道 / 听见的温度 等）

  # ---------------------------------------------------------------------------
  # ai_voice · AI 腔
  # ---------------------------------------------------------------------------
  ai_voice:
    display: AI 腔
    typical_root_causes:
      - 模板化句式（"X 一边 Y 一边 Z" / "他不仅 X 还 Y"）
      - 平滑无棱角的过渡句
      - 对白互动模式雷同
    repair_actions:
      - id: break_template_sentences
        priority: 1
        action: |
          扫描全章，标记所有"X，一边 Y，一边 Z" "不仅 X 还 Y" "看似 X 实则 Y"
          类模板句。每个模板句必须改成单一动作 + 后续反应。
      - id: install_dialect_markers
        priority: 2
        action: |
          为每个主要角色注入 ≥ 1 个独特口吻标记
          （称谓特殊 / 用词偏好 / 拒绝某些词 / 标志性语气词）。

# =============================================================================
# 跨原因通用规则
# =============================================================================
global_rules:
  - 任何 repair_action 不允许扩写超过原章 30%（防止信息稀释）
  - editor 改写时必须用 "=== reference only ===" 围栏包裹策略文本
  - 单次 rewrite 失败后 → 用 priority: 2 的 actions 再试一次
  - 两次 rewrite 仍未通过 validation_check → accept_on_stall + 标记 status: rework
