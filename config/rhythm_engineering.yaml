# =============================================================================
# Rhythm Engineering · 节奏工程
# =============================================================================
# 目的：
#   解决"节奏单一" 根因。LLM 默认写出来"句句白开水" 节奏。
#   节奏锚点：急停 / 加速 / 延宕 / 外部打断。
# =============================================================================

version: 2026.05.14

# =============================================================================
# 节奏锚点类型
# =============================================================================
rhythm_anchors:

  hard_stop:
    display: 急停
    description: 一句话独段（≤ 10 字）打断节奏
    rule: 该独段必须是"事实陈述"，不是"心理总结"
    examples:
      - "只一拍。"
      - "齐了。"
      - "归。"
      - "数完。"

  acceleration:
    display: 加速
    description: 短句堆叠的动作链（≥ 3 句 ≤ 8 字短句连用）
    examples: |
      他左手往后一甩。
      右手摸进右袖。
      银针出袖三枚。

  delay:
    display: 延宕
    description: 一个动作被反复打断 / 拉长 / 重复，制造期待
    examples: |
      钥匙转了第一下。
      停。
      钥匙转了第二下。
      停。
      钥匙转到第三下，门"哐"地推开。

  external_interrupt:
    display: 外部打断
    description: 主角思考 / 动作进行到一半，被声音 / 异象 / 第三方闯入打断
    examples:
      - "门外又敲了一下。"
      - "正厅里传来一声瓷碗碎裂。"
      - "井底忽然传来一声笑。"

# =============================================================================
# Per-Chapter Minimum
# =============================================================================
per_chapter_minimum:
  description: 每 1500 字至少包含 4 种锚点中的 3 种
  rule: |
    一章 3000 字 → 至少 6 个锚点
    一章 5000 字 → 至少 10 个锚点
    覆盖 ≥ 3/4 锚点类型

# =============================================================================
# 段落 / 句子分布健康指标
# =============================================================================
distribution_health:
  paragraph_length_variety:
    description: 段落长度不应集中在同一区间
    rule: |
      单章中：
        ≤ 1 行段落（≤ 15 字）占比 30-50%
        2-3 行段落（16-80 字）占比 30-50%
        ≥ 4 行段落（≥ 80 字）占比 ≤ 20%
    bad_pattern: 80% 的段落都在同一长度区间 = "节奏匀速" 警告

  sentence_length_variety:
    description: 句子长度不应单一
    rule: |
      短句（≤ 10 字）占比 ≥ 40%
      中句（11-25 字）占比 30-50%
      长句（≥ 26 字）占比 ≤ 30%
    bad_pattern: 长句占比 > 50% → AI 普通话警告

# =============================================================================
# Critic 检查
# =============================================================================
critic_checks:
  rhythm_anchor_count:
    rule: 每 1500 字 ≥ 4 个锚点 + 覆盖 ≥ 3 种类型
    threshold: 见 per_chapter_minimum

  paragraph_distribution_health:
    rule: 段落长度分布在健康区间
    auto_detect: |
      统计每段 CJK 字数 → 分桶（≤15 / 16-80 / ≥81）
      检查分布是否符合 distribution_health

  sentence_distribution_health:
    rule: 句子长度分布
    auto_detect: |
      用句号 / 问号 / 感叹号切分 → 计每句字数 → 分桶
      检查分布
