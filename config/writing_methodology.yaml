# =============================================================================
# 写作方法论规则体系 (Writing Methodology Rules)
# =============================================================================
# 基于猫神写作96条的系统化提炼，融入BestSeller框架的情绪工业化写法指导。
# 此文件定义全局写作规则，供 prompt_packs、planner、drafts、reviews 统一引用。
# =============================================================================

version: "1.0"
name: 猫神写作方法论
description: |
  网文本质是情绪消费品，作者是"读者情绪系统设计师"。
  本规则体系将写作拆解为可量化、可追踪、可复制的工业化流程。

# =============================================================================
# 一、情绪工程 (Emotion Engineering)
# =============================================================================
emotion_engineering:
  description: 情绪是网文的核心货币。爽感的强度取决于前期压缩的深度。

  # 弹簧法：压缩→释放循环
  spring_model:
    compression_ratio: 0.8  # 80%篇幅用于压缩蓄能
    release_ratio: 0.2      # 20%篇幅用于释放引爆
    min_compression_chapters: 2  # 至少压缩2章再释放
    max_compression_chapters: 5  # 最多压缩5章（避免读者弃书）

  # 情绪压缩释放四阶段
  pressure_release_cycle:
    - stage: build_grievance      # 铺垫憋屈
      ratio: 0.30
      description: 制造不公、受压、被看不起的场景
    - stage: stack_contrast       # 叠加对比
      ratio: 0.50
      description: 引入对比人物、施加更大羞辱、封死正常出口
    - stage: limit_pressure       # 极限蓄能
      ratio: 0.19
      description: 所有人贬低主角、主角被逼到悬崖边缘
    - stage: reversal_explosion   # 反转引爆
      ratio: 0.01
      description: 一个瞬间翻盘，情绪瞬间爆炸

  # 爽感公式
  satisfaction_formula: |
    爽感强度 = 读者愤怒值 × 压抑时长 ÷ 正常出口数量
    规则：正常出口越少（主角越无法反驳），积累越深，释放越猛。

  rules:
    - 每个爽点前必须有≥2章的情绪铺垫
    - 不允许"无痛爽点"——没有压缩就没有释放
    - ���转时刻必须精准：在读者情绪到达顶点时立即释放
    - 释放后立即植入下一轮压缩的种子

# =============================================================================
# 二、冲突层级体系 (Conflict Hierarchy)
# =============================================================================
conflict_system:
  description: 冲突是故事的引擎。张力不在场面大小，在于筹码轻重。

  # 三层冲突同步运行
  layers:
    - level: macro      # 主线冲突
      scope: volume
      description: 贯穿整卷的核心矛盾（如：家族存亡、天下归属）
    - level: meso       # 中层冲突
      scope: chapter_arc
      description: 跨越数章的阶段性对抗（如：宗门考核、势力争夺）
    - level: micro      # 微观冲突
      scope: scene
      description: 场景内的即时对抗（如：一次谈判、一场打斗��

  # 筹码设定法
  stakes_design:
    rules:
      - 每个冲突必须明确：输了会失去什么
      - 筹码必须是主角极其珍视的（妹妹/师门/尊严/生命）
      - 筹码决定张力大小，不是场面决定张力
      - 不允许"无筹码冲突"——打了不痛不痒的架是废戏
    escalation_pattern: |
      第一卷筹码：个人尊严/小范围利益
      第二卷筹码：亲人安危/势力存亡
      第三卷筹码：大义/世界级灾难

  # 极限施压法（BUFF叠加）
  limit_pressure:
    buff_types:
      - time_limit         # 时间限制（3天内/倒计时）
      - self_restriction   # 自身限制（重伤/封印/消耗殆尽）
      - social_pressure    # 社会压力（围观嘲讽/众叛亲离）
      - moral_dilemma      # 道德两难（救一人vs救千人）
    rules:
      - 高潮场景至少叠加2个BUFF
      - 普通冲突至少1个BUFF
      - BUFF必须是真实的限制，不能随便解除

  # "但是"法则
  but_rule: |
    把所有"然后"替换成"但是"来推进剧情：
    主角想做X → 但是Y出现 → Y是意外/打击/两难
    目标达成不是终点，每个达成后紧跟一个新的"但是"。

# =============================================================================
# 三、钩子轮换系统 (Hook Rotation)
# =============================================================================
hook_system:
  description: 钩子是读者续读的唯一理由。永远不让读者心完全放下来。

  # 钩子类型
  hook_types:
    - type: information_gap    # 信息差
      description: 我知道但先不告诉你（角色身份/宝物真相/阴谋）
    - type: deadline           # 截止日期
      description: 必须在X之前完成，否则Y（倒计时紧迫感）
    - type: mystery            # 悬念
      description: 这到底是怎么回事？（反常现象/未解谜题）
    - type: desire             # 欲望
      description: 读者渴望看到某个结果（打脸/重逢/真相）
    - type: threat             # ��胁
      description: 危险正在逼近（反派行动/灾难预兆）

  # 钩子生命周期管理
  lifecycle:
    rules:
      - 每章结尾必须有≥1个活跃钩子（断章在刀尖落下前一秒）
      - 每章必须消解≥1个旧钩子（给读者满足感）
      - 每章必须植入≥1个新钩子（维持续读欲望）
      - 活跃钩子总数保持在3-7个之间（太少无悬念，太多记不住）
      - 钩子最长存活期：15章（超过则读者遗忘，变成死钩子）
    break_chapter_rule: |
      断章必须断在"刀尖落下的前一秒"：
      - 反转即将揭晓时
      - 角色做出重大决定前
      - 危机即将爆发时
      - 身份即将暴露时
      利用蔡格尼克效应：未完成的事情会占据人脑注意力。

# =============================================================================
# 四、核心循环系统 (Core Loop / Addiction Mechanism)
# =============================================================================
core_loop:
  description: |
    爆款网文的本质是将一个被验证的核心循环做到极致。
    上瘾四步模型：触发(欲望) → 行动(简单) → 奖励(随机) → 投入(财富积累)

  # 上瘾机制四步
  addiction_model:
    - step: trigger        # 触发
      driver: desire       # 驱动力：欲望
      principle: |
        用读者自己的渴望来触发——他们现实中做不到的、渴望的、愤怒的。
        不是你硬塞给他的，是他本来就想要的。
    - step: action         # 行动
      driver: simplicity   # 驱动力：简单
      principle: |
        降低阅读门槛，让读者用最少的脑力获得第一次满足。
        网文开头必须简单粗暴，不能像说明书。
    - step: reward         # 奖励
      driver: randomness   # 驱动力：随机性
      principle: |
        奖励必须是不确定的、超出预期的。
        稳定发工资不会上瘾，随机的彩票才让人欲罢不能。
        出乎意料的收获感 > 可预期的升级。
    - step: investment     # 投入
      driver: sunk_cost    # 驱动力：沉没成本
      principle: |
        让读者通过主角积累"虚拟财富"——装备/地位/后宫/领地。
        财富越多，读者越难割舍，上瘾阻力越大。

  # 核心卖点循环配置
  loop_config:
    cycle_length_chapters: [2, 3]  # 每2-3章完成一个循环
    variation_strategy: |
      骨架不变，变换皮肤：
      - 对手换人（但模式相同）
      - 场景换地（但节奏相同��
      - 奖励换物（但惊喜感相同）
    fatigue_prevention: |
      每3-4个循环后插入一个"支线呼吸口"：
      - 日常温馨/搞笑
      - 感情线推进
      - 世界观扩展
      然后迅速回到主循环。

  # 过程 > 结果
  process_over_result:
    ratio: 0.7  # 70%写变强的过程，30%写变强的结果
    rules:
      - 不要快进到结果，让读者在过程中持续获得小满足
      - 过程要详细化：具体强化了什么、提升了多少、感受到什么变化
      - 可预期的稳定变强本身就能产生安全感和满足感

# =============================================================================
# 五、角色塑造系统 (Character Design)
# =============================================================================
character_system:
  description: 角色是读者情感投射的载体。不完美才是共情的入口。

  # 角色三支柱
  three_pillars:
    - pillar: core_motivation   # 核心动机（发动机）
      question: 他为什么行动？
      description: 角色一切行为最底层的逻辑驱动力
    - pillar: external_goal     # 外在目标（导航）
      question: 他当前要干什么？
      description: ���晰、具体、有时间限制的行动方向
    - pillar: fatal_flaw        # 致命弱点（真实感）
      question: ��怕什么/缺什么？
      description: 性格缺陷或情感创伤，为成长留空间

  # 反差设计
  contrast_design:
    formula: "表面特征（极度强化）+ 隐藏本质（意想不到）"
    examples:
      - "杀人如麻的魔头 + 无可救药的猫奴"
      - "看似玩世不恭的浪子 + 内心守护纯粹真情"

  # 主角设计规则
  protagonist_rules:
    - 必须有清晰的成长线：起点→冲突→挫折→突破→新阶段
    - 弱点先行：先有弱点，后有成长
    - 代入感三层：感官代入（具体细节）→ 情感代入（共情）→ 逻辑代入（认同选择）
    - 安全感底线：读者必须确信主角最终会赢

  # 配角设计规则
  supporting_rules:
    - 功能优先：先确定功能（导师/对手/搞笑担当），再设计性格
    - 极致标签：把功能做到极端（如：贪财到骨子里、迟到令人发指）
    - 独立追求：哪怕只有几笔，也要有独立于主角之外的生活

  # 反派四维设计
  villain_design:
    dimensions:
      - dimension: motivation    # 动机
        description: 反派为什么这么做？必须合理、甚至让人理解
      - dimension: oppression    # 压迫
        description: 反派怎么压制主角？压迫越大，反杀越爽
      - dimension: humanity      # 人性
        description: 反派也有人性闪光点，不是纯恶机器
      - dimension: downfall      # 落幕
        description: 反派的结局要有重量感，不能草草收场

  # 群像写作四招
  ensemble_rules:
    - method: tag_memory         # 标签记���法
      description: 每角色1个重复性动作/口头禅标签
    - method: conflict_chain     # 冲突链驱动
      description: 角色间价值观碰撞推动剧情
    - method: spotlight_rotation # 焦点轮转法
      description: 主角为摄像机支架，关键时刻给配角200字高光
    - method: soul_grant         # 灵魂赋予法
      description: 共同底色 + 不同结局（有人牺牲/有人迷失/有人功成身退）

# =============================================================================
# 六、画面感/文笔系统 (Visual Writing)
# =============================================================================
visual_writing:
  description: |
    画面感不靠文笔华丽，靠公式和镜头感。
    核心原则：展示不讲述(Show Don't Tell)。

  # 三大公式
  formulas:
    - name: camera_pull          # 镜头推拉法
      pattern: "触发动作 → 细节描写 → 视角放大 → 情感暗示"
      rule: 用角色的行动展示，不用嘴巴形容
      example: |
        错误：小女孩很可爱，有两个小酒窝。
        正确：他一低头，发现一个还没他膝盖高的小女孩正扯着他的裤脚，
              仰着一张肉嘟嘟的小脸，可怜巴巴地看着他。

    - name: sensory_result_focus  # 感官+结果聚焦法
      pattern: "场景设置（感官）+ 关键事件 → 结果描写（感官）"
      rule: 不写事物本身有多大/多恐怖，写它造成的后果
      example: |
        错误：巨浪排山倒海而来，声音震耳欲聋。
        正确：几千吨重的巨轮像个塑料玩具一样被瞬间掀翻撕碎，
              碗口粗的大树被连根拔起像稻草一样飞上天。

    - name: persona_brand         # 人设烙印法
      pattern: "核心标签 → 行动/对话强化×N → 标志性台词引爆"
      rule: 先让人物行为反复强化标签，最后用一句话引爆
      example: |
        先通过多次行为塑造"见到顾客停下第一"的标签，
        最后说出"见到万骨如长夜"时才有分量。

  # 写作规则
  rules:
    - name: action_over_adjective
      description: 用动词代替形容词
      rule: 不写"她很紧张"，写"她的手指死死掐进掌心"

    - name: emotion_hiding
      description: 情绪隐藏术
      rule: |
        不直接写情绪词（愤怒/伤心/高兴），
        通过动作和环境传达情绪。
        错误：他很愤怒。
        正确：滂沱大雨中，他孤身一人，雨水浸透衣衫，
              死死盯着远处的背影，指甲深深掐进肉里。

    - name: environment_interaction
      description: 环境交互法
      rule: |
        人物必须与环境产生物理连接。
        角色不能像剪纸一样贴在背景板上。
        写雪山：写他冻得瑟瑟发抖，嘴唇发紫。
        写餐厅：写手里签牛排的刀狠狠切下去，暗示杀意。

    - name: multi_function_writing
      description: 一笔多用
      rule: |
        单段文字同时承载≥3个功能：
        环境交互 + 人设暗示 + 剧情伏笔 + 情感铺垫。
        例：花瓣落在笔尖让他打喷嚏 =
        (1)环境交互 (2)花粉过敏人设 (3)女主的风系能力伏笔 (4)后面用花粉杀人的线索

    - name: sensory_channels
      description: 五感叠加
      channels: [视觉, 听觉, 触觉, 嗅觉, 味觉]
      rule: 每个重要场景至少调用2个感官通道

# =============================================================================
# 七、对话写作系统 (Dialogue System)
# =============================================================================
dialogue_system:
  description: |
    对话的本质是冰山理论：水面上1/8是台词，水面下7/8让读者脑补。
    真实≠流水账，张力≠吵架。

  # 四招系统
  techniques:
    - technique: identity_voice    # 身份化语言
      description: 角色背景决定说话方式
      rule: |
        渔民、教授、杀手说话逻辑完全不同。
        每个角色说话必须带着他过往几十年生活的烙印。
        老板开除员工不说"你被开除了"，而是
        "小王啊，公司最近这情况你也看着了，养不起你这尊大佛了，去外面闯闯吧。"

    - technique: subtext           # 潜台词写作
      description: 表面表达 ≠ 内心意图
      rule: |
        想要钱的人谈梦想；想杀人的人谈慈悲。
        永远不要让角色直白表达意图。
        张力公式：内心意图与口头表达的反差越大，张力越强。
        例：想离婚的妻子不说"离婚"，而是往丈夫碗里夹一块最讨厌的肥肉，
            淡淡地说"这肉炖了一下午，烂透了，该倒了。"

    - technique: break_qa_pattern  # 打破问答逻辑
      description: 不要有问必答
      methods:
        - name: non_sequitur    # 打岔所问
          example: A问"你到底爱不爱我"，B走到窗边说"这雨要是再不停，南边的庄稼就全毁了"
        - name: counter_press   # 反问压制
          example: A问"是不是你干的"，B反问"这屋子里除了你，谁还有本事把事办得这么绝"
        - name: emotion_cut     # 情绪切断
          example: 对方谈逻辑你谈情绪，对方谈感情你谈利益

    - technique: action_beats      # 动作环境辅助
      description: 微动作反映真实内心
      rule: |
        对话中穿插微小动作细节。
        说"我一点都不紧张"的同时把烟灰抖到裤子上 = 内心恐慌。
        仇人见面不拔刀，而是继续吹汤、抱怨面煮烂了 = 极致的杀意克制。

# =============================================================================
# 八、节奏控制系统 (Pacing Control)
# =============================================================================
pacing_system:
  description: 节奏是"舒"与"缩"的交替。人设是灵魂，情节是骨架，节奏才决定生死。

  # 信息密度控制
  information_density:
    rule: |
      平缓处加信息量（世界观、关系、伏笔）
      激烈处减信息量（只写动作、对话、反应）
      进入高潮时放慢镜头（慢动作特写）
    low_density_scenes: [introspection, aftermath, daily_life]
    high_density_scenes: [conflict, chase, revelation]

  # 呼吸节奏
  breathing_pattern:
    rule: |
      紧张→紧张→紧张→呼吸口（日常/温馨/搞笑）→紧张→紧张→高潮
      连续3章高强度后必须给1章"喘息口"
      喘息口不是废话，而是植入伏笔和感情线的最佳时机

  # 断章法
  chapter_break:
    rules:
      - 断在"刀尖落下的前一秒"
      - 断在反转即将揭晓时
      - 断在角色做出重大决定前
      - 永远不要在平淡处断章

# =============================================================================
# 九、反转设计系统 (Reversal Design)
# =============================================================================
reversal_system:
  description: 最精���的反转是"原来前面早就埋下了"。反转靠信息差，不靠金手指。

  types:
    - type: information_reveal   # 信息差反转
      description: 前面埋的伏笔在此刻引爆
      rule: 反转手段必须在≥2章前提到过

    - type: logic_misdirect      # 逻辑误导
      description: 引导读者预期A → 实际是B
      rule: 误导必须合理，揭露时读者要有"原来如此"的感觉

    - type: persona_shift        # 人格底色切换
      description: 善人→恶人 / 弱者→最强 / 盟友→叛徒
      rule: 切换必须有前因（行为线索），不能凭空翻转

    - type: nested_reversal      # 套娃多重反��
      description: 一层反转套一层
      rule: 最多3层，超过则读者混乱

  anti_patterns:
    - 天降神兵式反转（突然冒出从未提过的能力/人物）
    - 无伏笔的身份暴露
    - 强行降智导致的"反转"

# =============================================================================
# 十、高潮设计系统 (Climax Architecture)
# =============================================================================
climax_system:
  description: |
    高潮的爽感80%来自前期铺垫。高潮不是打出来的，是编出来的。
    像交响乐指挥家：先沉稳，再压抑，最后疯狂宣泄。

  # 六步法
  six_steps:
    - step: multi_line_convergence  # 多线交汇
      description: 高潮前至少拉开3条独立线索，在同一时刻交汇
    - step: extreme_suppression     # 极限压抑
      description: 封死所有正常出口，让读者气得咬牙
    - step: buff_stacking           # 多重BUFF叠加
      description: 时间限制+自身限制+社会压力=绝境感
    - step: information_reversal    # 信息差反转
      description: 用伏笔回收而非金手指
    - step: perspective_switch      # 视角切换+侧面烘托
      description: 主角出招后立即写围观者震惊/发抖/后悔
    - step: emotion_harvest         # 情绪收运
      description: 地位反转+温情余韵（"废物"→"爷"）

  rules:
    - 高潮章节前必须有≥3章的压抑铺垫
    - 高潮中反转手段必须有前文伏笔支撑
    - 高潮后必须有1章"收运"：展示地位变化和情感共鸣
    - 反派必须先"得意展示"再被打脸（让他当众炫耀阴谋）

# =============================================================================
# 十一、开篇系统 (Opening Design)
# =============================================================================
opening_system:
  description: 黄金三章决定生死。3000字定生死，读者耐心为零。

  # 开篇公式
  formula:
    first_paragraph: |
      必须包含：时间+地点+人物+核心困境
      不允许：纯环境描写、背景介绍、设定铺陈
    first_chapter: |
      主角第一时间出场（聚光灯法则）
      第一章必须制造冲突
      金手指/核心卖点必须在前3章清晰展示
    golden_three:
      - chapter_1: 困境+能力介入+第一次小爽点
      - chapter_2: 冲突升级+能力边界展示+更大期待
      - chapter_3: 第一个小高潮+身份/实力初步确立

  # 聚光灯法则
  spotlight_rule: |
    开场所有聚光灯只打在主角身上：
    - 第一个出场
    - 第一个说话
    - 第一个行动
    配角全部为衬托主角服务。

  anti_patterns:
    - 开头大段环境描写
    - 主角不在第一章出场
    - 前3章无冲突无爽点
    - 复杂设定一股脑倒出
    - 模仿大神慢热开头（大神有粉丝光环，新人没有）

# =============================================================================
# 十二、安全感系统 (Reader Safety Net)
# =============================================================================
safety_net:
  description: |
    读者追更是为了"确定性的爽"。
    主角可以遇到任何危机，但读者内心必须确信两点：
    1. 主角不会死
    2. 主角一定会赢

  # 安全感构建
  construction:
    elements:
      - identity_background    # 顶级身份/出身
      - powerful_backers       # 强大后台（师父/势力/盟友）
      - golden_finger          # 金手指/外挂
    rule: 三者至少具备其一

  # 可控不安全感
  controlled_tension:
    methods:
      - golden_finger_offline    # 金手指暂时下线
      - backer_internal_conflict # 后台势力内部矛盾
      - temporary_isolation      # 主角暂时孤立
    rule: |
      制造紧张但不失控——作者手里随时有"救场牌"。
      让读者在紧张的同时内心确信主角最终必赢。

  # 循环节奏
  rhythm: "高安全感 → 短暂不安全感 → 更大安全感 → 循环升级"

# =============================================================================
# 十三、卡文破局系统 (Writer's Block Breaker)
# =============================================================================
block_breaker:
  description: 当生成质量下降或节奏停滞时，启动破局策略。

  methods:
    - method: variable_invasion     # 变量侵入
      description: 突然加入一个新变量打破当前僵局
      example: 一个意外的来客、一封突然的信、一个不相关事件的连锁反应
    - method: extreme_pressure      # 极限施压
      description: 直接把主角逼入绝境
      example: 时间缩短一半、突然暴露身份、最强敌人提前到来
    - method: endpoint_reverse      # 终点倒推
      description: 先确定想要的结局，从结局往回推
      example: 确定这一段要以"主角获得X"结束，倒推需要什么条件
    - method: foreshadow_recall     # 伏笔回收
      description: 激活前面埋下但尚未使用的伏笔
      example: 翻查 Clue 列表，找到最久未消解的伏笔，强制在当前触发

# =============================================================================
# 十四、信息控制法 (Information Control)
# =============================================================================
information_control:
  description: 信息差是制造悬念和期待的最高级手段。

  modes:
    - mode: reader_knows_character_doesnt  # 读者知道，角色不知道
      effect: 读者心提到嗓子眼（如：看到有人下毒，主角要喝）
      usage: 制造紧张感和保护欲

    - mode: character_knows_reader_doesnt  # 角色知道，读者不知道
      effect: 读者好奇"他凭什么这么淡定"
      usage: 制造期待和悬念，直到主角亮出底牌

    - mode: neither_knows                  # 双方都不知道
      effect: 共同探索的代入感
      usage: 悬疑/推理类场景

  rules:
    - 永远保留一点信息差
    - 不要把所有事情一股脑告诉读者
    - 信息拆分法：将一个核心爽点拆成多个小高潮逐层释放
    - 让剧情在"意料之外、情理之中"反复横跳

# =============================================================================
# 十五、Reaction放大法 (Reaction Amplification)
# =============================================================================
reaction_amplification:
  description: |
    主角的高光时刻不能只写主角。
    他人的反应能放大爽感10倍。

  rules:
    - 主角出招/亮底牌后，立即切换视角写旁观者反应
    - 反应层次：震惊 → 不可置信 → 后悔 → 崇拜/恐惧
    - 反派的"脸色巨变"比主角的动作描写更有冲击力
    - 群众的议论声比解说更有说服力
    - reaction_characters: 至少安排2个围观者提供反应

  formula: |
    主角展示/行动 → 观众震惊 → 观众赞美/后悔 → 读者双重爽感
    （读者同时获得：主角爽 + 观看他人被打脸的爽）
