forbidden_defaults:
- Protagonist strategic opacity without established information symmetry rules
- Reversal mechanism deployed without prior proof-of-concept
- Crisis timing following identical pattern—vary interruption sources and triggers
- Modern anachronistic humor without integration as explicit character temporal displacement
- Historical knowledge assumed without universal strategic grounding
- Advisor council homogeneity—philosophical diversity required
- Alliance partner timing feeling manufactured rather than organically motivated
- '{''pattern'': ''exposition_through_standalone_dialogue'', ''description'': ''Teaching
  moments must integrate with action rather than pause narrative''}'
- '{''pattern'': ''excessive_dormant_power_activation'', ''description'': ''Limit
  protective power triggers; each activation must feel earned and dangerous''}'
- '{''pattern'': ''companion_dilution'', ''description'': ''Animal companions require
  distinct narrative functions; avoid quantity over quality''}'
- '{''pattern'': ''artificial_cliffhanger'', ''description'': ''Pursuit hooks must
  have logical momentum; avoid pure danger-seeking without motivation''}'
- '{''pattern'': ''intelligence_inconsistency'', ''description'': ''Protagonist cost-benefit
  reasoning for defying warnings must remain consistent''}'
- '{''pattern'': ''resurrection_armor'', ''description'': ''Dormant power must carry
  meaningful cost or limitation, not pure plot armor''}'
