- emotional_core_contract
- satisfaction_contract
- competence_engine_contract
- '{''contract'': ''Power demonstration precedes explanation'', ''enforcement'': ''Combat
  and ritual sequences must showcase capabilities through action before internal monologue
  details mechanics''}'
- '{''contract'': ''Moral ambiguity as premise not arc'', ''enforcement'': "Protagonist''s
  willingness to use corpse cultivation and violent methods must be established in
  opening act; no moral conflict arc required"}'
- '{''contract'': ''Institutional integration requires bureaucratic cost'', ''enforcement'':
  ''Every political advantage gained through government department must incur operational
  obligations and factional constraints''}'
- '{''contract'': ''Romantic consolidation over fragmentation'', ''enforcement'':
  ''Primary romantic arc must be established by 30% story progress; competing interests
  subordinated to main trajectory''}'
- '{''contract'': ''Expositional delivery through ritual performance'', ''enforcement'':
  ''World rules emerge through character preparation and internal monologue during
  technique execution; author voice absent from explanation''}'
- '{''contract'': ''Cumulative damage mechanics'', ''enforcement'': ''Power progression
  must demonstrate costs through exhaustion, cumulative damage reduction, or capability
  limits; victories pyrrhic rather than clean''}'
- system_interface_must_serve_diegetic_function_rather_than_exposition_shortcut
- numerical_feedback_must_contrast_with_physical_cost_not_replace_it
- quest_rewards_must_require_narrative_cost_beyond_mechanical_completion
- tier_breakthroughs_must_invoke_internal_struggle_not_automatic_success
- observer_witnessing_must_create_ambient_pressure_not_merely_validation
- countdown_deadlines_must_have_flexible_interpretation_space
- comedic_relief_must_anchor_to_character_not_reduce_tension
- antagonist_competence_must_scale_with_protagonist_growth
- protagonist maintains knowledge asymmetry advantage through modern expertise (medicine,
  strategy, poetry) against premodern opponents
- romantic attachments develop through graduated escalation with power-differential
  intimacy, avoiding non-consensual thresholds
- political positioning progresses from peripheral observer through integrated advisor
  to indispensable power broker
- reader vicarious power fantasy achieved through competence validation, foreknowledge
  superiority, and strategic manipulation success
- dramatic irony sustained through protagonist concealment necessity versus exploitation
  opportunity tension
