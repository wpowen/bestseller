required_contracts:
- Protagonist must maintain consistent strategic transparency—reader always understands
  the layered plan before final revelation
- Staged defeat mechanism requires early proof-of-concept reversal to establish trust
- Advisor council voices must remain distinct and philosophically consistent throughout
- Alliance partner activation must feel organically timed, not artificially convenient
- Historical parallels must function as universal strategic logic, not domain-specific
  knowledge tests
- Crisis-survival-reward progression cycle must deliver tangible cultivation benefit
  on resolution
- Dormant protective power activation requires near-fatal threshold with escalating
  danger
- Creature taming requires will-dominance confrontation before acquisition
- Protagonist must demonstrate preparation-based problem-solving rather than reckless
  luck
- Comedic relief must punctuate tension rather than dominate narrative
