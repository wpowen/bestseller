key: distillation-generic
name: 'Grammar Patch: Cultivation Supernatural with Institutional Politics'
source_ids:
- source-0004
status: approved
applies_to_categories:
- cultivation fantasy
- urban fantasy
- supernatural thriller
- corpse cultivation
- Chinese mythology
- anti-hero protagonist
required_contracts:
- contract: Power demonstration precedes explanation
  enforcement: Combat and ritual sequences must showcase capabilities through action
    before internal monologue details mechanics
- contract: Moral ambiguity as premise not arc
  enforcement: Protagonist's willingness to use corpse cultivation and violent methods
    must be established in opening act; no moral conflict arc required
- contract: Institutional integration requires bureaucratic cost
  enforcement: Every political advantage gained through government department must
    incur operational obligations and factional constraints
- contract: Romantic consolidation over fragmentation
  enforcement: Primary romantic arc must be established by 30% story progress; competing
    interests subordinated to main trajectory
- contract: Expositional delivery through ritual performance
  enforcement: World rules emerge through character preparation and internal monologue
    during technique execution; author voice absent from explanation
- contract: Cumulative damage mechanics
  enforcement: Power progression must demonstrate costs through exhaustion, cumulative
    damage reduction, or capability limits; victories pyrrhic rather than clean
state_variables:
- variable: protagonist_power_cap
  tracking: Current maximum combat capability with escalation ceiling and institutional
    constraints
  boundaries:
  - Institutional authority limits application
  - Exhaustion mechanics reduce effective power
  - Artifact dependency creates vulnerability
- variable: revenge_progress
  tracking: Generational trauma resolution across multi-volume arc
  checkpoints:
  - Primary antagonist identification
  - Underlying conspiracy reveal
  - Full backstory delivery
  - Emotional resolution
- variable: romantic_stability
  tracking: Primary relationship status with complication tolerance
  parameters:
  - Mutual backstory revelation achieved
  - Cohabitation status maintained
  - External threats create proximity
  - Competing interests resolved rather than prolonged
- variable: institutional_faction_balance
  tracking: Political standing within government supernatural department
  constraints:
  - Mission parameters restrict independent action
  - Subordinate relationships require leadership maintenance
  - Factional obligations create conflicting priorities
- variable: support_network_strength
  tracking: Allied resources available for major operations
  composition:
  - Hybrid Buddhist-Taoist team members
  - Artifact bargaining leverage
  - Military operation subordinates
chapter_change_vectors:
- location: Opening chapters
  change: Eliminate exposition dumps by demonstrating cultivation mechanics through
    ritual performance with protagonist internal monologue during technique execution
- location: Chapters 33, 47, and similar density peaks
  content: Separate ghost cultivation mechanics, historical context, and character
    psychology into distinct beats; reduce information density by distributing across
    multiple scenes
- location: Chapter 7 and similar early reveals
  change: Establish mystery through partial reveals and tactical withholding rather
    than full plan exposition
- location: Chapters 44, 61 antagonist monologue
  change: Dramatize through hostile confrontation format; deliver backstory as intimidation
    rather than narration
- location: Volume 5-6 escalation spiral
  change: Implement institutional constraints limiting power application; focus on
    tactical solutions over raw capability increase
- location: Early character introductions
  change: Stagger introductions; differentiate through vocabulary register rather
    than simultaneous presentation
- location: Political exposition chapters
  change: Deliver through character observation and direct confrontation rather than
    narrator summary
- location: Extended prison arc
  change: Maintain engagement through regular supernatural advancement and political
    rehabilitation subplot alongside imprisonment narrative
reader_rewards:
- reward_type: immediate
  delivery: First cultivation ritual displayed in full detail with concrete mechanics;
    supernatural revenge against deserving villains; fish-out-of-water comedy from
    archaic protagonist in modern society; power demonstration through ghost confrontation
- reward_type: delayed
  delivery: Thirty-year time-skip transformation; political backstory resolution;
    cultivation philosophy reveal; Buddhist intervention establishing power ceiling;
    investigation conspiracy connecting personal stakes to broader conflict
- reward_type: accumulated
  delivery: Multi-volume revenge thread reaching emotional resolution; romantic relationship
    consummation with mutual vulnerability; power escalation through artifact acquisition;
    institutional authority establishment transitioning protagonist to faction leader
hook_or_aftereffect_types:
- type: mid_scene_opening
  description: No recap openings; reader dropped directly into action or ritual in
    progress
- type: layered_cliffhanger
  description: Action beats ending with consequence not summary; reverse-focus creates
    ambush setup for next chapter
- type: reverse_focus_ambush
  description: Reader positioned with antagonist unaware of protagonist approach,
    creating tactical surprise payoff
- type: competence_reveal
  description: Character demonstrates true power after removing concealing element
    or through confrontation before explanation
- type: authority_deception
  description: Credentials reveal transforms authority perception 180 degrees enabling
    access or compliance
- type: comic_relief_bridge
  description: Protagonist crude observations and rigid worldview applied to modern
    situations create tonal bridge between horror and comedy
forbidden_defaults:
- default: Protagonist monologue dump explaining magic system rules without demonstration
  replacement: Demonstrate rules through internal monologue during ritual practice
    with visible step-by-step process
- default: Multiple named characters introduced simultaneously
  replacement: Stagger introductions across scenes; differentiate through vocabulary
    register
- default: Extended antagonist monologue delivering backstory in single block
  replacement: Drastize through hostile confrontation format; distribute historical
    information across multiple encounters
- default: Power progression without cost or exhaustion consequences
  replacement: Implement cumulative damage reducing effective power level while maintaining
    fighting capability
- default: Romantic fragmentation with prolonged love triangle
  replacement: Establish primary romantic arc early; subordinate competing interests
    to main trajectory
- default: Protagonist abilities becoming too versatile without limitation
  replacement: Establish combat capability limits through pyrrhic victories and institutional
    constraints limiting power application
- default: Formulaic cliffhanger at every chapter end
  replacement: Alternate cliffhanger action with resolution leading to intimate scene;
    vary cliffhanger types
- default: Heavy exposition dump in opening paragraphs
  replacement: World rules emerge organically through character preparation and ritual
    performance
- default: Prolonged antagonist history delivered in single block
  replacement: Distribute historical information across multiple encounters and revelation
    moments
- default: Overreliance on female unconsciousness for plot access
  replacement: Develop alternative access mechanisms through deception, authority,
    or character agency
- default: Institutional corruption bypassed through connections alone
  replacement: Show institutional complexity with bureaucratic costs rather than simple
    corruption narrative
- default: Protagonist survival plan revealed too early
  replacement: Establish mystery through partial reveals and tactical withholding
- default: Tone inconsistency between comedy and horror without bridge
  replacement: Use protagonist self-deprecation and crude observations as consistent
    tonal bridge at tension peaks
- default: Violent assault on service workers without moral context
  replacement: Contextualize violence through accumulated backstory justification;
    limit to antagonists with established threat
