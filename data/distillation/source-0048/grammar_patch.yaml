key: distillation-generic
name: Generic Distillation Fallback Grammar Patch
source_ids:
- source-0048
status: draft
applies_to_categories:
- complete_failure
- llm_unavailable_all_source_chapters
required_contracts:
- must_use_fallback_stub_narrative
- must_not_include_specific_story_content
- must_generate_generic_arc_structure
- must_increment_fallback_progress_per_chapter
state_variables:
- fallback_progress
chapter_change_vectors:
- pattern: per_chapter
  action: increment_fallback_progress
  amount: 1
reader_rewards:
- distillable_mechanism_reliability
hook_or_aftereffect_types:
- type: hook
  id: fallback_hook
  description: Hook that leverages the reliability of the distillation mechanism to
    engage readers despite missing narrative content.
- type: aftereffect
  id: reliability_aftereffect
  description: Aftereffect that reinforces reader trust in the distillation process.
forbidden_defaults:
- no_character_names
- no_plot_specifics
- no_direct_narrative_content
- no_reliance_on_missing_story_elements
