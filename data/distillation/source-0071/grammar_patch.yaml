key: distillation-generic
name: Distillation Failed State Grammar Patch
source_ids:
- source-0071
status: critical_failure
applies_to_categories:
- distillation-generic
required_contracts:
- chapter_card_extraction_required
- llm_processing_availability
- minimum_confidence_threshold
state_variables:
- name: extraction_status
  type: categorical
  values:
  - pending
  - in_progress
  - completed
  - failed
  current: failed
- name: confidence_score
  type: continuous
  range:
  - 0.0
  - 1.0
  current: 0.0
  threshold: 0.5
- name: chapters_extracted
  type: count
  current: 0
  target: 44
- name: valid_chapters
  type: count
  current: 0
- name: failure_reasons
  type: list
  items:
  - llm_unavailable
  - zero_confidence_scores
  - all_chapters_fallback
chapter_change_vectors:
- vector_id: extraction_success
  preconditions:
    confidence_score:
      gte: 0.5
  effects:
  - variable: extraction_status
    to: completed
  - variable: valid_chapters
    increment: 1
  target_state: ready_for_aggregation
- vector_id: extraction_failure_critical
  preconditions:
    confidence_score:
      eq: 0.0
    valid_chapters:
      eq: 0
  effects:
  - variable: extraction_status
    to: failed
  target_state: requires_reprocessing
  blocking: true
- vector_id: reprocessing_triggered
  preconditions:
    extraction_status: failed
  effects:
  - variable: extraction_status
    to: pending
  - variable: confidence_score
    to: null
  - variable: valid_chapters
    to: 0
  target_state: awaiting_retry
reader_rewards:
- status: blocked
  blocking_reason: No narrative content available
  requires_state: extraction_completed
  min_confidence: 0.6
hook_or_aftereffect_types:
- type: failure_recovery
  trigger: extraction_status = failed
  aftereffect: queue_source_for_alternative_extraction
- type: aggregation_blocked
  trigger: valid_chapters = 0
  aftereffect: halt_volume_aggregation
- type: quality_assurance_gate
  trigger: any_chapter.confidence < 0.5
  aftereffect: require_manual_review
forbidden_defaults:
- proceed_with_empty_chapters
- use_fallback_stubs_permanently
- aggregate_without_valid_data
- report_success_on_zero_confidence
- skip_reprocessing_after_critical_failure
