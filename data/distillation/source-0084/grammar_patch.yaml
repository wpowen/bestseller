key: distillation-generic
name: Distillation Generic Failure State Patch
source_ids:
- source-0084
status: failed
applies_to_categories:
- distillation-generic
required_contracts:
- contract: llm_extraction_viable
  current_state: violated
  remediation: Restore functional LLM endpoint before chapter card extraction can
    proceed
- contract: chapter_content_nonempty
  current_state: violated
  remediation: All 213 chapters returned zero content; regenerate through extraction
    pipeline
- contract: volume_aggregation_possible
  current_state: blocked
  remediation: Volume cards 1-9 empty; downstream book_design_card cannot inherit
    content
state_variables:
- extraction_confidence
- chapter_count
- failed_volumes
chapter_change_vectors:
- vector: zero_to_nonzero_confidence
  trigger: LLM endpoint restoration
  required_action: Re-extract all 213 chapters
- vector: empty_to_populated_volume_cards
  trigger: Chapter extraction success
  required_action: Aggregate non-empty chapter cards into volume cards 1-9
- vector: placeholder_to_actual_book_design
  trigger: Volume aggregation success
  required_action: Generate functional book_design_card from populated volume cards
reader_rewards: []
hook_or_aftereffect_types: []
forbidden_defaults:
- forbidden: zero_confidence_across_all_chapters
  reason: Indicates complete upstream failure; no story mechanics extractable
- forbidden: identical_fallback_stubs_across_volumes
  reason: Indicates system-wide LLM unavailability rather than narrative content
- forbidden: empty_chapter_arrays_propagating_upward
  reason: Aggregation degradation blocks all downstream design extraction
- forbidden: confidence_0.0_as_stable_state
  reason: Should be temporary failure indicator, not permanent artifact state
- forbidden: placeholder_design_card_without_remediation_path
  reason: Design artifacts must include recovery mechanism when source extraction
    fails
