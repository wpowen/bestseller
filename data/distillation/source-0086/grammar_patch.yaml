- type: failure_audit_hook
  triggers_on: complete_source_inaccessibility
  records:
  - chapters_affected
  - volumes_affected
  - confidence_scores
  - failure_patterns
- type: retry_trigger_aftereffect
  triggers_on: zero_content_extraction
