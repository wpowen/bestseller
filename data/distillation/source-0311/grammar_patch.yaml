key: distillation-generic
name: Documentary-Testimonial Historical Engine with Scholarly Apparatus
source_ids:
- source-0311
status: draft_review
applies_to_categories:
- historical nonfiction
- documentary novel
- testimonial narrative
- evidentiary narrative
required_contracts:
- Dual-register prose (scholarly/experiential) must alternate without tonal whiplash
- Primary source quotation must anchor all factual claims
- Testimony passages require sensory specificity; scholarly passages subordinated
  to evidentiary purpose
- Investigative first-person frame provides authorial discovery process
- Location-convergence mechanism anchors intersecting biographical threads
- Photo caption and endnote apparatus must function as narrative closure, not appendix
state_variables:
- temporal_phase: from crisis/timeline → through convergence/intersection → toward
    retrospective reckoning/closure
- documentary_layer: from primary source testimony → through investigation/interpretation
    → toward bibliographic apparatus closure
- biographical_alignment: from intersecting aristocratic/political/cultural spheres
    → through convergence on single location → toward moral accounting
- evidentiary_mode: from vignette documentation → through investigation → toward retrospective
    reinterpretation → toward bibliographic closure
- location_convergence: from hospitality/microcosm stage → through social stratification
    exposed → toward historical reckoning
chapter_change_vectors:
- vector: temporal_progression
  description: Chronological advancement through historical phases with date-stamped
    visual anchors
  mechanism: Physical location shifts handled through returning residents; chapter
    titles provide thematic framing
- vector: biographical_interweaving
  description: Character lists as preview mechanism; intersecting threads converge
    on location
  mechanism: Fictional intermediary scenes bridge real historical figures with interpretive
    proxy
- vector: evidentiary_accumulation
  description: Endnote cross-referencing builds toward closure
  mechanism: Earlier events recontextualized by new documentary evidence arriving
    later
reader_rewards:
- Location-as-microcosm demonstrating social stratification function
- Moral complexity without prescriptive judgment through documentary authority
- Visual corroboration through captioned photo documentation with temporal grounding
- Evidentiary authenticity through endnote apparatus and source trail
- Epistemic distance calibration between documentary authority and experiential testimony
- Understanding of collaboration-resistance as coexisting spectrum
- Scholarly apparatus providing source trail and interpretive credibility
hook_or_aftereffect_types:
- type: thematic_hook
  description: Chapter titles providing thematic framing and investigative questions
- type: quotation_plunge
  description: Specific documented exchanges plunge reader into evidentiary immediacy
- type: discovery_framing
  description: Personal authorial discovery process creates narrative momentum
- type: aftereffect_moral_accounting
  description: Location-convergence finale enables retrospective moral reckoning through
    accumulated evidence
forbidden_defaults:
- Do not use specific proper nouns, historical figure names, or location identifiers
- Do not replicate proprietary citation formats or bibliographic entry structures
- Do not include copyrighted image credits or Getty identifiers
- Do not replicate quote length and citation density patterns verbatim from source
- Do not use the literary epigraph attribution patterns or character entry formats
- Do not include specific WWII events, dates, or chapter ranges
- Do not use Vichy government figures or policy specifics
- Avoid citation-heavy format that impedes reader momentum without compensatory narrative
  drive
- Avoid character list format that creates false expectations of novelistic treatment
  without character arc delivery
- Avoid rehabilitation narrative that normalizes collaboration without moral complexity
- Do not introduce subjective bias through authorial first-person framing without
  evidentiary grounding
- Do not deploy atmospheric detail except in testimony passages where sensory specificity
  serves authenticity
