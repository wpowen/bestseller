key: distillation-generic
name: 'Grammar Patch: Distillation Source Grammar'
source_ids:
- source-0315
status: grammar_patch
applies_to_categories:
- distillation_source
- non-fiction
- historical_analysis
required_contracts:
- Documentary_evidence_accumulation
- Counterfactual_framework
- Thesis_argument_delivery
- Diary_polyphony
- Scholarly_apparatus_integration
state_variables:
- Analytical framework established for non-inevitability argument
- Diplomatic crisis reaches turning point as Anglo-Polish treaty forces cancellation
- War declared with paradoxical calm and minimal military engagement
- Phony war documented through multi-national diary polyphony and official contradictions
- Scholarly apparatus and primary directives appended as evidentiary payoff
chapter_change_vectors:
- Frame thesis-first then accumulate documentary evidence
- Integrate diary excerpts as emotional counterpoint to official narrative
- Juxtapose private sentiment against public policy documents
- Build tension through sequential diplomatic arrivals and cancellations
- End chapters with unresolved tensions or personal details
- Use appended documents as evidentiary foundation preceding analysis
reader_rewards:
- Understanding of book's core argument against historical inevitability
- Framework for analyzing decision-makers' choices in final pre-war days
- Recognition that institutional weaknesses and individual choices created contingent
  outcomes
- Evidentiary foundation from appended primary source documents
- Multi-national emotional polyphony through diary integration
- Understanding of paradox between declared war and actual inactivity
hook_or_aftereffect_types:
- Documentary appendices preceding analytical text
- Single-sentence dramatic emphasis punctuating dense paragraphs
- Specific trivial details grounding larger historical shifts
- Personal diary reveals conveying private emotional states
- Unresolved tensions at chapter endings
forbidden_defaults:
- Protagonist-centered narrative (use analytical framework instead)
- Extended scene-setting description (use concrete specificity instead)
- Direct dialogue reconstruction (use reported speech from records instead)
- Abstract categorical descriptions (use named entities and individual fates instead)
- Retrospective summary exposition (embed information in chronological narration instead)
- Linear cause-effect determinism (enforce contingency thesis instead)
