# ── Shared environment loaded from .env ─────────────────────────────────────
x-env-common: &env-common
  BESTSELLER__DATABASE__URL: postgresql+asyncpg://${DB_USER:-bestseller}:${DB_PASSWORD:-bestseller}@db:5432/${DB_NAME:-bestseller}
  BESTSELLER_REDIS_URL: redis://redis:6379/0
  BESTSELLER__REDIS__URL: redis://redis:6379/0
  BESTSELLER__OUTPUT__BASE_DIR: /app/output
  BESTSELLER__ARTIFACT_STORE__LOCAL_DIR: /app/artifacts
  BESTSELLER_TASK_STALE_SECONDS: ${BESTSELLER_TASK_STALE_SECONDS:-2700}

# ── Shared build config ─────────────────────────────────────────────────────
# Docker Desktop injects http.docker.internal:3128 as a build proxy that is
# unreachable from inside BuildKit, causing "Network is unreachable". Override
# all proxy ARGs to empty strings so pip/uv can reach PyPI directly.
x-build-common: &build-common
  context: .
  args:
    HTTP_PROXY: ""
    HTTPS_PROXY: ""
    http_proxy: ""
    https_proxy: ""

x-llm-env: &env-llm
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
  GEMINI_API_KEY: ${GEMINI_API_KEY:-}
  MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
  NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
  NIM_API_KEY: ${NIM_API_KEY:-}
  ARK_API_KEY: ${ARK_API_KEY:-}
  VOLCENGINE_API_KEY: ${VOLCENGINE_API_KEY:-}
  VOLCENGINE_ARK_API_KEY: ${VOLCENGINE_ARK_API_KEY:-}
  BESTSELLER__LLM__MOCK: ${BESTSELLER_LLM_MOCK:-false}

x-volumes: &app-volumes
  - ./output:/app/output
  - artifacts:/app/artifacts

# ── Python memory: return freed arenas to OS instead of holding them ─────────
# MALLOC_TRIM_THRESHOLD_=-1  tells glibc malloc to call trim on every free(),
# preventing the RSS from inflating after large LLM-response allocations.
# PYTHONMALLOC=malloc        bypasses pymalloc so glibc's trim takes effect.
x-py-malloc-env: &env-py-malloc
  MALLOC_TRIM_THRESHOLD_: "-1"
  PYTHONMALLOC: "malloc"

services:
  # ── PostgreSQL + pgvector ────────────────────────────────────────────────
  db:
    image: ankane/pgvector:latest
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-bestseller}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bestseller}
      POSTGRES_DB: ${DB_NAME:-bestseller}
      # Cap shared_buffers + work_mem so Postgres stays within its memory limit.
      # shared_buffers=128MB: page cache for hot data (default 128MB, kept low)
      # work_mem=16MB:        per-sort / per-hash allocation (16 concurrent ops → 256MB max)
      # maintenance_work_mem: used by VACUUM/ANALYZE, not concurrent
      # max_connections=100:  bumped from 50 to support 5 concurrent books in Web UI.
      #   Budget: web(5 tasks × ~4 conns) + worker(2 × ~10) + api/scheduler/mcp ≈ 50-60
      #   @ ~8MB per backend → ~800MB worst case (fits DB memory limit of 768M with
      #   shared_buffers overhead absorbed by effective_cache_size already bumped).
      POSTGRES_INITDB_ARGS: ""
    command: >
      postgres
        -c shared_buffers=128MB
        -c work_mem=16MB
        -c maintenance_work_mem=64MB
        -c effective_cache_size=384MB
        -c max_connections=100
        -c wal_buffers=8MB
        -c checkpoint_completion_target=0.9
        -c random_page_cost=1.1
        -c log_min_duration_statement=2000
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    deploy:
      resources:
        limits:
          memory: ${DB_MEMORY_LIMIT:-768M}
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bestseller}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # maxmemory: cap Redis heap; allkeys-lru evicts least-recently-used keys
    # when full so the process never grows past the container limit.
    command: >
      redis-server
        --save 60 1
        --loglevel warning
        --maxmemory ${REDIS_MAXMEMORY:-96mb}
        --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    deploy:
      resources:
        limits:
          memory: ${REDIS_MEMORY_LIMIT:-128M}
        reservations:
          memory: 32M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Database migration (run-once) ────────────────────────────────────────
  migrate:
    build: *build-common
    command: alembic upgrade head
    environment:
      <<: *env-common
    depends_on:
      db:
        condition: service_healthy
    profiles: ["migrate"]

  # ── FastAPI REST API ─────────────────────────────────────────────────────
  api:
    build: *build-common
    restart: unless-stopped
    command: >
      uvicorn bestseller.api.app:create_app --factory
      --host 0.0.0.0 --port 8000 --workers 1
    environment:
      <<: [*env-common, *env-llm, *env-py-malloc]
    env_file:
      - .env
    ports:
      - "${API_PORT:-8000}:8000"
    volumes: *app-volumes
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: ${API_MEMORY_LIMIT:-512M}
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 3

  # ── MCP Server (OpenClaw integration) ────────────────────────────────────
  mcp:
    build: *build-common
    restart: unless-stopped
    command: python -m bestseller.mcp.server
    environment:
      <<: [*env-common, *env-py-malloc]
      BESTSELLER_API_BASE_URL: http://api:8000
      BESTSELLER_MCP_API_KEY: ${BESTSELLER_MCP_API_KEY:-}
    env_file:
      - .env
    ports:
      - "${MCP_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: ${MCP_MEMORY_LIMIT:-256M}
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -X POST -H 'Content-Type: application/json' -d '{}' http://localhost:3000/mcp || exit 0"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ── ARQ async workers ────────────────────────────────────────────────────
  worker:
    build: *build-common
    restart: unless-stopped
    command: python -m bestseller.worker.main
    environment:
      <<: [*env-common, *env-llm, *env-py-malloc]
    env_file:
      - .env
    volumes: *app-volumes
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: ${WORKER_REPLICAS:-2}
      resources:
        limits:
          memory: ${WORKER_MEMORY_LIMIT:-768M}
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import bestseller' || exit 0"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ── Publishing scheduler ─────────────────────────────────────────────────
  scheduler:
    build: *build-common
    restart: unless-stopped
    command: python -m bestseller.scheduler.main
    environment:
      <<: [*env-common, *env-py-malloc]
    env_file:
      - .env
    volumes: *app-volumes
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: ${SCHEDULER_MEMORY_LIMIT:-256M}
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import bestseller' || exit 0"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ── Web Studio (existing UI on port 8787) ────────────────────────────────
  web:
    build: *build-common
    restart: unless-stopped
    command: bestseller ui serve --host 0.0.0.0 --port 8787
    environment:
      <<: [*env-common, *env-llm, *env-py-malloc]
      # Limit concurrent autowrite tasks so peak memory is bounded.
      # Each task uses ~300-500 MB peak during LLM calls:
      #   5 tasks × ~400 MB + ~300 MB base ≈ 2.3 GB (fits WEB_MEMORY_LIMIT=2560M).
      # If you raise this further, bump WEB_MEMORY_LIMIT and postgres max_connections
      # together — each task opens 2-4 async DB connections concurrently.
      WEB_MAX_CONCURRENT_TASKS: ${WEB_MAX_CONCURRENT_TASKS:-5}
    env_file:
      - .env
    ports:
      - "${WEB_PORT:-8787}:8787"
    volumes: *app-volumes
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: ${WEB_MEMORY_LIMIT:-2560M}
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8787/ || exit 0"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  pgdata:
  redisdata:
  artifacts:
