market:
  platform_target: 番茄小说
  content_mode: 中文网文长篇连载
  reader_promise: 开篇迅速亮出末日倒计时、主角抢占资源的优势和外部秩序崩坏前的窗口，持续用资源差、危机升级和真相逼近制造追读。
  selling_points:
    - 重生回档
    - 未来商城
    - 末日前囤货
    - 资源碾压
    - 幕后真相
  trope_keywords:
    - 末日
    - 囤货
    - 系统
    - 规则生存
    - 打脸反杀
  hook_keywords:
    - 倒计时
    - 稀缺资源
    - 规则异变
    - 背叛
  opening_strategy: 第一屏直接给出末日倒计时、主角知道未来、资源窗口马上关闭。
  chapter_hook_strategy: 每章末给新的资源机会、规则异变、敌人反压或更大的真相缺口。
  pacing_profile: fast
  payoff_rhythm: 短回报密集，长回报递延
  update_strategy: 日更连载

character:
  protagonist_archetype: 先知型求生者
  protagonist_core_drive: 抢时间、抢资源、抢先建立安全边界
  golden_finger: 来自未来的购物入口，可低价购买末日关键物资
  growth_curve: 个人生存优势 -> 小团体统治力 -> 末日真相破局
  romance_mode: 弱感情线
  relationship_tension: 合作与猜疑并行，关系在利益绑定和真心靠近之间摆动
  antagonist_mode: 生存竞争者与系统性灾变操盘者双重压迫
  ensemble_mode: 配角围绕主角价值与选择形成镜像和反差

world:
  worldbuilding_density: medium
  info_reveal_strategy: 先冲突后解释，背景信息嵌入行动、交易、对抗和后果里释放
  rule_hardness: hard
  power_system_style: 资源、秩序、能力同步升级
  mystery_density: high
  setting_tags:
    - 生存
    - 资源争夺
    - 规则异变
    - 秩序崩坏

style:
  pov_type: third-limited
  tense: present
  tone_keywords:
    - 狠
    - 快
    - 压迫感
    - 危机感
  prose_style: commercial-web-serial
  sentence_style: short-punchy
  info_density: lean
  dialogue_ratio: 0.42
  reference_works:
    - 《全球冰封：我打造了末日安全屋》
    - 《诡秘之主》
  custom_rules:
    - 第一章 800 字内给出明确异常信号
    - 前三章必须连续兑现至少三次短回报
    - 背景设定只能嵌在行动、交易、冲突和代价里释放

serialization:
  opening_mandate: 开篇必须快速亮出主角差异化优势、异常事件、短期利益和明确危险
  first_three_chapter_goal: 前三章必须完成主角卖点亮相、世界异常亮相、第一轮得失与追读钩子
  scene_drive_rule: 每场都要有目标、阻碍、升级、信息变化和尾钩，避免纯说明
  exposition_rule: 背景说明必须嵌在行动、交易、冲突和代价里
  chapter_ending_rule: 每章结尾至少留下一个未解决问题、反转、新资源窗口或更大的危险
  free_chapter_strategy: 免费阶段优先保证高密度钩子、连续爽点和危机升级
