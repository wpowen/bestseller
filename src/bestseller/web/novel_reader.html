<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小说阅读器</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f1e9;
      --surface: #fffdf8;
      --border: #ddd5c8;
      --text: #1d1b18;
      --text-2: #6b5e4e;
      --accent: #8b4513;
      --accent-light: #c8845a;
      --sidebar-w: 280px;
      --header-h: 56px;

      /* User-controlled reading variables — flipped by toolbar buttons and
         persisted in localStorage. Defaults aim at long-form Chinese fiction
         on a 1440px display: comfortable line length around 38–42 字, font
         clearly larger than the original 17px. */
      --reading-max: 880px;        /* cap of the column */
      --reading-side: 56px;        /* horizontal padding inside the column */
      --reading-font: 19px;        /* body font size */
      --reading-line: 2.05;        /* line-height */
      --reading-letter: 0.012em;   /* letter spacing */
      --reading-paragraph-gap: 1.4em;
      --reading-card-bg: var(--surface);
      --reading-card-border: var(--border);
      --reading-card-shadow: 0 8px 24px rgba(43,32,20,0.07);
      --reading-card-radius: 16px;
      --reading-card-pad: 44px 56px;
    }

    /* Width modes — toggled by data-width on <main>. */
    main[data-width="comfort"] { --reading-max: 880px; }
    main[data-width="wide"]    { --reading-max: 1100px; }
    main[data-width="full"]    { --reading-max: 1320px; }
    main[data-width="compact"] { --reading-max: 720px; }

    /* Font size modes — toggled by data-font on <main>. */
    main[data-font="sm"] { --reading-font: 17px; --reading-line: 1.95; }
    main[data-font="md"] { --reading-font: 19px; --reading-line: 2.05; }
    main[data-font="lg"] { --reading-font: 21px; --reading-line: 2.1; }
    main[data-font="xl"] { --reading-font: 24px; --reading-line: 2.15; }

    /* Theme modes — toggled by data-theme on <body> so header + sidebar
       inherit. */
    body[data-theme="cream"] {
      --bg: #f5f1e9; --surface: #fffdf8; --border: #ddd5c8;
      --text: #1d1b18; --text-2: #6b5e4e;
    }
    body[data-theme="paper"] {
      --bg: #f0ece2; --surface: #ffffff; --border: #d4cfc4;
      --text: #1a1a1a; --text-2: #555;
    }
    body[data-theme="sepia"] {
      --bg: #ede4cf; --surface: #faf2dc; --border: #d4c8a6;
      --text: #2a1f0e; --text-2: #6b5736;
    }
    body[data-theme="dark"] {
      --bg: #1a1916; --surface: #232220; --border: #38332b;
      --text: #ddd6c4; --text-2: #908874; --accent-light: #c8845a;
    }
    body[data-theme="dark"] .reading-area .chapter-body {
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    }

    body {
      font-family: "PingFang SC", "Noto Serif SC", "Source Han Serif CN", Georgia, serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      height: var(--header-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 20px;
      flex-shrink: 0;
      box-shadow: 0 1px 6px rgba(0,0,0,0.06);
      z-index: 10;
    }
    header .menu-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-2);
      padding: 6px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      font-size: 20px;
      transition: background 0.15s;
    }
    header .menu-btn:hover { background: var(--bg); }
    header .book-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    header .chapter-info {
      font-size: 13px;
      color: var(--text-2);
      white-space: nowrap;
    }
    header .studio-link {
      font-size: 12px;
      color: var(--accent);
      text-decoration: none;
      padding: 5px 12px;
      border: 1px solid var(--accent-light);
      border-radius: 6px;
      transition: background 0.15s;
    }
    header .studio-link:hover { background: rgba(139,69,19,0.06); }

    /* ── Layout ── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    aside {
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: width 0.25s ease, opacity 0.2s;
      flex-shrink: 0;
    }
    aside.collapsed { width: 0; opacity: 0; pointer-events: none; }
    .sidebar-head {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--text-2);
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .toc-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
    }
    .toc-list::-webkit-scrollbar { width: 4px; }
    .toc-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .toc-item {
      display: block;
      width: 100%;
      text-align: left;
      background: none;
      border: none;
      cursor: pointer;
      padding: 9px 16px;
      font-size: 13.5px;
      color: var(--text-2);
      line-height: 1.45;
      transition: background 0.12s, color 0.12s;
      border-left: 3px solid transparent;
    }
    .toc-item:hover { background: var(--bg); color: var(--text); }
    .toc-item.active {
      background: rgba(139,69,19,0.07);
      color: var(--accent);
      border-left-color: var(--accent);
      font-weight: 600;
    }
    .toc-item.not-exported {
      opacity: 0.55;
      font-style: italic;
    }

    /* ── Per-chapter availability dots in the TOC ── */
    .toc-item .avail-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      margin-right: 8px;
      vertical-align: middle;
      flex-shrink: 0;
    }
    .toc-item .avail-dot.available,
    .toc-item .avail-dot.formal { background: #2c7a4d; }
    .toc-item .avail-dot.repair_in_progress,
    .toc-item .avail-dot.repair {
      background: #c87f15;
      box-shadow: 0 0 0 2px rgba(200, 127, 21, 0.18);
      animation: tocPulse 1.4s ease-in-out infinite;
    }
    .toc-item .avail-dot.drafting { background: #8c2a1c; animation: tocPulse 1.6s ease-in-out infinite; }
    .toc-item .avail-dot.planned { background: #b9b09c; }
    .toc-item.repair-flagged {
      background: rgba(200, 127, 21, 0.06);
    }
    .toc-item.repair-flagged:hover {
      background: rgba(200, 127, 21, 0.12);
    }
    .toc-item.unavailable {
      cursor: not-allowed;
      opacity: 0.65;
    }
    .toc-item .avail-tag {
      margin-left: auto;
      font-size: 10px;
      color: var(--text-2);
      opacity: 0.7;
      letter-spacing: 0.04em;
    }
    .toc-item .avail-tag.formal { color: #2c7a4d; opacity: 1; font-weight: 600; }
    .toc-item .avail-tag.repair { color: #b86c0c; opacity: 1; font-weight: 600; }
    .toc-item .avail-tag.drafting { color: #8c2a1c; opacity: 1; font-weight: 600; }
    .toc-item .avail-tag.planned { color: var(--text-2); }
    @keyframes tocPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.45; }
    }

    /* TOC legend at top of the rail */
    .toc-legend {
      padding: 6px 16px 8px;
      font-size: 11px;
      color: var(--text-2);
      display: flex;
      flex-wrap: wrap;
      gap: 4px 12px;
      border-bottom: 1px solid var(--border);
    }
    .toc-legend .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .toc-legend .legend-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
    }
    .toc-legend .legend-dot.available,
    .toc-legend .legend-dot.formal { background: #2c7a4d; }
    .toc-legend .legend-dot.repair_in_progress,
    .toc-legend .legend-dot.repair { background: #c87f15; }
    .toc-legend .legend-dot.drafting { background: #8c2a1c; }
    .toc-legend .legend-dot.planned { background: #b9b09c; }

    .reader-status-pill {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 2px 9px;
      border-radius: 999px;
      border: 1px solid currentColor;
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
    }
    .reader-status-pill.formal {
      color: #2c7a4d;
      background: rgba(44, 122, 77, 0.08);
    }
    .reader-status-pill.repair {
      color: #b86c0c;
      background: rgba(200, 127, 21, 0.1);
    }

    /* Repair banner inside the chapter body when reading a chapter that's
       being rewritten right now. */
    .chapter-repair-banner {
      margin: 0 0 18px;
      padding: 12px 14px;
      border: 1px solid #c87f15;
      border-left: 3px solid #c87f15;
      background: rgba(200, 127, 21, 0.08);
      color: #7a4a09;
      font-size: 13px;
      line-height: 1.55;
    }
    .chapter-repair-banner strong { color: #b86c0c; }

    .toc-num {
      display: inline-block;
      width: 28px;
      font-size: 11px;
      color: var(--text-2);
      opacity: 0.6;
      flex-shrink: 0;
    }
    /* ── Volume grouping headers in the sidebar ── */
    .toc-volume-head {
      padding: 16px 16px 6px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: var(--accent);
      text-transform: uppercase;
      border-top: 1px solid var(--border);
      background: rgba(139,69,19,0.03);
    }
    .toc-volume-head:first-child { border-top: none; }
    .toc-volume-head .vol-title {
      display: block;
      font-size: 13px;
      color: var(--text);
      font-weight: 600;
      margin-top: 3px;
      letter-spacing: normal;
      text-transform: none;
    }
    .chapter-volume-tag {
      display: block;
      font-size: 13px;
      color: var(--accent);
      font-weight: 500;
      margin-bottom: 6px;
      letter-spacing: 0.04em;
    }

    /* ── Main content ── */
    main {
      flex: 1;
      overflow-y: auto;
      padding: 28px 24px 96px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    main::-webkit-scrollbar { width: 6px; }
    main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .reading-area {
      width: 100%;
      max-width: var(--reading-max);
      transition: max-width 0.18s ease;
    }

    /* ── Reader toolbar — sticky at top of the column ── */
    .reader-toolbar {
      position: sticky;
      top: -1px;
      z-index: 5;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-bottom: 22px;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 4px 14px rgba(43,32,20,0.05);
      backdrop-filter: blur(8px);
    }
    .reader-toolbar-group {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
    }
    .reader-toolbar-group .label {
      padding: 0 8px;
      color: var(--text-2);
      font-size: 11px;
      letter-spacing: 0.05em;
    }
    .tb-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      min-height: 28px;
      padding: 4px 10px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--text-2);
      font-size: 12.5px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.14s, color 0.14s;
      white-space: nowrap;
    }
    .tb-btn:hover {
      background: var(--surface);
      color: var(--text);
    }
    .tb-btn[aria-pressed="true"] {
      background: var(--accent);
      color: #fff;
    }
    body[data-theme="dark"] .tb-btn[aria-pressed="true"] {
      background: var(--accent-light);
      color: #1a1916;
    }
    .tb-btn.primary {
      background: var(--accent);
      color: #fff;
      padding: 4px 14px;
      font-weight: 600;
    }
    .tb-btn.primary:hover { background: #7a3a10; }
    .tb-btn.primary.copied {
      background: #2c7a4d;
    }
    .tb-divider {
      width: 1px;
      height: 22px;
      background: var(--border);
      margin: 0 4px;
    }
    .tb-spacer { flex: 1; }

    .chapter-header {
      margin-bottom: 28px;
      padding: 0 4px;
    }
    .chapter-header .chapter-volume-tag {
      display: inline-block;
      font-size: 12px;
      color: var(--accent);
      font-weight: 500;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
      padding: 2px 10px;
      border: 1px solid var(--accent-light);
      border-radius: 999px;
      background: rgba(139,69,19,0.04);
    }
    body[data-theme="dark"] .chapter-header .chapter-volume-tag {
      background: rgba(200,132,90,0.1);
    }
    .chapter-header-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
    }
    .chapter-header h1 {
      font-size: 30px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
      margin: 4px 0 12px;
      flex: 1;
      min-width: 0;
      letter-spacing: 0.01em;
    }
    .title-copy {
      flex-shrink: 0;
      margin-top: 12px;
    }
    .chapter-meta {
      font-size: 12.5px;
      color: var(--text-2);
      display: flex;
      flex-wrap: wrap;
      gap: 6px 18px;
      align-items: center;
    }
    .chapter-meta .dot {
      width: 3px; height: 3px; border-radius: 50%;
      background: var(--text-2); opacity: 0.5;
    }

    .chapter-body {
      background: var(--reading-card-bg);
      border: 1px solid var(--reading-card-border);
      border-radius: var(--reading-card-radius);
      padding: var(--reading-card-pad);
      box-shadow: var(--reading-card-shadow);
      font-size: var(--reading-font);
      line-height: var(--reading-line);
      letter-spacing: var(--reading-letter);
      color: var(--text);
      transition: font-size 0.15s ease, padding 0.15s ease;
    }
    .chapter-body p {
      margin-bottom: var(--reading-paragraph-gap);
      text-indent: 2em;
    }
    .chapter-body h1, .chapter-body h2, .chapter-body h3 {
      font-weight: 700;
      margin: 1.6em 0 0.8em;
      text-indent: 0;
      color: var(--text);
    }
    .chapter-body h1 { font-size: 1.3em; }
    .chapter-body h2 { font-size: 1.15em; }
    .chapter-body h3 { font-size: 1.05em; }
    .chapter-body blockquote {
      border-left: 3px solid var(--accent-light);
      margin: 1.2em 0;
      padding: 0.4em 1em;
      color: var(--text-2);
      font-style: italic;
    }
    .chapter-body pre {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 18px;
      font-family: monospace;
      font-size: 13px;
      overflow-x: auto;
      white-space: pre-wrap;
    }
    .chapter-body code {
      background: var(--bg);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 0.88em;
      font-family: monospace;
    }
    .chapter-body pre code { background: none; padding: 0; }
    .chapter-body hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2em auto;
      width: 60%;
    }

    /* ── Nav buttons ── */
    .nav-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 36px;
      gap: 12px;
    }
    .nav-btn {
      padding: 10px 22px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 14px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      font-family: inherit;
    }
    .nav-btn:hover:not(:disabled) { background: var(--bg); border-color: var(--accent-light); }
    .nav-btn:disabled { opacity: 0.35; cursor: default; }
    .nav-btn.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .nav-btn.primary:hover:not(:disabled) { background: #7a3a10; }
    .nav-pos { font-size: 13px; color: var(--text-2); }

    /* ── Copy button ── */
    .copy-btn {
      padding: 5px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-2);
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .copy-btn:hover { background: var(--bg); border-color: var(--accent-light); color: var(--text); }
    .copy-btn.copied { border-color: #27ae60; color: #27ae60; }

    /* ── Loading / empty states ── */
    .state-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 16px;
      color: var(--text-2);
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 900px) {
      :root { --reading-card-pad: 28px 28px; }
      .chapter-header h1 { font-size: 24px; }
    }
    @media (max-width: 640px) {
      aside { position: absolute; top: var(--header-h); bottom: 0; z-index: 20; }
      :root { --reading-card-pad: 22px 18px; --reading-font: 17px; --reading-line: 1.95; }
      .chapter-header h1 { font-size: 21px; }
      .reader-toolbar { gap: 6px; padding: 8px 10px; }
      .reader-toolbar-group .label { display: none; }
    }
  </style>
</head>
<body>

<header>
  <button class="menu-btn" id="toggle-sidebar" title="切换目录">&#9776;</button>
  <span class="book-title" id="book-title">加载中...</span>
  <span class="chapter-info" id="chapter-info"></span>
  <a href="/quickstart" class="studio-link">返回工作台</a>
</header>

<div class="layout">
  <aside id="sidebar">
    <div class="sidebar-head">目录</div>
    <div class="toc-list" id="toc-list">
      <div class="state-center" style="height:120px;">
        <div class="spinner"></div>
      </div>
    </div>
  </aside>

  <main id="main-area">
    <div class="reading-area" id="reading-area">
      <div class="state-center" style="height:300px;">
        <div class="spinner"></div>
        <span>正在加载...</span>
      </div>
    </div>
  </main>
</div>

<script>
  const slug = location.pathname.replace(/^\/read\//, "").replace(/\/$/, "");
  let toc = [];
  let volumes = [];
  let currentChapter = 1;
  let bookTitle = slug;  // Will be updated with real title from API

  // ── Helpers ─────────────────────────────────────────────────────────────
  function escapeHtml(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  // ── Sidebar toggle ──────────────────────────────────────────────────────
  const sidebar = document.getElementById("sidebar");
  document.getElementById("toggle-sidebar").addEventListener("click", () => {
    sidebar.classList.toggle("collapsed");
  });

  // ── Fetch helpers ───────────────────────────────────────────────────────
  async function get(url) {
    const r = await fetch(url);
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  }

  // ── Render TOC ──────────────────────────────────────────────────────────
  // Group the chapter list by volume_number so the reader can see which 卷
  // each chapter belongs to.  Chapters with no volume info (legacy single-
  // volume projects) render as a flat list exactly like before.
  const READER_STATE_LABEL = {
    formal: "正式版",
    repair: "修复中",
  };

  function readerStateFor(ch) {
    const productionState = String(ch?.production_state || "").toLowerCase();
    const availability = String(ch?.availability || (ch?.exported === false ? "repair_in_progress" : "available")).toLowerCase();
    if (productionState === "ok" || availability === "available") return "formal";
    return "repair";
  }

  function buildTocLegend() {
    const counts = { formal: 0, repair: 0 };
    for (const ch of toc) {
      counts[readerStateFor(ch)] += 1;
    }
    const items = [
      ['formal', READER_STATE_LABEL.formal, counts.formal],
      ['repair', READER_STATE_LABEL.repair, counts.repair],
    ].filter(([, , n]) => n > 0);
    if (!items.length) return '';
    return `<div class="toc-legend">${items.map(([k, label, n]) =>
      `<span class="legend-item"><span class="legend-dot ${k}"></span>${label} <strong>${n}</strong></span>`
    ).join('')}</div>`;
  }

  function renderToc() {
    const list = document.getElementById("toc-list");
    if (!toc.length) {
      list.innerHTML = '<div style="padding:16px;font-size:13px;color:var(--text-2);">暂无章节</div>';
      return;
    }
    const legendHtml = buildTocLegend();
    const hasVolumes = toc.some(ch => ch.volume_number != null);
    if (!hasVolumes) {
      list.innerHTML = legendHtml + toc.map(ch => renderTocItem(ch)).join("");
    } else {
      // Build a lookup of volume_number → {title, target} for header text.
      const volLookup = {};
      for (const v of (volumes || [])) volLookup[v.volume_number] = v;
      // Preserve order: iterate toc sequentially, emitting a volume header
      // whenever the volume_number changes.
      let html = legendHtml;
      let lastVol = undefined;
      for (const ch of toc) {
        if (ch.volume_number !== lastVol) {
          lastVol = ch.volume_number;
          const meta = volLookup[lastVol];
          const volTitle = (meta && meta.title) || ch.volume_title || "";
          const volLabel = lastVol != null ? `第 ${lastVol} 卷` : "未分卷";
          html += `
            <div class="toc-volume-head">
              ${escapeHtml(volLabel)}
              ${volTitle ? `<span class="vol-title">${escapeHtml(volTitle)}</span>` : ""}
            </div>`;
        }
        html += renderTocItem(ch);
      }
      list.innerHTML = html;
    }
    // Scroll active item into view
    const active = list.querySelector(".toc-item.active");
    if (active) active.scrollIntoView({ block: "nearest" });
  }

  function renderTocItem(ch) {
    const avail = ch.availability || (ch.exported === false ? "drafting" : "available");
    const readerState = readerStateFor(ch);
    const isRepair = readerState === "repair";
    const isPlanned = avail === "planned";
    const cls = [
      "toc-item",
      ch.number === currentChapter ? "active" : "",
      ch.exported === false ? "not-exported" : "",
      isRepair ? "repair-flagged" : "",
      isPlanned ? "unavailable" : "",
    ].filter(Boolean).join(" ");
    const title = escapeHtml(ch.title || `第${ch.number}章`);
    const tagText = READER_STATE_LABEL[readerState];
    const onclick = isPlanned ? "" : `onclick="loadChapter(${ch.number})"`;
    return `
      <button class="${cls}" data-n="${ch.number}" ${onclick} title="${escapeHtml(tagText || '可阅读')}${ch.revision_count ? ` · 已修订 ${ch.revision_count} 次` : ''}">
        <span class="avail-dot ${readerState}"></span>
        <span class="toc-num">${ch.number}</span>${title}
        <span class="avail-tag ${readerState}">${tagText}</span>
      </button>`;
  }

  // ── Load a chapter ──────────────────────────────────────────────────────
  async function loadChapter(n) {
    currentChapter = n;
    const area = document.getElementById("reading-area");
    area.innerHTML = `
      <div class="state-center" style="height:300px;">
        <div class="spinner"></div><span>正在加载第 ${n} 章...</span>
      </div>`;
    renderToc();
    window.scrollTo && document.getElementById("main-area").scrollTo(0, 0);
    try {
      const data = await get(`/api/reader/${slug}/chapter/${n}`);
      const ch = toc.find(c => c.number === n);
      const title = ch ? ch.title : `第 ${n} 章`;
      const readerState = readerStateFor(ch || { availability: "available" });
      const readerStateLabel = READER_STATE_LABEL[readerState];
      // Prefer volume info from the chapter endpoint; fall back to TOC.
      const volNum = (data.volume_number != null ? data.volume_number : ch?.volume_number);
      const volTitle = data.volume_title || ch?.volume_title || "";
      const volLabel = volNum != null
        ? `第 ${volNum} 卷${volTitle ? " · " + volTitle : ""}`
        : "";
      const infoParts = [];
      if (volLabel) infoParts.push(volLabel);
      infoParts.push(`第 ${n} 章 / 共 ${toc.length} 章`);
      infoParts.push(readerStateLabel);
      document.getElementById("chapter-info").textContent = infoParts.join(" · ");
      document.getElementById("book-title").textContent = bookTitle;
      document.title = volLabel
        ? `${volLabel} · ${title} — ${bookTitle}`
        : `${title} — ${bookTitle}`;
      const prevDisabled = n <= 1 ? "disabled" : "";
      const nextDisabled = n >= toc.length ? "disabled" : "";
      let banner = "";
      if (readerState === "repair") {
        const revText = ch?.revision_count ? ` · 已修订 ${ch.revision_count} 次` : "";
        banner = `<div class="chapter-repair-banner">
          <strong>本章修复中</strong>${revText}。系统正在重新生成本章以修正一致性问题，
          下面显示的是当前最新草稿，重生成完成后会自动替换。
        </div>`;
      }
      const toolbarHtml = `
        <div class="reader-toolbar" role="toolbar">
          <button class="tb-btn primary" id="copy-title-btn" onclick="copyChapterTitle(this)" title="一键复制本章标题（C T）">📑 复制标题</button>
          <button class="tb-btn primary" id="copy-numbered-title-btn" onclick="copyChapterNumberedTitle(this)" title="一键复制：第五章：章节标题">📑 复制章题</button>
          <button class="tb-btn primary" id="copy-body-btn" onclick="copyChapterText(this)" title="一键复制正文（C B）">📋 复制正文</button>
          <button class="tb-btn" onclick="copyChapterFull(this)" title="一键复制：标题 + 正文（C A）">📦 标题+正文</button>
          <div class="tb-divider"></div>
          <div class="reader-toolbar-group" role="group" aria-label="栏宽">
            <span class="label">栏宽</span>
            <button class="tb-btn" data-width="compact" onclick="setReaderWidth('compact')" title="紧凑">紧</button>
            <button class="tb-btn" data-width="comfort" onclick="setReaderWidth('comfort')" title="舒适">舒</button>
            <button class="tb-btn" data-width="wide" onclick="setReaderWidth('wide')" title="宽屏">宽</button>
            <button class="tb-btn" data-width="full" onclick="setReaderWidth('full')" title="全宽">全</button>
          </div>
          <div class="reader-toolbar-group" role="group" aria-label="字号">
            <span class="label">字号</span>
            <button class="tb-btn" data-font="sm" onclick="setReaderFont('sm')" title="小">A</button>
            <button class="tb-btn" data-font="md" onclick="setReaderFont('md')" title="中">A</button>
            <button class="tb-btn" data-font="lg" onclick="setReaderFont('lg')" title="大" style="font-size:14px;">A</button>
            <button class="tb-btn" data-font="xl" onclick="setReaderFont('xl')" title="超大" style="font-size:16px;">A</button>
          </div>
          <div class="reader-toolbar-group" role="group" aria-label="主题">
            <span class="label">主题</span>
            <button class="tb-btn" data-theme="cream" onclick="setReaderTheme('cream')" title="米白">米</button>
            <button class="tb-btn" data-theme="paper" onclick="setReaderTheme('paper')" title="纸白">纸</button>
            <button class="tb-btn" data-theme="sepia" onclick="setReaderTheme('sepia')" title="羊皮纸">皮</button>
            <button class="tb-btn" data-theme="dark" onclick="setReaderTheme('dark')" title="暗夜">夜</button>
          </div>
          <div class="tb-spacer"></div>
          <button class="tb-btn" id="prev-tb-btn" ${prevDisabled} onclick="loadChapter(${n - 1})" title="上一章 ←">← 上一章</button>
          <button class="tb-btn" id="next-tb-btn" ${nextDisabled} onclick="loadChapter(${n + 1})" title="下一章 →">下一章 →</button>
        </div>`;
      area.innerHTML = `
        ${toolbarHtml}
        <div class="chapter-header">
          ${volLabel ? `<span class="chapter-volume-tag">${escapeHtml(volLabel)}</span>` : ""}
          <div class="chapter-header-row">
            <h1>${escapeHtml(title)}</h1>
          </div>
          <div class="chapter-meta">
            <span>第 ${n} 章 / 共 ${toc.length} 章</span>
            <span class="dot"></span>
            <span class="reader-status-pill ${readerState}">${readerStateLabel}</span>
            <span class="dot"></span>
            <span>${data.word_count?.toLocaleString() ?? 0} 字</span>
            <span class="dot"></span>
            <span>约 ${data.estimated_read_minutes ?? 0} 分钟</span>
          </div>
        </div>
        ${banner}
        <div class="chapter-body">${data.html}</div>
        <div class="nav-bar">
          <button class="nav-btn" ${prevDisabled} onclick="loadChapter(${n - 1})">&#8592; 上一章</button>
          <span class="nav-pos">${n} / ${toc.length}</span>
          <button class="nav-btn primary" ${nextDisabled} onclick="loadChapter(${n + 1})">下一章 &#8594;</button>
        </div>`;
      // Reflect persisted reader prefs on the freshly-rendered toolbar.
      reflectReaderPrefs();
    } catch (err) {
      area.innerHTML = `<div class="state-center" style="height:200px;color:#c0392b;">${err.message}</div>`;
    }
  }

  // ── Clipboard helpers ────────────────────────────────────────────────────
  async function copyToClipboard(text) {
    if (!text) return false;
    try {
      await navigator.clipboard.writeText(text);
      return true;
    } catch {
      // Fallback for non-HTTPS / denied permission
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.cssText = "position:fixed;left:-9999px";
      document.body.appendChild(ta);
      ta.select();
      let ok = false;
      try { ok = document.execCommand("copy"); } catch { ok = false; }
      document.body.removeChild(ta);
      return ok;
    }
  }

  function flashCopied(btn, label) {
    if (!btn) return;
    const orig = btn.innerHTML;
    btn.innerHTML = `✓ ${label || "已复制"}`;
    btn.classList.add("copied");
    setTimeout(() => { btn.innerHTML = orig; btn.classList.remove("copied"); }, 1400);
  }

  function currentChapterTitleText() {
    const ch = toc.find(c => c.number === currentChapter);
    return ch?.title || `第${currentChapter}章`;
  }

  function toChineseChapterNumber(value) {
    const n = Number(value);
    if (!Number.isFinite(n) || n <= 0) return String(value || "");
    const digits = ["零", "一", "二", "三", "四", "五", "六", "七", "八", "九"];
    const units = ["", "十", "百", "千"];
    const num = Math.floor(n);
    if (num === 0) return digits[0];
    if (num >= 10000) return String(num);
    const chars = String(num).split("").reverse();
    let result = "";
    let pendingZero = false;
    chars.forEach((char, index) => {
      const digit = Number(char);
      if (digit === 0) {
        pendingZero = result.length > 0;
        return;
      }
      result = `${digits[digit]}${units[index]}${pendingZero ? "零" : ""}${result}`;
      pendingZero = false;
    });
    return result.replace(/^一十/, "十");
  }

  function stripChapterHeadingPrefix(value) {
    return String(value || "")
      .trim()
      .replace(/^#{1,6}\s*/, "")
      .replace(/^第\s*(?:\d+|[零〇一二两三四五六七八九十百千万]+)\s*(?:章|回|节|卷|集)\s*[：:、.\-—\s]*/, "")
      .replace(/^(?:chapter|chap|ch)\s*(?:\d+|[ivxlcdm]+)\s*[：:、.\-—\s]*/i, "")
      .trim();
  }

  function currentChapterNumberedTitleText() {
    const titleText = stripChapterHeadingPrefix(currentChapterTitleText());
    const prefix = `第${toChineseChapterNumber(currentChapter)}章`;
    return titleText ? `${prefix}：${titleText}` : prefix;
  }

  function normalizeChapterTitleForCompare(value) {
    return String(value || "")
      .trim()
      .replace(/^#{1,6}\s*/, "")
      .replace(/[《》「」『』“”"']/g, "")
      .replace(/\s+/g, "")
      .replace(/[：:，,。！？!?.、·\-—_]/g, "")
      .toLowerCase();
  }

  function stripChapterNumberPrefix(value) {
    return String(value || "")
      .replace(/^第(?:\d+|[零〇一二两三四五六七八九十百千万]+)(?:章|回|节|卷|集)/, "")
      .replace(/^(?:chapter|chap|ch)(?:\d+|[ivxlcdm]+)/, "");
  }

  function firstMeaningfulBodyNode(body) {
    for (const node of body.childNodes) {
      if (node.nodeType === Node.TEXT_NODE && !node.textContent.trim()) continue;
      if (node.nodeType === Node.ELEMENT_NODE && !node.innerText.trim()) continue;
      return node;
    }
    return null;
  }

  function isHeadingNode(node) {
    return node?.nodeType === Node.ELEMENT_NODE && /^H[1-3]$/.test(node.tagName);
  }

  function looksLikeChapterHeadingLine(line) {
    const raw = String(line || "").trim();
    const compact = raw.replace(/^#{1,6}\s*/, "").replace(/\s+/g, "");
    return (
      /^第(?:\d+|[零〇一二两三四五六七八九十百千万]+)(?:章|回|节|卷|集)/.test(compact)
      || /^(?:chapter|chap|ch)\s*(?:\d+|[ivxlcdm]+)\b/i.test(raw)
    );
  }

  function isDuplicateChapterTitleLine(line, title) {
    const lineKey = normalizeChapterTitleForCompare(line);
    const titleKey = normalizeChapterTitleForCompare(title);
    const lineWithoutPrefix = stripChapterNumberPrefix(lineKey);
    const titleWithoutPrefix = stripChapterNumberPrefix(titleKey);
    if (!lineKey || !titleKey) return false;
    if (lineKey === titleKey) return true;
    if (lineWithoutPrefix === titleKey) return true;
    if (lineKey === titleWithoutPrefix) return true;
    if (lineWithoutPrefix && lineWithoutPrefix === titleWithoutPrefix) return true;
    const numberedTitleKey = normalizeChapterTitleForCompare(`第${currentChapter}章${title}`);
    return lineKey === numberedTitleKey;
  }

  function getChapterBodyCopyText() {
    const body = document.querySelector(".chapter-body");
    if (!body) return "";
    const titleText = currentChapterTitleText();
    const lines = body.innerText.replace(/\r\n?/g, "\n").split("\n");
    while (lines.length && !lines[0].trim()) lines.shift();
    const firstNode = firstMeaningfulBodyNode(body);
    if (
      lines.length
      && (
        isHeadingNode(firstNode)
        || isDuplicateChapterTitleLine(lines[0], titleText)
        || looksLikeChapterHeadingLine(lines[0])
      )
    ) {
      lines.shift();
      while (lines.length && !lines[0].trim()) lines.shift();
    }
    return lines.join("\n").trim();
  }

  // ── Copy chapter title (one-click) ───────────────────────────────────────
  window.copyChapterTitle = async function(btn) {
    const titleText = currentChapterTitleText();
    const ok = await copyToClipboard(titleText);
    flashCopied(btn, ok ? "标题已复制" : "复制失败");
  };

  // ── Copy numbered chapter title (one-click) ─────────────────────────────
  window.copyChapterNumberedTitle = async function(btn) {
    const titleText = currentChapterNumberedTitleText();
    const ok = await copyToClipboard(titleText);
    flashCopied(btn, ok ? "章题已复制" : "复制失败");
  };

  // ── Copy chapter body (one-click) ────────────────────────────────────────
  window.copyChapterText = async function(btn) {
    const text = getChapterBodyCopyText();
    if (!text) return;
    const ok = await copyToClipboard(text);
    flashCopied(btn, ok ? "正文已复制" : "复制失败");
  };

  // ── Copy title + body together (one-click) ───────────────────────────────
  window.copyChapterFull = async function(btn) {
    const titleText = currentChapterTitleText();
    const bodyText = getChapterBodyCopyText();
    if (!bodyText) return;
    const text = `${titleText}\n\n${bodyText}`;
    const ok = await copyToClipboard(text);
    flashCopied(btn, ok ? "全章已复制" : "复制失败");
  };

  // ── Reader preferences (persisted) ───────────────────────────────────────
  const READER_PREFS_KEY = "bestseller.reader.prefs.v1";
  const DEFAULT_PREFS = { width: "comfort", font: "md", theme: "cream" };
  function loadReaderPrefs() {
    try {
      const raw = localStorage.getItem(READER_PREFS_KEY);
      if (raw) return Object.assign({}, DEFAULT_PREFS, JSON.parse(raw));
    } catch { /* ignore */ }
    return { ...DEFAULT_PREFS };
  }
  function saveReaderPrefs(prefs) {
    try { localStorage.setItem(READER_PREFS_KEY, JSON.stringify(prefs)); } catch { /* ignore */ }
  }
  let readerPrefs = loadReaderPrefs();

  function reflectReaderPrefs() {
    const main = document.getElementById("main-area");
    if (main) {
      main.dataset.width = readerPrefs.width;
      main.dataset.font = readerPrefs.font;
    }
    document.body.dataset.theme = readerPrefs.theme;
    // Toggle aria-pressed on toolbar buttons
    document.querySelectorAll('.tb-btn[data-width]').forEach(b => {
      b.setAttribute('aria-pressed', String(b.dataset.width === readerPrefs.width));
    });
    document.querySelectorAll('.tb-btn[data-font]').forEach(b => {
      b.setAttribute('aria-pressed', String(b.dataset.font === readerPrefs.font));
    });
    document.querySelectorAll('.tb-btn[data-theme]').forEach(b => {
      b.setAttribute('aria-pressed', String(b.dataset.theme === readerPrefs.theme));
    });
  }

  window.setReaderWidth = function(mode) {
    readerPrefs.width = mode; saveReaderPrefs(readerPrefs); reflectReaderPrefs();
  };
  window.setReaderFont = function(mode) {
    readerPrefs.font = mode; saveReaderPrefs(readerPrefs); reflectReaderPrefs();
  };
  window.setReaderTheme = function(mode) {
    readerPrefs.theme = mode; saveReaderPrefs(readerPrefs); reflectReaderPrefs();
  };

  // ── Keyboard shortcuts ───────────────────────────────────────────────────
  document.addEventListener("keydown", (e) => {
    const tag = (e.target?.tagName || "").toUpperCase();
    if (tag === "INPUT" || tag === "TEXTAREA" || e.target?.isContentEditable) return;
    if (e.metaKey || e.ctrlKey || e.altKey) return;
    if (e.key === "ArrowLeft" && currentChapter > 1) {
      e.preventDefault(); loadChapter(currentChapter - 1);
    } else if (e.key === "ArrowRight" && currentChapter < toc.length) {
      e.preventDefault(); loadChapter(currentChapter + 1);
    } else if (e.key === "t" || e.key === "T") {
      e.preventDefault(); copyChapterTitle(document.getElementById("copy-title-btn"));
    } else if (e.key === "c" || e.key === "C") {
      e.preventDefault(); copyChapterText(document.getElementById("copy-body-btn"));
    } else if (e.key === "[") { setReaderWidth("compact"); }
    else if (e.key === "]") { setReaderWidth("wide"); }
  });

  // ── Init ─────────────────────────────────────────────────────────────────
  async function init() {
    // Apply persisted reader prefs immediately so the first paint doesn't
    // flash with default theme/width.
    reflectReaderPrefs();
    document.getElementById("book-title").textContent = slug;
    try {
      const data = await get(`/api/reader/${slug}/toc`);
      bookTitle = data.title || slug;
      document.getElementById("book-title").textContent = bookTitle;
      toc = data.chapters || [];
      volumes = data.volumes || [];
      renderToc();
      // Load chapter from hash or default to first
      const hashN = parseInt(location.hash.replace("#", ""), 10);
      const startN = (!isNaN(hashN) && hashN >= 1) ? hashN : (toc[0]?.number ?? 1);
      await loadChapter(startN);
    } catch (err) {
      document.getElementById("toc-list").innerHTML =
        `<div style="padding:16px;font-size:13px;color:#c0392b;">${err.message}</div>`;
      document.getElementById("reading-area").innerHTML =
        `<div class="state-center" style="height:200px;color:#c0392b;">无法加载项目「${slug}」的章节。<br/>请确认已生成该项目的章节内容。</div>`;
    }
  }

  init();
</script>
</body>
</html>
